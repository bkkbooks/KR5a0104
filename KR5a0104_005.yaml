front:
  text: 玉清無極總真文昌大洞仙經卷之六冬六
  hash: sha256:83fcd999a5ebd2c7384140f45a55da3efc65409e58f7a0f19a169c2a9a454a3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_HFL_005-001a, image: hfl/0052/0052-070.png}
body:
  text: 東蜀蓬萊山中陽子衛琪注元始天王曰文昌大洞玉章第十三鼻根洞空玄息氣通己亥庚子解損太清浮絶空玉清上清太清謂之三清在大羅之上無極之中雖天真上聖亦所罕到貴重莫極于此下卷云上清絶霞升玉清萬華宫釋氏所謂一體三身先曰毗盧次曰盧舍那三曰釋迦在人則上中下元是也皆在一身之中三者不可須臾離鼻聞馨香心所欲嗜鼻竅通肺肺主氣氣必耗矣昔有僧坐襌聞香積之氣心念曰必是齊供或見天仙來請赴天厨供僧於定中便去日每如是或日明眼師見之謂曰汝墮一厠中矣僧不信遂令再赴供回師取厠中一蟲殺之僧方悟以此觀之鼻之於香亦能引人為異類不如香嚴童子聞香便悟其所從來立躋果位一般香氣迷悟兩途可以謹之太清仙境浮於絶空之中乃人之下元也謂之元始祖氣人能存之謂之大丹回風混合百日通靈也下元或下丹田即氣海是一身命脉神氣皆聚於此若能愛惜存養不為色欲所耗則成丹三天寶神符清微禹餘大赤三天乃三寶君所居寶神符者貴重大洞寶章鎮安天地人之愛惜三田貴重神氣專以保固形命日中開五暉日中司命靈童敞闢五靈之房光明輝映照耀天地亦如人之心神光明焕赫照徹三田五臟百關九竅無所不見青帝圓常無東方屬木青帝主事圓常無蓋其名也肝氣上升於東方歲星所鎮之地保肝護魂於八冥之內人與萬物均霑氣捧籍登大明文昌大洞玉章間有相同前初一章云啓籍登大明今大明出於東方故青帝乘明捧仙籍登玉帝大明之殿奏閲受籙金華樓既登仙當於金華樓上祗受寶籙以入定籍矣金華樓乃肺筒十二重樓也蓋鼻氣下通於肺府故肺氣自重樓出五臟植玉根鼻之於臭也得其正則五臟和上天之五行各具其根人之五臟亦各有根玉以比德取溫潤也根既溫潤則枝葉敷榮五臟溫潤則精神外發王叔和脉經云智者能調五臟和黃庭云鼻神玉隴靈堅又鼻為山根亦取諸此上卷五老輔玉根蓋五老即五臟神也互相發明俾易曉魂𩲸亦凝和經曰還將上天氣以制九天魂蓋陽魂為神陰𩲸為鬼若非和氣拘留則事為兩途在人之陰陽和則魂凝𩲸聚而有生陰陽判則魂升為神𩲸降為鬼易曰精氣為物游魂為變故知鬼神之情狀左三魂右七𩲸各安其位自然凝定其氣和暢於四肢也精神魂𩲸意乃大丹之母豈非度人經本命之日誦詠是經即得魂神澄正丹經云曰魂月𩲸若人知識者便是神仙子煉之餌之千日期身既無陰那得死學人當煉陰𩲸以助陽魂則易輕舉洞空清淨玄空洞之中外無纎塵可入內無神氣可出則凝和清淨玄之又玄矣洞空者鼻觀之妙行人當氣息清淨不染香臭氣通生清明衆寶香中之馨氣透遠者莫若乎腦麝也然而係屬外物不若自己五分真香薰成道德無為清淨自然又不如夜光玉女所聞微妙解脫自然之香最為殊勝在人肺氣上通於鼻則清淨純粹無所駁雜修習大洞帝一真道至此則香氣普薰遍徹上下無不周及一切聞香皆得度定和妙明覺一定不易冲和於妙明覺地則妙明之心自然納太和之氣蜣蜋推丸象龜引氣皆能羽化釋氏云圓覺妙場同玄息自長生上天之載無聲無臭豈容以聲色笑貌求之務欲闃寂無聞自然有真聞矣鼻觀之道甚大謂之胎息諸仙輩所說胎息之法常以鴻毛置之於鼻之端數息氣之出入自一至十十取百百取千千取萬以致於一定不能往來出入者或深淵下坐數日不出者則饑渴永除寒暑無畏人有饑渴寒暑者為元氣出多入少故也昔蕭靈護遇至人傳胎息法行之後於弘道二年中秋日玄化香氣滿室後人多見之雖死而不亡豈非長生久視之道乎右件玉章天篆六十字上鎮虛明堂曜天下統第四壘潤澤地土皇君玄契曰真人得洞空清淨玄息氣通無礙無障內外清明香薰正氣普徹上下能斬酆都山恬照罪氣天宫惡根地根魔籍鬼帳常以信香供養元始天王效大成夔王進登水仙水仙者因落水沈淵魂魄不散河澤岸際出入隱顯如屈原郭璞柳毅之類是也元始天王曰文昌大洞玉章第十四舌根洞虛玄舌華通辛丑壬寅益夬太極元景王談玄論道綺語妄言貪愛滋味皆舌也所以舌根最重人所當修易曰言行君子之樞機自當言顧行行顧言不綦於味恬惔為上自有太和真氣下通絳宫蓋心通舌也太極未判元景溟涬既判之後元景開明蓋尊元景為王經云開明三景是為天根故太極為王物物皆有太極三天攝神生三天即玉清上清太清攝神生一云神王非也蓋三氣合德九氣齊并然後生神上天有萬神然後人身亦有萬神紫素翳鬱仞紫素左元君名翳鬱仞字安來上乃無英之别號故後云白素白元也紫素之氣障翳鬱絶之仞仞杪也尖峰之上也人能潔素自守於頭上自有此氣覆蓋前上品第三章仰接無仞峯蓋指玉京山也此三素者後有黃素中元君白素右元君謂之三素老君前後互顯其言重復易喻安來上玉京紫素君字安來上會玉京山下卷第五章上玉名同義元景王三天攝魂生神也元者善之長故為衆神之領袖也拔出五苦界五味令人口爽五味者酸苦甜辛鹹嗜之者夭壽又墮五苦界中既已超上玉京則必先拔萃而出類於三塗五苦上卷一章拔出三塗梁中卷舌章拔出五苦界手足章拔出五苦毒性命章絶滅三塗尸精血章斷息三塗苦下卷八章拔籍三塗下十三章拔絶三塗疾三塗皆誤奈何久則難變徒者役也天徒諱可韓明人徒興生轉地徒獨隸遷斷絶天徒界上尸道色欲門免天官驅雷逐電之役斷絶地徒界中尸道愛欲門免地官擔沙負石之役斷絶人徒界下尸道貪欲門免水官連汲溟波之役五苦者度第一色纍苦心門免泰山地獄苦度第二愛纍苦神門免風刀地獄苦度第三貪纍苦形門免擔沙負石苦度第四華競苦精門免填海作河苦度第五身纍苦魂門免吞火食炭鑊湯苦修煉文昌大洞當斷絶三徒飛度五苦三五共為八難上經叙飛度五苦八難是也返胎七元庭七元水池陶𩲸之所北斗經主司陰府宰御水源舌下左曰金津右曰玉液乃下灌於心心有七孔以應七元斗辰九玄解重劫七玄九祖並解釋纍劫重陰之苦文昌大洞回風混合修行帝一真道能解上世萬劫千生冢訟徵呼并復連寃對纍祖落寃名纍世祖禰削落寃債之姓名咸得超升於上境逍遙遊宴於秀華下即度人經紫虛鬱秀宫以候運周遷度升化也徘徊秀華下甘辛發散為陽酸苦湧泄為陰二氣屈伸華蓋下玉京如華蓋覆諸天人五臟肺為華蓋徘徊者逍遙遊宴之謂也俯仰邀五靈五靈即五老見上卷末章注古人云行法無難在乎俯仰之間耳人能常常俯視五臟仰呵真氣則元神見形矣兆身升玉堂金馬玉堂世間之貴爾身得道登升玉堂乃玉帝宫在頭上五氣朝元蓋朝此也度人經云上遊上清出入華房同此五神回孩嬰五神者左無英右白元太一司命桃康合延是也回孩嬰者皆化為嬰兒孩童也修行至此謂之大洞帝尊示現俱躋太漠外升入無形之外上品第三章亦曰靈關太漠下蓋飛升於冲漠無眹之外無何有之鄉廣漠之野故知前太真無疑養素朝圓明無肉謂之素餐古人云甘酒珍饌伐性之戈矛淫聲美色破骨之斧鋸善養素者恬惔無欲希夷養素也朝圓明者天象圓而光景焕明也老君曰人能常清靜天地悉皆歸以喻人能清虛淡薄自然見其本來性天虛圓靈明也圓明即玄關一竅也非心腎口鼻之屬若知此一竅則冬至在此藥物火候沐浴脫胎並皆在此古人云玄關一竅子天地大根源契合五千字妙通三百言即此是也亦謂之默朝上帝法昔張曇要天真降授內養元和默朝上帝之道行之十二年輕舉上帝復賜混神合景之液餌之變化不測賜號葆光襲明真人經云默朝上帝一紀飛升然不遇明師指之歸趣則默朝之路亦荒矣洞虛清淨和食其時百骸理淡薄正氣停人嗜辛辣耗真氣嗜鹽醬人夭壽凡有所嗜皆傷五臟不如食淡精神爽洞虛妙行也華通引玄明華舌一通自然引取玄明之液咽之以溉靈根也舌神通命正倫洞虛者乃修舌根之妙行也不染五味為清淨煉五芽珠五芽珠乃金木水火土五行之秀氣青赤白黑黃五氣之正色五臟之津液也五氣朝元化為精液自腦中下降於絳宫謂之五芽珠黃庭云存漱五芽不饑渴芽者肇萌也未成叢林人之五味除而去之自得天然道味之腴餐咽太和則能生五芽經曰金飯玉漿向求皆至是也含善味長生傳曰人莫不飲食鮮能知味也善者水善利萬物人無有不善水無有不下味者春酸夏苦秋辛冬鹹四季甘若能隨時吐納本藏之味津液下灌脾胃則氣脉通暢含英咀華滋味善美爽快體貌悅懌手足輕便自得長生久視之道吐納五味之法呼呵噓咽吹各隨四季能去疾右件玉章天篆九十字上鎮觀明端靖天下統第四壘王德君玄契曰真人得洞虛清净玄舌華通無礙無障內外正倫玄明池中神水凝酥咽味五芽金液玉漿能斬酆都山宗靈七非天宫惡根地根魔籍鬼帳常以法食供養元始天王通一切味結大米珠進登地仙地仙者隱顯出沒多在名山洞天福地人忽見之如桃源避秦人并山中毛女之類是也元始天王曰文昌大洞玉章第十五身根洞真真相道通癸卯甲辰垢萃無英真上玄修之身其德乃真蓋身體受觸志意轉移身修則道立人之有所親愛傲惰畏敬哀矜皆不得其正也子曰射有似乎君子反求諸身此章以身體言無英乃東方青靈始老在人身左主肝臟上玄元素號無英公子諱玄元叔字合符子但凡人物皆得先受五真氣然後生五神玄中元素氣經云天上混無分天氣歸一身故元素君無英所乘之氣也蓋東方元王九素之氣生於玄門陰氣生於牝户大洞經以氣為主有是理然後有是氣有是氣然後有是形故元始初生以混洞太無元天寶玉皇之一氣以生三氣三生九氣以至萬氣成天立地開物成務使天地鬼神各有攸司井井不紊人亦如之自一氣生三氣至萬氣備萬神具然後乃生自幼嬰兒至長自老至暮年歸根復命仍如一嬰兒修此嬰兒復歸於一此大洞修行法門成始成終也所以末章絶句云符化玄氣王是也易曰同氣相求蓋氣之相類者必混合也今將經中氣字集之于此上卷五行六氣高上洞元氣祖太無慶氣育五雲五氣結十方太素三華氣中卷頂旋紫氣拔遏死積氣皇初紫氣中玄中元素氣中央黃素氣青精上華氣太初九素氣玉皇之氣凝成萬氣下卷九皇上真氣天皇上真氣太一上元氣白氣育上生友寶赤氣王浮黃翳神氣太中六氣清辰中黃景氣金闕上景氣五氣理中頡太玄九氣上萬氣生萬神守閉死氣關死氣自今絶萬神萬氣仙一氣同龍光混一玉京氣西元九靈氣符化玄氣王初曰通氣共三十四氣字大洞經以氣為主有氣則能養神有神則能養虛果能虛靈則合虛無自然之理矣寄頻携運珠寄頻斗中太一之神常斡運心珠亦曰丹臺靈臺交梨火棗等類亦曰夜明珠其實心神名神運珠能守乎晝夜渾化啓明日九魂神名渾化歸冠通天之冠衣青袍履朱舄執劍常乘九氣青光主人元陽啓明日開青陽之館降氣以為生根正一左右仙正一左仙帝賓正一右仙琳和二神共守鄂鄞二門正一者心也心正則身修矣天之日月地之剛柔人之性命長護靈虛室虛明靈覺之室即人心神宅也欲長久扶衛毋令外魔來攻直使此身與太虛同體包含法界其大無外其小無內兆有五符籍人皆有五氣五嶽符圖版籍有此籍者即得仙道玉皇經若人能佩五方真文五嶽符圖入山修道即得百靈畏服合仙得真一真即中庸誠字所以行之者一也真一者嬰兒也言主一無適誠實無妄真者不雜一者不二得真一不二法門也魂生太無中三魂名胎光爽靈幽精而每魂有從者二總謂之九魂九魂生於太無之中神仙之道從無生有復有歸無成始成終魄伏五道密七𩲸名尸狗伏矢雀陰吞賊飛毒除穢臭肺共七務養陽魂伏陰𩲸魂既生𩲸當伏五臟邪氣道路遏塞不復出也世世解寃結文昌大洞回風混合修行帝一真道能解上世祖先萬劫千生冢訟徵呼復連寃對父母宗親悉得消落咸得超升七祖絶滯塞薛幽棲乃蒲州寶鼎人開元及進士第弱冠調陵郡尉秩未滿有林泉興遂拂袖入首城山峨眉鶴鳴訪天師治所後遊南嶽修誦大洞經第子數百日集左右進玄微論明皇稱賞注靈寶經專以煉度父母祖先幽魂孤爽後得道升化弟子數百皆得尸解豈非先度七祖方度己身神風吹胞樹度人經神風靜默神風者出於乾坤橐籥鼓舞生化者也胞樹乃胞胎尸血臭穢根本神風即身中神氣能拔死度生根葉巳斷絶胞胎之根蒂枝葉盡皆隳頽無餘矣修習妙行至此賴回風混合之道披拂惡根地根胞根胎結一齊拔去我遺類胎中衆鬼殃胞胎之中鬼神最多陽神欲人之生而有所依陰鬼欲人之死而有所享與之為黨故太微小童常持旗幡攝召其魂降神而布氣俾之生成人有未産者衆鬼殃害也凡修金丹亦當愛護聖胎昔魯郡人唐若山先天中為尚書郎連與劇郡開元中出守潤州有惠政乃弟為衡嶽道士與兄同受胎元谷神之要常召入內後求歸山許之若山至楊子江中乘五色霧而仙去其弟尸解蓋善育胎元者不為鬼害身登神仙此經生死受賴其福難勝也五符閉地結五符五老所受之符天有五符則長運生化地有五符則安靜和平人有五符則身體康泰所以遏塞地户之結滯長為神真仙仙為真仙神仙仙有五種曰天仙曰地仙曰水仙曰鬼仙曰神仙此章以身根修證蓋就此養彼依幻修真故也應化續萬億既為仙道當應化人間接引群類老君至尊至貴猶且有八十二度降生以其應接受度千變萬化何止續萬億也洞真清淨身天下之本係一人之身五體百骸係一念之主儻失存攝必作禍亂欲修其身先正其心一念既正榮衛自然調和所謂志一則動氣丹經云磁石吸鐵隔礙潜通一念之間萬氣萬神一時同會此身地水火風結成於此修持則身外有身前輩云兩一般無異樣始知功滿出塵埃道通自然質易曰茍非其人道不虛行道之在身不可須臾離也大道所通自然體質却非地水火風穢濁所結之身也佛書云惟有法身常住不滅又曰金剛不壞身皆天然之質也號曰妙體迎不見前隨不見後者也蓋湛寂真空彌綸天地而不知其終範圍乾坤而不見其始乃吾自然之質真應化現相真常之性靜而能應故曰真陽變化示現之相也如老子所謂三十二相好千變萬化散赴人間之請禱所求如願不動住黃室其真身一定不移所化之身以應人心而已如月之在水千江同一釋云不取於相如如不動黃室即黃庭也中宫也應化無方在應化之身無一方不在千江萬水無所不見月且千器萬器之水亦皆有焉唯隨其器量大小其真應化現之相亦隨人根器淺深耳蜀梓郡人王昌遇世為吏後於江安遇落𩲸醉仙自號玄黃真人授以赤龍大丹大唐太中十三年重陽日登梧桐樹而仙去賜號保和真人帝命登三天左相後政和間化為鐵罐道人貨藥梓市與其孫王道淵言曰吾爾祖也帝命我校大洞經三十九章今當付汝又授以回風合景混一成真飛仙上陽內禁祕籙三卷以此可知人既登仙亦必化身下降廣度人天其真身依然復在天位亦如玉皇分身變化未嘗不在金闕之類是也即人身中萬氣萬神聚則一散則至十方骨肉金玉實骨肉與金玉同固蓋文昌大洞回風混合之道修煉極至則骨肉同飛蓋以南方真火煅煉白虎金精以成金丹至道譬如金之堅玉之潤傳云德潤身心廣體胖丹以身為鉛心為汞二物交媾可如金玉之堅矣釋氏以為舍利子火燒不壞鐵擊不碎蓋人身中精氣不散而成者靜真明至道誠身有道不明乎善不誠乎身矣至道者至善之道也以寂靜真一昭明此至善盡美之道人能堅持可以為上仙至老長不易雖至老朽不易此志此為世人言非上仙之道也上仙則長生久視死而不忘蓋老者歷劫不壞亘古亘今之身也此身先天地而不為始後天地而不為終卓然獨存所謂本體也釋唯有法身常住不滅人多錯認四大假合為實相一旦神氣離散等於臭腐委而棄之畜獸不若也右件玉章天篆一百三十字上鎮玄明恭慶天下統第四壘王德君玄契曰真人得洞真清靜真應身相道通長存化無量身無方不在法身常住玉山上京應變自然十方皆現自身他身皆得自在能斷酆都山敢司連宛天宫惡根地根魔籍鬼帳常以天衣地裳供養元始天王上下垂覆進登神仙神仙者出入洞府變化不常忽住人間改頭换面人所不識此乃四果羅漢五通神仙之類是也元始天王曰文昌大洞玉章第十六意根洞清大意元通乙巳丙午升困太初九素氣意屬中央土脾胃為之宅太初氣之始也九素者九陽也喻人之肇受父母之氣也素字凡一十有三上卷云三素生泥丸蓋指三素老君諱罕張伯史啓三素太素三華氣太素拂眇景此數句同義中卷乘素入四明義理不同素啓蕭仞為白元君名玄中元素氣蓋指無英也中央黃素氣云黃老君太初九素氣九陽之氣始萌也下卷太素梵行初此指五太氣形質未離也左携元素君左無英與此中卷玄中元素氣同義太素洞元靈與太素三華氣同義三老素罕張與三素生泥丸同義素空也潔也皆三田之真氣也九素與三素不同紫素白素黃素乃三仞君之氣即人之肝肺脾青黃白之三氣凝結是也氣出華景中此九素出於光華景界之中以喻人之始傳於父母精血之氣景者色象也胞胎始形精神備體燦爛閃爍迸射也法垣舞仙旗法垣一云法坦誤也乃紫微太微天市三垣也又云垣墻也城也腦後為玉城但修行人以之為默朝之路亦乃斗中太一之名字舞仙旗以旗幡攝召魂靈也此章以意根修證故生智慧誠意而后致知也下卷法垣興朱霄同蓋斗中太一乃招真致靈之神人得之真靈降神布氣逡巡五老翁逡巡疾速之義言疾催五老各布真氣接引魂𩲸也五老者玉清昊極元老虛皇靈光始老玄華寶天真老露渺太靈祖老婆鬱洪京仙老即先次五老之異名耳蓋太極中五行之祖氣也人得五氣方能成形丹得此五氣方能成金液大還即經云天地得之以分判日月得之以運行夫人名啓珠回風混合上真聖母中候元君王夫人名啓珠又曰夫人即泥丸神也黃庭經云泥丸夫人當中立蓋雌一之神也人或疑天上安得有夫人之名殊不知天上人間其實一也昔晋武帝左僕射魏舒女名華存字賢安幼讀書喜莊老春秋三傳五經百子年二十四父母迫令嫁禮適太保公掾劉乂字幼彥女禮有行時不獲己遂為劉婦逮子息已長劉氏有繼求為别居時乂為修武令夫人遂修大洞帝一之道忽夜空中八音嘈獻望之旌斾自天而下至室坐四真人乃曰太極真人安度明東華大神方諸青童君扶桑暘谷神王清虛真人小有天王王子登夫人再拜求教與夫人受道畢託疾尸解或見太一元君乘飈輪來迎之即東晋咸和四年也位為紫虛元君領南上司命又加南嶽夫人秩比仙公即今上清大洞祖師也是知天上亦有夫人之號職等三品乃女仙為之也執籍歸紫房夫人把籍入紫房在腦後亦名紫户面奏玉帝言已召魂魄遂得生化也經中多紫房或曰黃房者乃中央黃庭元父左回明上玄元父即意神也總統四象見上卷第四章注行法經心想如猿猴無有暫停時若欲折伏者當須誦大乘古人云攝心一處即是善提道場散意片時便落衆生境界蓋意乃五臟之中四神之首上下中停為得中之地人能晝夜照顧省察提撕毋令昏聵常惺惺地百日自通靈混合太微童意神混合水火則太微小童布氣降神以生我身此胞胎始凝之神也丹則鉛生初始當採之得法以煉玉液還丹洞清冥智慧度人經冥慧洞清生神經云耽咀洞慧蓋我之智慧七覺洞徹清明所謂物格然後知至知至便有智慧般若是也大意朗元通一本無智朗二字又一本安得獲二字意志也脾所主心所發故心正而后意誠所謂誠真意者毋自欺也華嚴經云若有欲知佛境界當淨其意如虛空孟子曰志氣之師也故在丹道為黃婆以其能媒合五臟之氣集而為一金木間隔非媒無以成就青衣女子素練郎君須使猿馬調伏則龜蛇交合矣大意一得通徹朗明瑩淨先劫後劫無障無礙悉知悉見在道為十通在釋為六通在中界鬼神為五通皆不離於中道凡事得中自能七通八達根塵悉消滅六根者眼耳鼻舌身意六塵者色聲香味觸法一切幻妄隨即消散蓋誠意則無妄動之理人無十全但一根穎悟相緣修證則能滅六洞魔王之劫賊即得六根清淨六腑調和不為六氣所拘故六欲俱全為凡夫六欲俱無為真仙度人經有粗塵初净細塵未淨故不能出於三界有無皆虛空有無二見皆歸空寂蓋得中庸之道而行之如惡惡臭如好美色也此之謂自慊古德云虛空粉碎方露全真妙行全十真大洞妙行三千圓滿以全十真之道不息則久久則懲以至成物成己皆出此道大洞經以修習妙行為上結經云六度十通萬行圓成然則六度者何也合於下卷六章解釋以字數多於中卷故於此下注上卷之九玄契曰六位已升者是所謂初心十信次興十善次發十華次成十德漸證十仙遂成十真一初心十信者起信心動同信之機念信不忘為信而行五信在中記信金石至信大成善信能終堅信進趣方名正信二次興十善者上卷之二云十善生玄中聞善則玄上貫顙六丁洞光視善則丹元方瞳八史洞明語善則通命含潄五文王華履善則挾就力通地關生命念善行善至善不踰住善保安定善崇基全成十善但得十箇善字為是三發十華者出下卷之七玄契十華觀門謹按上卷經云十華妙行仙十通由斯生乃河圖數也五行成生八卦成列言天地人物皆禀此以生既生已復知之而修煉貴使脫五行之殼離八卦之機即證登妙行已見題下四次成十德者卷下之八玄契上卷之六經云十德初成機下卷之八經云十德真文宣用德合體進德坦平成德廣大智德內清惠德發光明德圓華靈德普應玄德太方太德自然普德濟攝五漸證十仙者出下卷之九玄契胞仙胎仙魂仙𩲸仙靈仙元仙華仙嶽仙藏府中仙元命神仙六遂成十真者下卷之十玄契上卷之九云十真登紫房中卷之十云妙行全十真下卷之十云妙行登十真下卷十一云十真妙行全精真玄珠氣真玄力神真玄通性真玄一元真玄妙命真玄光形真玄全德真玄洞道真玄應令真太玄此六謂之六度十通六位已升妙行大全名大心神通心中之神感而遂通通則變變則久神能久駐則天地造化豁然見前矣世間一切事皆從心起心神既通不隨物轉意誠而後心正至於天下太平國安民富也夫名豈不大乎未有身不修而蚤有譽於天下者詩云在彼無惡在此無射庶幾夙夜以永終譽神仙傳載云昔武昌人劉元靖師王宗道傳三洞經籙常修回風混合之道絶粒煉氣而飲酒斗餘寶歷初敬宗求方士監軍吕令琮起之元靖曰某有山妻稚妾以牛肉為命若以為術士恐將軍有罔上之名因請彘肩自剌以蒜葅而食之吕疑而起之辭不獲已登道至京召於司政殿問以神仙之事語不契放還會昌三年再召入對稱旨敬宗拜授法籙除銀青光祿大夫崇玄館大學士賜號廣成先生大中五年十月雲鶴天樂羅浮空際遂尸解餘杖履而已豈非名大心神通之驗乎人不肯為有為之者亦若是矣道備登玉清智仁勇三者天下之達德知斯三者則知所以修身生知安行成功一也洞經至此可謂優入聖賢之域道德圓滿克備登上玉清聖境修習至此可出陽神於泥丸也或云宅舍壞子曰朝聞道夕死可矣玉清上境乃人之泥丸宫衆妙門投胎奪舍皆自此出入人之死亦由是出去位為聖仙公仙階聖位當作仙公前有五老翁不應重當作公字中卷十章以眼耳鼻舌身意津液手足精血性命為主因此地水火風四大假合而有此幻妄之體當依此幻妄修證真乘毋使六根誘引於人欲之私則不墮六洞魔宫身飛六合之外位證玉清仙公之果釋云如來說諸相具足即非具足是名諸相具足如來說有我者即非有我而凡夫之人以為有我大率不欲人之執著虛假以為實際自然超脫凡質得證真如矣昔日聶師道字宗微世穎悟事親以孝聞受大洞經籙深詣其精要遇彭蔡二真人又遇謝修通真人謂之曰吾與彭祭隱此二百年適被東華君命主玉笥山地仙兼清虛館爾與我素有道緣故來相報汝宜善修當有仙公之位忽然不見師道旋亦羽化豈非仙公之徵驗乎大元蓬州衛桂之平昔修混合之道常誦大洞靈寶二經周易手不釋卷往來蓬山居玉笥山或日坐盤石上俄有虎達其傍公略不顧虎亦自若又一日忽如夢入一巨穴深邃數里或明有宫室遇人謂曰非君所宜來可速出遂登山松竹瀟灑鹿鳴鶴唳人又語曰時未至姑暫還後召復到自後舉止不凡至元甲午五月二十八日晡聞人呼曰帝命召宜疾來公矍然起行至中道冉冉而逝豈非登玉清證仙公乎右件玉章天篆八十字上鎮太涣極瑶天下統第四壘王德君玄契曰真人洞清冥慧大意元通根塵斷盡世法除滅有無二纍皆悉空寂全真妙行得大心神通能斬酆都山明晨耐犯武城天宫惡根地根魔籍鬼帳常以法財供養元始天王施及一切普令具足成大富王圓滿十方進登飛仙飛仙者飛行虛空乘雲駕鶴形棲華表柱朝起扶桑暮宿咸池如丁令威徐子真等是也玉清無極總真文昌大洞仙經卷之六
