front:
  text: 玉清無極總真文昌大洞仙經序圖卷之一
  hash: sha256:3e29d7c86c55927578fe3b9ff492d80f28639c7191265d4b15b691a0d1b5e6b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_HFL_001-001a, image: hfl/0051/0051-004.png}
body:
  text: 進經表具位臣衛琪謹言天命之性有生鈞受於一元道與之形品彙皆同於五緯恭惟皇帝陛下道參穹昊德合神明長追太古淳朴之風遠纘曠世厖洪之緒玉刻金編之簡盡沐披行巖棲野處之徒咸蒙拔擢故感草茅之奮躍仰干鼎鑊之寬原敬獻文昌大洞一經仰祝聖躬萬壽恭願堯仁廣覆誕敷文治之休舜孝彰明丕顯昌期之運玉燭調而春生秋肅璇璣斡而雲潤星輝天地位萬物育化已極於範圍日月照四時行誠遂贊於幽顯臣琪干冒天威下情無任瞻天望聖激切屏營之至頓首再拜奉表以聞至大三年九月日臣衛琪上表臣衛琪謹言王化所基古典載太妊太姒國風所始今人欽有娀有恭惟皇太后殿下懿範柔和婉儀清淑志靜已參於乾造德方誠合於坤文鼓百姓之歡心躋八荒之壽域切念臣琪蓬萊隱迹萍梗微生稔知文母之承休敢獻文昌而祝頌伏願月華絢彩法天象而統六宫陰教敷明體地元而育萬物民子例覃於慈廕華夷均被於殊恩臣琪干冒慈嚴下情無任惶恐望恩之至頓首再拜謹言至大三年九月日臣衛琪上表序經者道之綱領也夫道豈容言哉上聖因言成文因文演教其所以經紀世道類不可以測識故凡經皆有難言之妙近世學者方句評而篇注之往往有得天人説經意此大洞經之類是也大洞自元始出其言致玄總靈超真歷劫蓋所謂妙哉者今中陽衛氏乃能自出新意為之注釋鋟以行世見豫京師求所序引豫觀之詳乎而莫知其涯真不可以測識也抑聞演經之旨有萬遍而道備者味之深也今子於是蓋有得矣苟明夫味外之意則自萬遍而至無言其為造元始閫域也無二道皇慶壬子夏五月特賜太素凝神廣道明德大真人嗣漢三十八代天師金紫光祿大夫留國公張與材序大洞仙經蓋西蜀之文中原未之見也中陽衛君自蓬山來京師示豫一編且求為序引豫諦觀之皆世外之説衛君以三教聖人有雜注於其間旨意深遠苟不能貫通三教之書未易觀也獨雌雄混玉房一語所注陰陽交媾之事頗涉形迹豈中陽曲為今時而然耶但恐不可對癡人説夢耳且西方聖人有云始從鹿野苑終至跋提河於是二中間未嘗談一字吾夫子亦云天何言哉四時行焉百物生焉老聖亦曰多言數窮不如守中由是論之文字語言者聖人不得已而因言顯道耳苟得其道尚何文字言語之為哉我作是説中陽子以為何如至大四年清和月望日翰林學士承旨資善大夫知制誥兼修國吏疇齋張仲壽謹題圖書未龜馬以前五文開化已見於靈寶之書天道昌熾斯文如善養元氣浩然獨存濁之而愈清晦之而愈明無絶續無存亡劫火不能焚世變不能移也蒼然而在上者不有剛健中正純粹精為之情性則機亦息矣所以運行形體情性於不息者其主宰之謂帝乎七曲老仙以功行道德經緯文章神而明之大哉帝力持是經籙溥覺衆生造化之樞性命之源主宰在是自未始有形之先暨四達無窮之外寥乎廓哉萬殊一本千劫一途以法眼視之洞然而無礙也吾之所謂太易太初太始太素太極即元始所傳文昌大洞也中陽先生衛氏洞測玄妙句解字釋本之以道學性理參之以丹訣禪機聖賢千古心法透徹發露更無餘藴洋洋在上有神司之覽者幸毋忽焉至大辛亥仲夏旦集賢待制奉直大夫蜀叟趙炞拜手謹書文昌大洞經注序切聞玄圃之玉昆吾之金照乘之珠連城之璧或出合浦或産崑岡有明月之稱具衣光之號卞和所抱隋侯所懷世人雖有聞而知之者尤起愛敬願見之心豈特所謂玄珠黍米蒼胡頡摩尼珠天人之所貴重者今文昌大洞是也人人有之而自見不自貴其取棄賤故聖人演之以覺衆生託法象以取喻非有形迹者也敷光氣以為音非有文字者也至道無言至真無象自混淪剖判三才之理暢然元化之體歸一不知我之為道道之為我以後五行錯謬氣運變遷有生之根或拘於宰制於是三寶君復闡其始初之因以示天人謂兆之身皆吾之氣兆之神皆吾之真欲使人人咸知悉見則復歸於我而不為氣運之所拘束可坐致自然因是元始重演三十六章之祕該三千一百八十八言以付玉宸道君序結其始末之因計九百單八言以畀太玄道父二聖法語總計四千九十六言於是至真無象而聖迹益彰真宰無言而玄籍愈阜範圍天地曲成萬物大哉至寶真所謂乾始能以美利利天下然三十六章以應四九金數即自己金丹之道上卷十章中卷十章下卷一十六章三卷皆以五言為句共三十六章章之上復有大洞帝尊一章以四言為句自不相侔總冠一經之首三卷各有序經下卷終有結經皆玉宸道君演説方見一經之始末周初帝命三真人下傳吳會張通真先生此經是也以其時考之蓋二千五百餘年矣所有茅山魏元君之泒號上清大洞玉經蓋靈寶天尊所傳比此經缺二章多八十字又有宋明帝時陸修靖以帝一雌一雄一三經或三言四言句讀長短不一以附各章之次故其章句頗多其正經並同稽諸傳記中載云唐梓州王保和真人奉帝命校三十九章大洞經以付嗣師又有宋真宗朝觀妙先生朱自英注政和元年張商英進御劄子大抵相同此經本一百二十卷玉宸道君太玄道父牛孳先生集其樞要分其章句三十六章為三卷以便修習上則安鎮三十六天下則統御三十六地中以通人身中三十六宫神氣豈非所謂天上三十六地下三十六太玄無邊際妙哉大洞經乎此經所載皆天真內名隱諱與人身中神氣相接故在度人生神黃庭之上是故內外互顯上下交錯蓋取諸人身一小天地也人能存養自己神氣吟詠寶章則天真下降與兆身中神氣混融是曰回風混合形神俱妙與道合真故致長生之道可以提挈天地把握陰陽鞭策風雷驅役神鬼偃息於流霞之車眷盻乎文昌之台也人徒知誦經亦死不誦經亦死豈有長生之理殊不知誦經者蛻脫幻軀以即真體謂之尸解不誦經者幻軀與真體一齊俱斃其上根者不言而喻愚不肖者雖提其耳諄諄焉命之渺莫知其所以況章句字義幽隱非天人再世其孰能知之琪幼蒙義方至於諸子百家靡不攻考至元巳卯時方弱冠受誦此經逮今三旬惟恨文字訛謬十本九乖無所從正每思幼小曾閲三藏頗記一二字而不敢擅自訂證且天下經教經大冶化爐之後不復有聞比歲薄宦西南嘗以此勸人家至户到往往好讀而琪以訛傳訛中心少寧近因浪走江湖旅邸靜坐默有所悟輒將曩者注藁翻繹以平昔所記三教經書其間旨意合同者隨句解釋仍以大易所謂無極河洛先天後天卦象金丹火候蒼胡檀熾帝尊玄氣等各列一十三圖以冠經首俾人一披便喻妄攄管見語意膚陋惟恐貽譴天道取笑大方敬謁注生真君採訪使者冥干印可方敢布露同志誠非所以贊揚大經庶幾純根小器有所發明也龍集至大己酉東蜀蓬萊山中陽子衛琪稽首謹序周子作太極以括大易豫演無極以總大洞蓋太極者已具形氣之謂無極者無聲無臭無象無名惟理而已周子亦曰無極而大極蓋無極一動而為陽以生玄氣屬水故日太易生玄光靜而為陰生元氣屬火故曰元命生太初靜極復動為陽生始氣屬木故曰太始三氣周玄元始三氣周備氣形質具未始相離謂之太素靜而為陰屬金故曰太素梵行初三氣為天地之根萬物各極其位謂之太極動而為陽屬土總領四象故曰太極五靈沖一動一靜互為其根是以五太五行謂之五老五符玉經云生於元始之先是也天王復演太易之玄氣結一寶珠即五行一陰陽也陰陽一太極也太極本無極也故曰無極總真文昌大洞云吾以此寶光凝成萬氣化生諸天又以其光分敷百千萬億結成大洞仙經即玉經生天立地開化神明又曰五氣結十方萬氣生萬神即五行順布四時行焉又度人經五文開廓普植神靈無文不光等同萬神萬氣仙即無極之真二五之精二氣交感化生萬物故文昌乃天地之祖萬物之母是以人人具一文昌物物具一太極也人能精修澡煉文昌大洞之道究竟復歸於無極之中矣虛無自然人生自無中生有至老復歸於無看無極圖方知二氣五行所生之自二氣者陰陽也五行者水火木金土也因理而有氣因氣而有文文者天干地支也陽動而生壬子一數也為陽水陰靜而生丁巳二數也為陰火再動而生甲寅三數也為陽木復靜而生辛酉四數為陰金動而生戊辰戍五數也為陽土靜而成癸亥六數也為陰水動而成丙午七數也為陽火靜而成乙卯八數也為陰木動而成庚申九數也為陽金靜而成巳丑未十數也為陰土雖曰天干亦有陰陽也甲丙庚壬戊為陽干屬陽必動而成文乙丁辛癸己屬陰必靜而成文地支亦有陰陽也子午寅甲辰戌為陽支巳亥卯酉丑未為陰支五文已成其名號曰五太而經中再有五太是為十太豈不貽識者所哂蓋不知五行各具二氣交感而方能生成五行陽生之為一太陰成之為一太互相生化以成天地之文經云真文肇生明點火生真文十德真文宣橫文帝子賓十佺人文結皆以五文開廓故天地萬物莫不皆以之而生長或曰黃帝命大撓氏探五行之精而作甲子豈在天地之先乎其不知甲子先天地而生此特因人而顯爾天皇氏所起甲子十干十二支先作攝提自寅上今爾雅所載是也後至疱犧氏作自甲上起謂東方甲者乃萬物始生木德之盛故以甲始十干陰陽二氣化生天干地支在天為天文在地為地理仰觀俯察探賾索隱推究源流六十甲子為天上六十位星辰五行之氣所化八卦安鎮八方今以六十甲子并六十四卦分布洞章皆合妙道九皇上真氣其文壬子生天一之水為太易太中六氣清其文癸亥成地六之水為太中天皇上真氣其文丁巳生地二之火為太初晨中黃景氣其文丙午成天七之火為太和太一上元氣其文甲寅生天三之木為太始金闕上景氣其文乙卯成地八之木為太清太素梵行初其文辛酉生地四之金為太素太真九光輪其文庚申成天九之金為太真太極五靈沖其文戊辰戌生天五之土為太極太玄啓十明其文己丑未成地十之土為太玄經者數之體數者經之用凡修文昌之道不可不知數蓋天地以數而運用萬物以數而有生數者即太極中陰陽動靜是也易曰天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五丹經曰東三南二同成五北一西方四共之戊巳還從木生數三家相見結嬰兒其文昌之謂乎道即經也易也易即數也象也經云以玄一之氣太玄一音弘帝一真道又曰從道妙一善貸生根孕玄分元誕始傳真化生諸天原其起因皆從一數蓋玄氣一動而生水次生土木靜而生金火從一至五五行順布又以六配一而成水以七配二成火八配三成木九配四成金十配五成土此所以成變化而行鬼神太極未判此數混然於無極之中是故天地人物生成也以數敗壞也亦以數而百姓日用而不知至伏羲氏出因河馬負圖遂則而象之以畫八卦若知此數者性命之道在其中矣是以文昌咸備焉故下卷言五太五行五老五符生天立地化育人物莫非皆自九宫八卦中來故宫卦是出乎二氣五行蓋二五又起於太極無極而已伏羲大聖人也精思至道玄感于天泝天地之原依盤古之化得其身體髮膚以為卦象箕子作洪範九五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命凡人在世所願者五福而不知所以進修之道當自洛書始洛書之九宫即易之用九文昌之示九也人能於此用意則易之純乾文昌之純陽不約而會故曰君子終日乾乾自強不息又曰綿綿若存於此所謂求福不回也洛書者戴九履一左三右七二四為肩六八為足是也以節氣順逆遊行九宫縱橫者皆一十五數與河圖絡繹錯綜以成三才之道誠經天緯地之數也渾淪既判萬物賴以生焉至大禹因洛龜負出象數始靈禹以之理水敘九疇箕子因之作洪範文王因之而移易卦位即太極之數也故文昌云示九統之法傳九光之符皆以九為用蓋九為純陽之數也故經有三十六章亦如乾元用九無以異也此三才之中性命根本太易所謂易簡之道也而人所不知或流陰陽山水之家欲求洪範五福當窮究文昌九數而後可上有九天人頭亦有九宫以象之地有九州人身有九竅象之斗有九元人心有九孔象之水有九河人腸九曲象之九數為陽人非陽不生也禹傷鯀遭殛精思冥感欲復大功故天授之以理水皆合天地大造化之體用也河圖先洛書數千年出是以伏羲得以畫先天八卦即太極中所具五十五數是也以此畫卦似有次序而先輩多以洛書九數為河圖是以劉牧因而授受至今存焉兹因文昌中探索得合以十為河圖以九為洛書故列其次序無極之中已具此體而祕藴未露始因伏羲時龍馬負圖而出因之而畫八卦以一五七陽竒輕清之數上而為乾天二六十陰耦重濁之數下而為坤地謂之天地定位乃太極生兩儀是也以五數配一二三四而為老陰老陽少陰少陽是兩儀生四象也以六七八九十交互配合而成八卦曰一乾二兊三離四震五巽六坎七艮八坤相對取象曰雷風相薄山澤通氣水火不相射縱橫皆九數是謂四象生八卦也是以人之頭圓象乾天足方象坤地身體象艮山津液象兊澤聲音象震雷呼吸象巽風血榮象坎水氣衛象離火豈非八卦皆備於我故以易參同經旨蓋文昌大洞之旨尤為幽隱人或以為難曉不肯受誦故今取諸經書中易見之意合之庶幾善信男女無問賢愚悉皆省悟天地未判形如雞子中有渾沌氏以清為天濁為地渾沌日長一丈天地日開一丈眼為日月身為山髮為草木津液為水名盤古洛書後河圖數千年出大禹得以理水亦太極中之五行是也蓋欲人順其性命之理則不汨之也然則圖書止可以畫卦理水耶曰非也實性命之體用也先天後天非圖書無以顯其體而大易文昌非先天後天無以著其用故體用兼該性命互顯缺一不可敬並書以示同志經曰八皇運九天即八卦九宫也八卦九章相為表裏故河圖洛書相為經緯先天先地已有之矣文王因取河洛紬繹而移位八卦故以乾坤老陰老陽已具三男三女是宜退休於無用之位故易乾於西北移坤於西南坎離陰陽正交於中宫居子午正位震乃陽交之初故置之東方兊乃陰交之始故建於正西艮巽陰陽駁雜而無交感故位偏處一隅而後天八卦周遊於九宫之間五居中而寄位於二曰二五同功易帝出乎震齊乎巽相見乎離致役乎坤悅言乎兊戰乎乾勞乎坎成言乎艮而四時行焉百物生焉而易行乎天地之中矣文昌與易豈相蓋人身一小天地而文昌經緯於身中矣人能純全而歸之是無負於聖人之化育則此經不為虛文矣九光符者乃混洞赤文九陽梵氣之所凝集成文初以始青之光氣開始青之天凝太霄之宫於東北次以太青之光氣開太青之天凝青霄之宫於東方次以始丹之光氣開始丹之天凝碧霄之宫於東南次以太丹之光氣開太丹之天凝絳霄之宫於南方次以始素之光氣開始素之天凝景霄之宫於西南次以太素之光氣開太素之天凝玉霄之宫於西方次以始玄之光氣開始玄之天凝琅霄之宫於西北次以太玄之光氣開太玄之天凝紫霄之宫於北方次以太梵之光旡開太梵之天凝神霄之宫於中央九統者以一帝統一天之事故曰示九統之法以會帝傳九光之符以集神人初生受九天氣方具形神修行人九月功行圓十月聖胎成方可溫養上真以九氣凝而成文曰九光之符以度人天在法籙中具載兹以神霄生神九天上統三十六天星曜下統三十六壘土皇中統人身中三十六宫且三十六宫者皆係上天布流真氣灌注宫室然後成人小救苦經云還將上天氣以制九天魂是也三十六天三十六地具在各章今將人身三十六宫分上中下三部以分布凡人修誦是經當須澄心默坐存想自己心中三十六宫光明焕赫宫中各有真人放五色光芒上接三十六天下接三十六地神氣凝集上下相通經所謂九統之法以會帝九光之符以集神是也光氣凝定然後調聲正氣吟詠洞章須以九遍為一過誦訖一遍回向上真并中下界鬼神及自己祖先魂識一一如意回施略坐俟神氣稍散徐徐離席不可卒急紊亂神光鬼神呵責誦經時不可言語今開于後金丹者乃人身中一點真陽也與天地同出日月並明泄之則成人聚之則為丹經曰丹母全真陽真陽者鉛也産在坤為地曰玄玄叔火王者汞種在乾乾為天故能奪天地以為爐鼎也曰携提日中王併羽月中晨者故能採日月為藥物也曰冥化混離坎雌雄混玉房者以黃婆為媒歡合木公金母夫唱婦隨也曰紫華領胎仙者十月聖胎圓成也曰嬰兒為赤子者陽神突然現形也混合三五宫者追二氣於黃道會三性於元宫也曰五氣結十方攢簇五行也曰太極主四真者和合四象也曰黃庭涉北元者真陽上沖心府也曰九遍還返七者以易卦進退抽添為周天火候也曰體寶圓珠映領玄蒼胡珠者片餉工夫金丹立成也曰舐煉五芽珠者餌此金丹則證品大洞天一帝尊也經中金丹語意不一而足兹略舉梗槩中者在中之中也非上下邊傍佛氏云不思善不思惡正恁麼時方見本來面目儒曰寂然不動道曰念頭是也不可聲臭求不可著體相索常虛靈不昧若串其中則此竅不明矣昔薛幽棲注靈寶經值仙人雙子辦白先生二人相訪談云論道言及五真遊神之妙蓋謂此爾五神在天在人在物皆主生化之事若不得此神主生生之運則機亦息矣故度人經云執符把籙保命生根出入華房八冥之內細微之中下鎮人身泥丸絳宫是也故文昌靈寶黃庭生神等經皆具言之五神散為萬神聚則復為一嬰兒也萬神之名不可一一備載兹略舉要以便觀覽在人精思冥想自然相感化現出自己身中今開于後夫人之身以萬氣凝而成形萬神具而始生既生為嬰兒純和沖粹天理混如即大洞帝尊之本體也若修文昌復歸於嬰兒謂之形神俱妙嬰兒既成化為玄氣謂之升入無形與道合真復歸於無極之中一而已始知根源自此而生自此而終大通經云真空無相湛然圓滿者也玉清無極總真文昌大洞仙經序圖卷之一
