front:
  text: 玉清無極總真文昌大洞仙經卷之四冬四
  hash: sha256:888dd223303bcca0da8b6c5b8597c608401b1a6e573b80efd77bf5ad5c65dbbf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_HFL_004-001a, image: hfl/0051/0051-190.png}
body:
  text: 東蜀蓬萊山中陽子衛琪注元始天王曰文昌大洞玉章第四四月生魂四還二返癸未甲申賁剝元氣生旻氣其色玄為北方五陽水氣凝成天境號寂然兜術天劫號開皇此天精魂太陽之氣主洞房宫帝真𩲸命元碭尸冥演由之氣生七𩲸太真統九氣太真太玄一也即玄元始二氣生九氣一云太玄九氣上下卷九章云太真九光輪光即氣也統九氣以生萬神也洞景寄神通洞陽之館為真仙煉魂之所絳宫光景為神明寄迹之舍通者出入無常孔子操則存舍則亡出入無時莫知其鄉玉帝乘朱霄玉帝君乘朱霄之輿以統御萬靈朱霄一名丹霄一名絳霄此名上田泥丸有玉帝宫總制人身之萬神萬氣之主緑霞焕金墉墉者築土壘甓以為小城又曰堂中北墻也言玉帝入城威儀青緑霞帔焕爛金城中卷五章云披朱巾緑霞同義上館雲珠內自兩腎上夾脊透雙關入泥丸之時惟一光明之珠雲珠者五雲之珠五雲者五臟所化之氣也雲珠則玄珠宫也仰接無刃峰玉京山之頂上玄虛無有尖刃此言人頭直上亦接玄虛無刃空洞寥廓之景西北崑崙山有金城玉樓人頭是也靈關太漠下靈關三關即上中下三田冥漠無眹虛曠幽玄之下蓋上無復色下無復淵之謂也雙腎間皆謂北陰酆都幽陰境靄沫竟沖空真氣薰蒸上沖空洞之中言人至大至剛之氣充塞天地之外無窮無極之所靄沫者皆祥煙慶雲之屬沖者和也冥化混離坎人所不見則曰幽冥故坎水離火二氣交會故曰晦冥變化者混合水火之道也丹經云取將坎位中心實點向離宫腹裏陰故知水火乃道之真體也伏羲先天水火乃文王後天日月也其名異而實同仙輩云此竅非凡竅乾坤混合成名為神氣穴內有坎離精卦名但提要而已蓋坎離為萬物之母也其他卦觸類而長之無不全備誦之者六位已升體變純陽鍊化紫金升入金門六位者六爻也坤變乾至第六為純陽全體坎離乃文昌之要玄玄叔火王上元玄父隱名叔火王字左回明玄父者道父也或云叔火生考之下卷十四章作叔火王今從王字出上清玉經瑋寂高同生上元玄母隱名高同生字右回光玄母者道母也瑋寂牝門也或云高同王既上句為王字此當作生字守玄牝門無極保谷童結中二神精魂君名谷童無極無盡也保養也又曰黃寧童居於脾中宫戌巳上掌水穀尅化之神披黃裳立黃庭中圓塗無凝滯一云無滯礙然不如凝滯尤妙圓塗者乃真中之一竅無凝滯者三宫升降上下往來不息之謂道塗通則圓明綺合有九重真氣交合如綺羅之文其勢錯綜混合光景九重之厚真仙朝帝但見金光勃勃不見粹容人修真鬼神唯見紅光南拔七祖根拔一云披亦可南七火也披拂也拂取七祖根塵必令清淨則九魂遂生九玄七祖皆在身中自己清淨彼自化生西解纍劫凶西方屬陰以肺𩲸主之魄專引人情欲以墮凶釁非大洞解之縱經千萬劫塵無由解脫以此拘制七𩲸總領肺氣體矯萬精波矯強貌身體強壯精氣潤澤也矯強哉矯之矯萬精波乃北方之真水化為真陽之氣腎中起上至泥丸宫滴下心神王攝十方十方飛天神王風生氣也一云神生誤矣生神經神王之職非小而玉經令五老取俯仰於神王即玉輔上宰之職大歸返胎轅既已返胎更生大歸其所遊之轅轍即無飛爽浮遊轅車名取其運轉真氣不息之義歸者返本還源胎者聖胎也三合乘天龍三變列位三合成音形神已備乘龍而登天龍字有五天龍龍山龍臺龍光龍琳皆同一義天龍乃天帝所乘之龍右件玉章天篆計一百字上鎮玄胎平育天下統第一壘元德君玄契曰誦之四遍根塵漸隳業網自解劫還不隨萬氣齊臨得自在門元始天王曰文昌大洞玉章第五五月生五臟五還三返乙酉丙戌復無妄旻氣生景氣其色黃乃中央一陽上氣凝成天境號波羅尼密不驕樂天劫號上皇此天精魂上陽之氣主絳宫常真臟腑命元五仙中靈之氣生五臟太微天帝宫太極中有太微太微中有二十四真人專主降神布氣生育之事人有中墮而不育者蓋由太微之氣不接故難養八浮入雲營八識飛爽浮遊來入五雲之營五雲五臟也皆有金房玉室故曰營經云流響雲營言氣運於五臟成一部音樂也神宗理靈襟中央丈人名神宗即心主也言神明宗主條理靈臺胸襟也五神以心神為主而四神次第降生以生五臟布五神龍山秀玉京龍木也在左為肝神曰無英公子又曰龍陽物也變化莫測言人之頭成形陽氣秀盛而顔色悅懌仰接無刃峯同金房鬱明霞金房為肺臟有神曰白元尊神金華西方太華元老所主金氣化成擁鬱明亮之雲霞言肺氣甚威薰蒸蔥鬱之景九户朗高瓊心有七孔以應七星下有玄牝二竅以應輔弼故為九户之瓊瑶明朗而高又曰頭有七竅下部水火二竅通九竅黃庭涉北元中央脾宫黃庭云脾部之宫屬戊己故曰黃庭涉北元者以其上通心竅有黃庭內景外景經上下四方至此得中元父左回明三素三真上元玄父君字左回明守玄牝元父凡三見第八章云元父結胎仙中卷第十章曰元父左回明見前注朱晶啓明師朱晶本名司命之神守心右白元洞陽帝君名朱晶開啓日月三素之光明師一曰白素君一曰陽精皆有兩呼幽寥登上清太一名幽寥人之腎水上升與心火凝合以上田為玉清中田為上清下田為太清又曰帝皇太一重冥空字幽寥四玄秉元禁四靈青龍白虎朱雀玄武秉執元行之禁令四天門王禁斷天門魔鬼毋敢輒入道家齋醮清旦則有命魔法以却不祥迎真降聖人之五臟具四靈守之三合四玄五帝六明七覺八景九光十真皆取十月聖胎堅固脫爐换鼎之道蓋以肝為青龍肺為白虎心為朱雀腎為玄武長保五帝城心肝脾肺腎為五帝城廓五帝青帝曰雕梁際赤帝曰長來覺白帝曰彰安幸黑帝曰保成昌黃帝曰含光細右件玉章天篆計六十字上鎮元明文舉天下統第二壘剛色地土皇君玄契曰誦之五遍永絶死氣浸茂生根萬氣齊生得長生門元始天王曰文昌大洞玉章第六六月生六腑六還四返丁亥戊子大畜頤景氣生遁氣其色碧凝成東北天境號洞元化應聲天此天精魂元陽之氣主中丹田宫帝真靈府命元高真沖融之氣生六腑紫精太無中紫精天在太無空洞之中無色天界三清所都之境在人則腦門是也亦曰天谷萬神聚會之所太無者無色無象三元上景衢三元者混沌太無元赤混太無元冥寂玄通元三氣在上景之衢言人之氣自上中下田循環無窮復歸於泥丸宫秀朗大寶輝大寶玉帝位也清秀光明言人之玄珠烜赫即蒼胡頡黍米珠皆謂之大寶天真貴重有光明輝映故曰大寶昭昭扇帝敷一云眇眇遠大也昭昭顯著也扇動也言玉帝登大寶而清光威焰扇動其中亦如煉內丹光焰迸射於中宫也伯史啓三素命門黃庭元王君名伯史原即三一神也上一赤子中一元皇下一元王又名始精字元陽一名嬰兒胎啓三素君帝臨登玉虛主宰之謂帝人身非萬氣無以育萬神然萬神之中心為帝王心之所向萬神聽命登玉虛者上泥丸宫腦門是也慶氣育五雲五色慶雲祥煙捧擁玉帝東三南二同成五北一西方四共之戊己五為本生數三家相見結嬰兒五雲一曰五靈司命神明初司命乃宰制心宫之神名理明初心宫乃神明之宅初者肇形也心腑是也虛靈知覺人壽天皆應修心故曰司命十華妙行仙十方光華妙行圓滿證登神仙十華即青華丹華素華玄華黃華瓊華金華緑華碧華瑶華共為十華所修妙行制魔生六明六明者六根也在人則先生五臟後生六腑臟腑流通為六明之府六腑者膽胃膀胱大腸小腸臍通作六府是也右件玉章天篆計五十字上鎮上明七曜摩夷天下統第二壘皇德君玄契曰誦之六遍六天大魔永斷鬼鋒六根清靜廣明發生萬氣齊光即得度世進登仙門元始天王曰文昌大洞玉章第七七月開心七竅七還五返己丑大過坎坎離無支干玄氣生融氣其色黑凝成西北天境號靈化梵輔天此天精魂正陽之氣主元穀宫帝真元府命元高仙洞笈之氣開心七竅真陽帝賔老禮天子袒而割牲跪以進匕待三老之禮所謂養老乞言今真陽為玉帝賔老又正一左仙名諱賔老又名仲成子受事會玉皇每聚會於玉虛以受玉帝之事如真陽之朝泥丸也謂之默朝上帝法用紫河車自尾閭搬運入腦十二年成仙滅魔除穢尸魔王伏慝滅馘妖魔除其穢雜尸血之氣陽氣既生陰氣自滅理之然也魔者諸天帝王皆是試驗人心有無堅固百司詣絳宫人丹田宫謂之絳宫即心府也百關之神常詣此宫以聽命令蓋心為萬神之主萬神朝其所主萬事萬物之理在焉逸宅丹玄內安逸之宅在丹田之內丹田上一寸為玄丹宫在頭上見元神聚凝萬氣上歸逸宅玄丹之宫煉習陽神出入之門五氣結十方五方之氣即東方九氣南方三氣西方七氣北方五氣中央一氣亦如五臟之氣流通遍滿身體內外無所不至也七轉司命至七返九還丹道成矣司命至者長生久視之道備矣司命即心神也又曰七轉召司命七轉者七陽金氣遇火成丹三回召仙公三合成音所以召仙公亦神仙中公侯伯子男五等之爵也有太極仙公之類今仙公者即東華木宫主司肝臟太山主鬼者太山主者管領鬼神公事即東嶽聖帝是也太即泰也山在兖州為五嶽之宗故曰岱宗屬東方木乃為生化之地急校三官中校録天地水三元三官宫府中所有生死罪福急者不疾而速也三元宫府百二十曹每年正七十三會全考校不差十德初成基十德中央之土數主脾胃穀氣以生津液蓋十德為成全之福基雞有五德人有十德物類咸有一德人之明德天之所賦人物之所稟受無虧無欠而情欲所蔽所以昏昧故元始欲令人修飾此道以為全德之根此謂知本在明明德也十德具在下卷第八章玄契中載兹不重贅同飛七覺元悟則圓覺不悟則凡夫七覺者心也心之神上通眼鼻舌七竅故七竅開聰七星朗明與兆同升七元斗中七覺者識神也一則生而知之二則知而能見三則見而能從四則從而能習五則習而能堅六則堅而能成七則成而不居此謂之七覺也人能行之進登妙行得成飛仙右件玉章天篆計六十字上鎮虛無越衡天下統第二壘皇德君玄契曰誦之七遍七元斗辰皇妃下降為兆削落死籍移注南宫萬氣齊超得飛仙門元始天王曰文昌大洞玉章第八八月八景生神八還六返庚寅離咸融氣生炎氣其色丹凝成東南天境號高虛清明天此天精魂通陽之氣主極陰宫帝真華府命元真靈化凝之氣生三部八景太素三華氣三華三部也每部八節又曰三華即神氣精也三素元母雌一之神於子時聚下元午時中元酉時上元三宫升降晨登廣靈堂廣靈堂心府也以雞鳴之初登朝絳宫蓋陽氣初生也三素元母亦劾奏罪福之神呈世人罪狀故侵晨誦經却之玉京表玄籍玉京山諸仙版籍所在人之修道常以子時一陽初動靜坐澄心以朝萬氣以避人神奏牘天上之罪福於玉帝前守命核道康桃康君守臍之命門王叔和以右腎為命門人之生死皆在腎腎絶則命脈絶一本核作孩誤又桃核合延生華芒回風散萬魔當其子時陰陽混合以成帝一之道故能除散萬魔陽生而陰息矣君子道長小人道消之時也乃回風混合之道金符召廣鄉以金符召於廣漠之鄉極陰之境使魂爽咸得受生一本云度卿可疑廣鄉者北陰酆都也腎部屬水金能生水也輔衛地户內呵護輔弼於地户蓋存下田以受生氣書曰顧諟天之明命是也地户乃下部命門當愛惜輔衛之不以色欲敗之保此長生王在天則有玉清真王長生大帝專主生化之權在人則存心保守我長生不死之王即浩劫不壞元神為聖胎根本轉入十仙門妙行觀門仙有十種門者無礙門定觀門衆妙門希夷門自在門長生門進仙門飛仙門飛神門登真門之類是也八景齊洞陽八景八門皆身中所具之門户為神氣之所出入又曰三部八景齊入洞陽之宫朱陵火府玉眸煉質黃華蕩形右件玉章天篆計五十字上鎮太極濛翳天下統第二壘皇德君玄契曰誦之八遍八景神生八威神王疆護修真四方八天注舉仙名斬絶地户永斷惡根萬氣齊明得飛神門元始天王曰文昌大洞玉章第九九月九竅開通九還七返辛卯壬辰恆遁炎氣生演氣其色白凝成西南天境號無想無結無愛天此天精魂萌陽之氣主下丹田宫帝真嶽府命元自然玄照之氣闌通九竅紫精育華林紫精字凡四見皆天名至有訛舛今并解注上卷一章高上宴紫清下卷一章逸緑登紫清皆元始所都之天上卷六章紫精太無中蓋紫精天乃三元之氣凝而成天有道君主之名曰三元紫精君此卷九章紫精育華林乃上清境紫精天有育華林葉如竹華如鏡實如李天人得而食之長年不老而登上仙古詩紫精天上育華林絳實朱柯竹葉深咀嚼繁英人不老下觀烏兔换光陰然非下界所能見也在人則腎水黑心火赤二氣交媾化為純陽紫金精華成林華茂果實自己真人餐之亦可致長生之道如生神章耀玉葩黃華野森瓊林之柯於命門文昌經亦曰丹林森朱柯皆同此意以喻人之所養也長眠太無外眠者一定不動之謂如人睡而不去太無者虛寂中也如布袋和尚陳希夷一睡數月塵積遍體蓋真息定也玉房生寶雲玉房一云眉間乃臟腑關節之竅也自然生五色雲氣蓋生氣則生神也經有金房玉室紫户玉闕一時生神同義九扇胞胎內九轉九還丹道成矣受胎九月九氣合成人道完矣此一節謂八月已滿進臨九月氣滿神具聖胎完全待時而動帝賔奉玉符帝君奉吾符非也第六章有真陽帝賔老蓋帝賔乃陽神主祛陰邪奉玉符而行事如國之三老奉上命而正議也三光回紫蓋天上三光日月星人之三光兩目與心日月失度星辰留伏天地災變目有所惑心有所感身體傾危回紫蓋者以其目不視惡色耳不聽惡聲收視反聽則神全而氣凝紫蓋無所不覆故人以兩目為九竅之華蓋光明也日月星能照天地雙目與心能顧一身不令外物之所蔽蒼玉斌來生碔玞者石如玉也所以亂玉者今變而為真玉矣節中黑氣君名斌來生專主內明人之德蒼或作倉非蓋青蒼之玉謂有文縷生也玉以比德茍不至德至道不凝焉內有所藴光彩發泄於外如玉之在山草木無不沖秀珠之在淵江河無不澄湛寶之在懷面部光澤身體康健耳衛此長夜會長夜會在絳宫是為靈府血所生之處覺則長明不覺則長夜衛者匡救其惡也不能愛惜者冥冥長夜何時旦也五靈度符籍五靈者即青靈丹靈皓靈玄靈黃靈也度者授也五老授我長生之符籍矣茅山玉經無以下六句蓋止於此而已九統合九光九統之法以會帝九光之符以集神此乃回風混合之道數遇九則陽已盛此陽純而不已也大洞經自一氣生二氣三氣生九氣九陽為極之數極則變故變為三十六所以此經三十六章有雌一帝真九光聖母專主生育之事或曰元經必誤統紀也上古九皇時有九紀出古典三玄出太清三玄即三三九玄也出太清者下田也外應北都羅酆內應雙腎言祖禰超出此界之外則神升九天永為真人矣紫陽發萬生紫陽玉匱乃注生之府所以發越萬世生根而萬神皆備人無貴賤一是出於紫陽發生此生生之理永不息矣玄精育九靈玄精育乃九魂名天以北為玄人以心為玄九靈即心之九竅九玄受生即因九魂得育方結胞胎故濯質太陽元父結胎仙元父見前注元父心之官則思亦意也胎仙者有氣而無息也下卷云紫華領胎仙黃庭云琴心三疊舞胎仙同義右件玉章天篆計七十字上鎮赤明和陽天下統第三壘石脂色地土皇君玄契曰誦之九遍九統帝會九光神集混合百神與天齊年八會遊集朝應九天萬氣齊仙得登真門元始天王曰文昌大洞玉章第十十月堅固形神脫胎神化癸巳甲午大壯晉梵清景氣其色青黃白凝成中央天境號波黎答和天此天中陽之氣主中元黃庭宫帝真沖和之氣降神布氣堅固形質生於人道青靈扇八極東方始老乃發生之地故扇動八極世界八極乃四正四維是也八卦乾坎艮震巽離坤兊八門開休生傷杜景死驚鼓輪三華城三華神氣精也城者三華所居之地青靈之氣鼓動發生意也輪舌神名言人鼓動舌根攪取華池津液灌溉三田披此胞胎結披一云拔生神章云斬伐胞樹滯此意亦同披拂也解也解其胞胎結習之根也生神章經云胎結解根即此義爾七祖受福生九玄七祖受此福惠而得生天受用快樂若能精進修持不輟升無色天登不退轉地竟陟上真大羅三境侍臣之位宿對滅五道生神章云對盡大運通之對除其宿昔之仇對消滅五道凶惡之事五道者地獄餓鬼畜生修羅禽蟲等難得出離常守帝一營茅山於此分作兩章雌一雄一帝一謂之三一之道今惟守帝一營寨蓋尊大洞帝一也藏教有雌一經雄一經公子執五符左無英公子玄元叔字合符乘東方九陽生氣執把五靈之符發育萬物招集肝臟中九魂神流布天下人道生矣太一居紫房太一在頭即紫户也人身中皆有金樓玉室紫户瓊宫紫户者泥丸之别室也太一君居之掌管列仙得道之籍三合地户下三氣合德三合成音以生氣合於下元宫地户下是死户也乾為天門巽為地户即下田是也已於輔衛地户下注拔命玉帝宫以人合生之命脈拔出躋之於玉帝宫在頭上腦中是也玉京山有玉帝宫上元所主天仙所居修道作善人方到此少女郁墨子斗中真仙在人心中主掌壽天貧富亦雌一之神也乃仙女之屬先天之真氣能助天地而育萬物體大道贊萬化衛兆七氣窗衛兆乃道人自稱曰小兆臣某甲也七氣窗者七竅心也比喻窗牖取其明朗即八窗玲瓏之謂是皆善譬巧喻也拘制盟血液九元真男名拘制守左耳下通於心心主生血并液拘制而盟誓之使之不得為血氣所勝邪氣相乘咸歸正大爾盈滿五臟充人能精煉至真不為色欲所損則津血氣液盈滿五臟六腑三百六十骨節之間充積強壯顔貌悅懌壽等松椿十真登紫房一云黃房非也紫房在腦中十真乃十華真人自下而上升於紫房即腦中明堂宫是也見下卷太玄九氣上玄契帝子化金仙皇一之魂上歸字帝子金者以庚辛白虎煉成還丹餌之則變化氣質為金玉故後章云骨肉金玉實此之謂也白玉飛符招白玉玉京飛符見招至人得此脫胎换鼎飛化自然生神章云慶此嬰兒蛻此十月胎完而生人之道神仙脫胎也引升龍臺天相引上升龍臺之天龍臺即龍變梵度天言變化不測之謂也如軒轅黃帝千口白日駕龍車而登天晉代許旌陽輩是皆乘龍駕雲上朝玉清具在方册昭昭可考乃自己陰陽二氣所化成雲成龍乘駕而去非由外來也玄契所謂變化自然但教十月聖胎完全便可脫胎神化命宗煉金丹十月功圓為了當性宗務參機忽然於一言之下大徹大悟便是了當至於鈍根三二十年不得悟道者二者有頓漸之分志於道者不可不兼有也或謂道不足學其不知三教本歸一揆亦必極其至善之地方止道曰有物混成先天地生視不得見聽不得聞釋曰圓覺真如與生俱生若以色見我以音聲求我儒曰天生蒸民有物有則非禮勿視非禮勿聽此三教聖人之體也道曰真常應物常應常靜釋曰圓陀陀光爍爍活潑潑赤灑灑儒曰充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神此三教聖人之用也釋無我無人儒毋固毋我是皆至當歸一之語何滯而不通何遠而不致欲求最上乘者當留意于此不可執殺賺人性命也右件玉章天篆計九十字上鎮玄明恭華天下統第三壘帝德君玄契曰誦之十遍于形中元命結帝一真人九和十合體自洞真能召制十方御元回靈萬氣成真合德冥慧玄玄無邊變化自然至此修行名曰玄關亦曰玄會六度十回功滿道備位登仙公初心十信次興十善次發十華次成十德漸進十仙遂化十真六位已升妙行大全形神氣煉號曰真人十信十善十華十德十仙十真謂之六位入衆妙門玉清無極總真文昌大洞仙經玉清無極總真文昌大洞仙經卷之五冬五東蜀蓬萊山中陽子衛琪注道言爾時此卷以六根并性命精血津液手足等修證妙行若六根清淨不墮酆都六洞所謂六洞者紂絶陰天泰殺諒事宗天明晨耐犯武城天恬照罪氣天宗靈七非天敢司連宛屢天性命清淨不墮五嶽地獄精血清淨不墮水府地獄手足清淨不墮九幽一十八獄津液清淨能生無英白元太一司命桃康等五神共得十通妙行文昌大洞經行於蜀者久矣而蜀本尚有訛舛蓋自來無人考驗諸實而板行之字經三寫烏焉成馬且如經首道言爾時四字乃玉宸道君所敘當時天王説經如此起發因緣亦猶佛經如是我聞論語子曰之類是也故不可缺略當添置之琪寧受專擅之責成全經旨凡經皆有敘分正宗分流通分舊本無此四宇是無敘分當以道言已下為敘分三十六章為正宗分結經為流通分且此經行於蜀何也蓋元皇帝君始生於吳會即姑蘇是也獲受此經而證果為蜀神仍將此經開化人天元皇再生於丁未帝命為南斗陽官乃注生之司也於是祈嗣者多禱焉始知文昌即南昌也詮德鈞物長養之職按史記景德末樂學士為西京留臺御史忽夢一人具冠服稱帝命來召樂遂往俄見宫闕壯麗因問使者曰此帝所也既升見帝謂曰汝主求嗣吾為擇之少頃選一人至帝曰中原求嗣汝往勿辭其人頓首求免者三帝曰往哉傍拱立者曰此南昌赤腳仙李守微也明年果生仁宗是知文昌為嗣祿之司者明矣此經每句主一事人能行得一句亦可作上仙况全帙持誦豈無報應乎夫今世有為黃冠至老死不知有文昌大洞經之名者有見經中不言善惡報應之説而束之高閣者有心雖好誦而不知義理者且善惡報應未嘗不言謂如拔出五苦毒超形過始青若無罪安到五苦若無福安到始青如此等類不少其他諸經皆曰誦持是經是經者其意果安在哉蓋是經者指此心而為言也若人不能謹持此心欺謾恣縱放僻邪侈干犯非理生則致於惡疾狴牢死則委之溝壑蠅蚋天地鬼神奚暇置之阿鼻無間以逐逐於考掠哉佛書云假使經百劫所作業不忘因緣會遇時果報還自受傳曰禍福無門惟人自召豈非善惡報應哉今將經驗比附於此庶幾覽者起敬信心逐一修習以期登十仙門若根器淺薄亦得明了前境作尸解之道尸解有五水解者投水火解者自焚金解受刃木解倚樹化土解鑽山入石玄女有修五解法可脫大難避陰追遁他所投胎奪舍元始天王眉放青毫大哉聖人之道洋洋乎發育萬物峻極于天觀三教祖師垂世立教未嘗偏執而人強自分别曰釋氏主性道家主命儒家主理殊不知三者一而已釋迦説法眉放白毫元始説法眉放青毫兩聖人示現相好豈異致耶蓋白毫西方金氣雖是表性命在其中青毫東方陽氣雖是表命性在其中性命之道相因以成人中庸不云天命之謂性率性之謂道上天賦與我者命也我稟受而生者性也凡言性則命在其中言命則性在其中故此中卷七章云性命宗本堅性命果何物也以性言之則曰仁義禮智而四端五典萬物萬事之理無不統於其間以命言之則曰元亨利貞四時五行庶類萬化莫不由是而出此天理之灼然而人以私欲蔽之而不能克復本源之清淨故聖人因人所稟賦而修明品節垂世立教俾人盡至誠之道則本來面目復見于前所謂惟天下之至誠為能盡其性至於參天地贊化育如示諸掌或曰子注道經而引佛經儒書得無過乎琪曰三教聖人本以匡救人惡欲人皆歸善道而已故曰天下無二道聖人無兩心如人入城必由其門至於長府則一也門户雖異所致不殊若人各極其志何往不可耶琪是以將典誥會同而釋之奚罪焉頂旋紫氣萬華寶蓋浮羅覆形紫氣者陰陽二氣合成為紫以此示命元也紫氣之中化成萬華寶蓋覆廕法身人之頭上亦有華蓋而自不見也經云紫雲覆黃老是為三寶君正謂此矣人能修道則鬼神莫能窺其際唯見紅光勃勃射目玉光金霞紆絢晃曜如玉之光輝金之霞彩紆絢晃曜爍射天人之眼目如十七帝光是也皆自身中出玉宸道君太玄道父稽首顒佇願聽洞章洞經題下有太玄道父牛孳先生集至此方見玉宸道君太玄道父玉宸乃靈寶太玄人或以為太上余亦疑之正釋此向夢故家廳事前群牛又一牯見觸余以杖禦之中其左目牛足著吾臉豫咬得一趾驚寤一日偶見實録云太上八十二化身為玄武號太玄又仙降曰牛者玄武之精方憶禮記牛曰一元太武因知太玄牛孳乃玄帝也前夢無虛玄帝生於黃帝時上天開皇初劫紫雲元年歲甲午三月三日真武經云甲辰誤至十五歲童子學道修行四十二年飛升於紫雲五十七歲庚寅九月九日也拜太玄元帥永鎮北方至上天龍漢二劫殷紂無道魔鬼流行傷害生靈毒氣上衝元始命之收捕有功令復坎位拜鎮天玄武大將軍後於上天真化三年即嘉祐二年也三清委玉帝考功三官四聖位當亞於天帝下翰林修撰玉册拜太玄為玄天上帝因知此經在拜太玄時重出本一百二十卷太玄集此三十六章亦三十六部尊經之祖以便修習亦猶大度人經上品妙首無異顒佇者仰望也誠敬而已矣願聽者俯聽也整齊嚴肅主一無適惟恐禮貌之不恭俯仰之失節所謂齊莊中正足以有臨也道父之心推己及人所謂夫子之道忠恕而已矣豈不欣欣然有喜色而嘯詠哉此下以六根并六洞宫順取庶不紊亂大旨元始天王怡然嘯詠曰文昌大洞玉章第十一乙未丙申眼根洞觀道眼始通明夷家人敘經乃玉宸道君所敘經之因由緣起謂之敘分正經元始天王所宣珠光之音謂之正宗分結經亦道君結括一經之旨謂之流通分皇上超無景眼之於色為業甚大眼見心欲心動神疲是以五臟之神皆從眼漏為第一根眼竅通心心乃神宅眼既見心必動也皇者大也上者高也言道之大而高超出乎無色之界無色無光謂之無景經中景字三卷共二十八字八景運常寧八景齊洞陽八景照泥丸太清八景觀四句同義洞明光景中太一景中王携此景中人氣出華景中常保景化內一義太極元景王太素拂眇景赤景翳逸寥洞景寄神通太極玄景童羽景太無庭金闕上景氣混一玉景氣晨中黃景氣同類皇上超無景太虛空無景一類乘景晨中暉駕景登絶霄一類帝一上景朗朗生帝景二元上景衢一類八真合景君千景併生矜一類三天焕九景義别字雖同而義各異有以車輿冠服講者有以旌珮節幢論者有以光景氣色辨者有以神真名字説者諸經傳中有景晨明霞之冠之服之節之輿不知其為物何如也而以琪意度之便如今時官貴有七寶冠帽束帶鞍轡之類是也玉皇經九霞流景飛雲玉輿同今無景者無色也人能收視內觀自到虛無自然境界輪轉九曜停一云九曜生必誤如日月停景璇璣不行之謂也人之一氣在乎鴻濛混沌之始而不能存育以眼根所漏今則既知而修即超出無色之界故璇璣玉衡一時停輪以俟兆之所證也在天則運轉機軸以九氣化育天地萬物惟北斗七元日夜循環所謂璇璣玉衡以齊七政在心則有七元運用與天之九元同此不息之機也是故為人終日乾乾自強其志以應天機也曜者眼神明曜眼光一定則九竅俱息矣詩云子懷明德不大聲以色同義回風混帝心帝心即道心也人心惟危道心惟微惟精惟一允執厥中蓋心之為物湛淨虛明如鑑之空衡之平所以為一身之主包萬理應萬事雖鬼神有不能窺其際者一動一息莫不繫於其間所以大學之道在正其心也老子曰五色令人目盲人以物欲障其心目不能見天地之化故聖人立教收視反聽黜聰明離聖智為急務若能存其心養其性則天地萬物森然見前孟子曰養心莫善於寡欲人能寡欲則得顔子坐忘之心齋故聖人洗心退藏於密欲道成也此章以眼根修證蓋眼有數説佛經載肉眼天眼慧眼法眼佛眼蓋肉眼者凡夫也世人云俗眼是也佛眼即道眼也以常人之情以俗眼觀天地真人以道眼觀天地道眼何在必曰一心也內而五臟六腑以膚體隔絶外而有五運六氣以天地隔絶若俗眼觀之皆不得見也若以道眼觀之則徹視表裏九天之外塵芥之微無不洞燭也回風混合者天地之氣相交以成帝一真道三昧帝心也人亦如之以津為龍以氣為虎運轉之道在此二物易曰雲從龍風從虎聖人作而萬物睹理相近也後九章云帝心大玄通昔俞靈璝河間人受習大洞回風混合之道一行二十年坐見天下事然自晦不為異貌常若三十許衣弊自若人或問遠年近日事對如目擊人敬之且曰偶然耳非所知也口不絶誦太洞經或絶粒而飲酒後忽登仙是得回風帝心焉人以雙目回光返照則真氣隨而聚於元宫謂之回風混合八景運常寧一云八氣非也以心為天以腎為地心腎相去八寸四分天地相去八萬四千里神風橐籥故天地安鎮人以真氣運動故身體長寧人之三部八景自尾閭至百會三節為一關三八二十四節以應二十四氣上部八景腦神覺元子字道都髮神玄文華字道衡皮膚神通衆仲字道連目神虛監生字道重項髓神靈謨蓋字道周膂神益歷輔字道柱鼻神沖龍玉宇道微舌神始梁峙字道岐中部八景喉神百流放宇道通肺神素靈生宇道平心神焕陽昌宇道明肝神開君童宇道青膽神龍德拘字道放左腎神春元真字道卿右腎神象地無字道生脾神寶元全字道騫下部八景胃神同朱育字道辰窮腸中神兆騰康字道還大小腸神蓬送留宇道厨胴中神受亨勃字道靈胸膈中神廣瑛宅字道仲兩脅神辟假馬字道成左陰右陽中神扶留起字道圭右陰左陽中神苞表明字道生在人常以紫河車搬運真精之氣上升泥丸也常久也寧安也使身體常安也或曰八景八門即遁甲所運也昔施存事黃盧子得三皇內文乃八門遁甲能行遁變化景之法役御虎豹晉永康元年四月七日乘豹登天號沖和見素真人乃八景明驗廣霞參神天天神一萬八千人神一萬八千共三萬六千同理陰陽造化者也詩云神之格思按青城丈人説髮為青城君頭為三台君兩眉為紫極君兩目為玄爽君左耳為聰明君右耳為決明君鼻為天妙户君口為牙門君唇為玉尸君齒為二十八極元士君咽為校尉君喉為九卿君肝為絳宫君肺為華蓋君膽為長命君心為丹田君脈為紫帛君胃為太倉君脾為黃庭君左腎為玄妙君右腎為玄元君大腸為食母君小腸為導引君腹為太道君三焦為玄老君左足為雷電君右足為雲氣君凡三十六生氣君皆應於一身通身相體同滋識用易云陰陽不測之謂神知變化之道者其知神之所為乎又曰神無方陰符云人知其神而神不知不神而所以神也蓋神之為物惟意所主故廣大之雲霞參謁神天亦名谷神不死蓋泥丸為百神聚會之所人身之神相聚會合於此其聚也不疾而速不行而至也然神用藏於視聽若不從眼耳之漏則方可凝集也故度人經云下鎮人身泥丸絳宫中理五氣混合百神是也人身與天地無異同此神氣五帝散日精今夫天斯昭昭之多日月星辰繫焉蓋神天之上有日月如人之頭有眼目五帝見上卷長保五帝城注並同此卷第三章云日中開五暉正與此句同義蓋五帝者青帝護魂白帝侍𩲸赤帝養氣黑帝通血黃帝中主乃五行之氣天有五星地有五嶽人有五臟上下相應但人恣一情之欲如喜怒哀樂動之於中發之於外則本方之鬼神十目十手之指視是其所以祥禍福莫不相應而至所謂禍福無門惟人自召日精月華若人服之能令面色光澤身體強壯所以上卷云慶氣育五雲五氣結十方五靈度符籍盈滿五臟充五老輔玉根此卷云血凝五華平日中開五暉五臟植玉根俯仰邀五靈五神回孩嬰舐煉五牙珠拔出五苦毒兆有五符籍魄伏五道密五符閉地結五符編紫房五籍標圓庭逡巡五老翁下卷云五辰號發紐咽沫生五芽斂神保五籍混合五日房五道秀金華五老變孩蒙太張上五符五臟映清夷五魔伐六陰五氣理中頡五道焕三天五老飛玉軿五嶽應命到五嶽啓靈户五嶽一來庭五雲鬱絶空五老揮絳華左把五符籍如此等類皆五行之氣流通於三才中為尅化生育之本散日精者布陽和之氣參贊造化發育萬物也人常以日精之氣條理五臟保合太和所謂乾道變化各正性命也五臟和則五典備不為五神所劾五嶽所按五星所照五帝所奏則五籍改注豈有五運五道五苦之拘束哉君子所不可及者惟人之所不見乎液逸玄中膜逸字七處逸宅壽逸逸紫空逸緑逸上清逸寥安也樂也天地以水運轉循環無窮故不朽壞人以津液流灌五臟是以不死若津液一乾神無所滋形必壞滅玄中膜是北方之水幽在一層之內人身中腎水亦在脂膜之內津液血氣常使充滿灌溉滋潤則身體強壯顔貌光澤血凝五華平紫緑緋華非正色皆為外物雖目擊華嚴富貴天堂快樂亦不足戀於心五華者青華丹華素華玄華黃華言內自有華色人以血氣滋養五臟則玄珠自生黃庭云灌溉五華植靈根五華既凝化為四靈備守中央豫章道士蕭惟億宇勉之雲遊至江州廬山祥符觀喜幽勝而樓焉日誦大洞經忽瞑目見四靈備衛遂大驚悟由是神采頓異出言非常忽自能詩年九十餘而白髮反黑步履如飛淳熙中辭衆坐化有徐欽鄰師事惟億後亦坐逝去體寶圓珠映大洞仙經之號曰蒼胡頡寶而上中二卷不見至下卷方顯言之寶與珠一也即身中一粒金丹是也謂之摩尼寶珠又曰黍米珠玄珠明窗塵還丹神丹玉壼丹紫金丹金液還丹刀圭大藥聖胎嬰兒千名萬號不一而足大非外料金石草木之比蓋以自已神水華池金晶玉液朱砂水銀真鉛真汞龍肝鳳髓姹女嬰兒修合煅煉之所成也故上卷云秀朗太寶輝上館雲珠內中卷云舐煉五芽珠寄頻携運珠下卷云領玄蒼胡珠友寶赤氣王蒼胡頡光華日中一運珠洞焕圓珠藹皆此義也儒書所謂天地未判形如雞子寶之一字豈苟得貴能應用無窮隨心所欲無往不備至如世間亦有如意寶人之所求悉如其心魏王有珠前後照十二乘隨侯之珠卞和之璞為世所珍況天上人間天堂佛國龍宫海藏豈無至真至貴之寶今元始寶珠有二度人經云元始於大浮黎土虛空之中懸一寶珠大如黍米元始先登真仙後從皆入珠口不知所在由此言之珠雖小而容衆甚多何哉釋氏所謂芥子納須彌微塵之中亦有剎土蝸角之上能戰蠻觸朱子所謂其大無外其小無內善財樓閣皆見彌勒無量珍寶以為莊嚴及其一悟正覺向來富貴皆在普賢身上毫竅之中維摩丈室能容三萬二千獅子座玉皇經云十方天宫皆有上帝應化法身説法既畢俱復一體何小大之不一分合之有異耶所謂散之彌滿六虛斂之則不盈一掬前輩謂看一部華嚴經不如看周易一箇艮卦誠如是也蓋人收斂真元寂然不動則天地萬物森羅在前老子云致虛極守靜篤萬物並作微塵可以包乾象一真可以應萬方六合之大不足以容其身一芥之微尤可以騁其遊耳此寶珠一曰蒼胡頡一曰圓覺一曰如意輪又曰圓如金彈色同朱橘皆諸聖強名托象無非化導未悟魚兔既獲當捨筌蹄而不用流耀瑩兆形道不遠人常引伐柯之誚人能弘道當存責己之規有諸己而後求諸人有諸內則必形諸外所以發輝流彩瑩徹一身所謂見於面盎於背潛雖伏矣亦孔之昭也夫微之顯誠之不可掩如此人能以道自重潔己避地晦迹韜光不求人知而人自知不欲人見而人自見可謂盛德號為壽逸阜壽逸阜日精之名人身中精神光彩自然享壽釋云若有人我衆生壽者即非菩薩大率壽非人間之壽也人生百歲七十者稀何名為壽若以此等見識安知本來亘古歷劫不壞之壽相哉此壽相充塞天地量等乾坤與萬物均齊與衆生同體露堂堂赤灑灑豈有限數拘束哉亦曰澄源亭欲升高必自下欲登阜必自原亦左右二眼之分澄源亭月帝之名源澄而流清也亭古文如樓臺諸仙所安集也俱滅三惡機三惡者貪嗔癡是也人能斷此則不墮三惡道得見三寶天君機者動之微吉凶悔吝繫乎此也所以君子見機而作不俟終日也三惡道地獄餓鬼畜生此三者極陰之地難復人身也故修煉純陽以滅其機軸經云請滅三惡斬絶地根同君子戒愼乎其所不睹自然滅惡機也啓籍登大明大明者明四目也一云太明非也坎水永隔於離明正照之境故聖人南面而正天下玉帝所居通明大殿故人登仙開示仙籍注名然後朝謁玉帝也後云捧籍登大明此則喻人以明明德為上自己德性明白不為色欲所蔽即為大明之人為賢聖為真仙皆欲不昧靈性為自任令我保仙真有天地然後有萬物盈天地之間者惟萬物萬物之中最靈者莫若人而不能修省其身以致墮三惡道以大洞仙經修煉至此方且滅其機而登大明保仙真矣一云使子保仙真上之諭下云使子下之告上云令我兩皆不妨大義保我自己之真氣為仙須要自保人不能保我也仙綬披緑青玉帝賜青紫之綬使兆披服以朝謁謂之選仙舉進士亦如人間登第先授青衫下章云披朱中緑霞同皆仙衣也解禍冥途中既已登仙籍則禍沈九地之下冥冥之途矣人間得官則封妻廕子榮庇族屬為一時之榮人能沖虛豈不貴重哉超福晨上靈諸法官能斷決疑異雖無所養死為陰鬼取為陰官四十九年一轉人皆如之若能內外交養福慧雙修即證仙道以自己之真靈受福於景晨之上快樂逍遙矣凡晨一十一字天晨金霄遊太陽化三晨晨中黃景氣高晨映上清乘景晨中暉七晨回帝席玉户映晨霞超福晨上靈併羽月中晨晨登廣靈堂晨登天老室不可以一槩論當隨經義解釋人不能閲藏教而據他人所傳之本而擅自更改經典者愚懼其冥責莫逃豈可不戒之慎之焉度世登玉鄉過度劫塵登入玉鄉玉比溫和也太陽道境無炎寒之苦四時如春氣之和故曰玉鄉大羅無日月故無晝夜寒暑纍祖返胎嬰纍世之祖禰玄曾反胎更生皆變嬰兒之形謂之大洞帝尊示現人或以為不載禍福既無罪何用救拔為此經拔度者一十六處可見念念在乎玄曾祖禰升度方許己度天王之用心至矣哉今纘類于此南拔七祖根七祖積尸結七祖絶滯塞七祖返胎仙七祖斷玄滯七祖散積滯七祖生福堂解結生七祖七玄登朱宫七玄離幽扃散禍寧九玄九玄解重結西解纍劫凶纍祖返胎嬰纍祖落寃名此等即度人經五苦八難七祖升遷魂度朱陵也又曰為上世亡魂斷地逮役人欲求仙道當令身心清淨清淨者無染無著不增不減自己清淨可作功德感動天地超拔祖先廣度群有然後自度已身則無愧矣洞觀無礙空洞者通也即十通妙行也以俗眼為觀平聲以心目內觀去聲上視九天下視九地中卷十章謂之十洞此大洞之標題也洞觀無礙空洞微無障玄洞空清淨玄洞虛清淨和洞靈清淨行洞真清淨身洞玄清淨光洞源清淨光洞明清淨光洞清冥智慧謂之十大洞妙行妙果圓滿始通生因明易曰懸象著明莫大乎日月日往月來則寒暑生人無日月則道理不見天無日月則冥冥長夜故明字以日月二字合成道眼始通無所不見雖纖塵如秋毫之末無所逃遁經云聖日聖月照耀金庭又曰聖人以日月合其明大人者內明而外暗常人內暗而外明故隨事物轉移驪珠湛方瞳聖人方瞳舜有重瞳言人道眼始通如驪龍頷下之珠明瑩透徹若了達之士通身手眼觸著磕著何啻千手大悲內外洞照清表裏洞燭清淨無障是天與其鑑也人能修大洞之道仰觀九天之上俯察九地之下萬事萬物之理秋毫無所隱漏大洞金丹須採鉛汞古云潭底日紅陰怪滅鉛為陽氣山頭月白藥苗新汞為陽精以陽歸陽則雙目如金星能通乎晝夜之道日用左目夜用右目以代日月之明也右件玉章天篆一百二十字上鎮曜明宗飄天下統第三壘帝德君玄契曰真人得洞觀清淨道眼始通無障無礙內外洞明照見一切能斬酆都山紂絶陰天宫惡根地根魔籍鬼帳常以天花飛香供養元始天王元始天王即我歷劫不壞元神非由外有散花飛香進登人仙中卷十仙即胞胎魂𩲸靈元華嶽藏府元命是也自一月生胞次第生長已至轉入十仙門已於中卷意根妙行全十真下注法人必難省今於修真書中取十仙以益之人仙者壽至百歲已上黃歷見人之世數如老子九百歲彭祖八百歲之類是也元始天王曰文昌大洞玉章第十二耳根洞徹聖耳梵通丁酉戊戌睽塞玉晨九天司耳根者但聞音聲感動靈明隨聲旋轉為善為惡頃刻有異毫釐之差千里之謬所以舜好問好察禹聞善言盜跖喜聞為惡紂樂聞音聲皆耳之聽昔有僧坐襌有鴉噪其上或問曰聞乎僧曰不聞曰何故不聞曰聞中不聞以此觀之聞亦未嘗不聞但不留之於心玉宸靈寶在九天之上九天有三自一氣生三氣是為三寶三氣生九氣是為九天乃生神之天謂鬱單無量天之類是又有八梵九天始青天太青天始丹天大丹天始素天太素天始玄天太玄天大梵天亦謂之九天又曰高上神霄南極長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓君丈人九天採訪真君是為神霄九宸掌生殺之權發號施令雷動風馳故萬物莫不由此而成始而成終也所以玉宸道君主之在人中脘太上大道君道君者有道之君也昔靈寶降生為西那國王天下太平百姓稱之曰有道道者蹈也誰能出不由户何莫由斯道也皆明德新民之事自家及國以至天下皆能上行下效老子曰修之身其德乃真至天下之普中庸曰道不遠人人之為道而遠人不可以為道修齊治平天下之大事豈不由修身正心誠意然後可以平治天下乎然有道之士務在濟世利人桀紂無道百姓罹禍周文啇湯拯民於水火之中為解倒懸之苦後世歌之為有道之君常保景化內玉經天子王侯得奉之者致國太平故富國安民強兵戰勝外無寇盜之撓永保社稷持誦是經專為國王帝主君臣父子安鎮國土保天長存喻人精氣充滿身體強壯無有邪氣所侵自保壽康故保持光景造化之內毋使失墜毋令外邪亂其至道敗其靈根盜其至寶可保景化九回鏡中清九和十合如鏡之清明洞見事物玉皇經云敗其靈根盜其至寶蓋不能得保守景化也以致鑑不空而衡不平矣昔陳與明得明鏡之道修鍊十八年以晉太康元年三月初一日飛升又太康中新野先生鄉人張如珍遇神人降於室傳明鏡洞鑑之道曰夫燭物理者天也鑑物形者道也天之道以清鏡之道以明審而無差形定於此物應于彼故川嶽之狀鬼神之情無所逃而隱也天以清而容萬有水以澄而鑑衆形若夫天清鏡明澄心靜神而得內外洞徹則至道成矣倘外役於物而內勞於神心神昏濁不能澄清則去道遠矣此法吾受之於長桑公子長桑公子受之於太清天帝子若修之能洞達玄通遐照八極夫洞真法中有四規之道依四時而行亦與此同體古人所謂虛其室白自生定其心道自成信矣哉如珍修之九年徹見千里無一物可隱以梁天鑑十三年十一月十八日飛升號全真達道真人此乃九回鏡中清之旨趣焉此經一句主一事若人行得一句即與道合真而為至人也又有李士寧軒轅鏡之説具在别傳解帶玉映室玉映室乃上清玉宸宫在人中脘神室既解結滯則如玉之輝映詩云相在爾室尚不愧乎屋漏恐懼乎其所不聞乘素入四明素空也耳之於聲也乘空素而達四聰肺部童子素明字無英明者日月交合而成字始制文字者其知造化乎携提日中王日中司命接生君字道靈携提者不暫捨也凡言日者十句混合五日房三日映玄敷日中一運珠日為三矜交五帝散日精日中司命童日中開五暉混化啓明日飛霞散天日海日自東生之類日中真靈乃太陽之精在人則坎中之陽兩腎間一點明瑩者日中王也以子時建生併羽月中晨兩耳分陰陽故有日中王月中晨如祖天師鬱儀結璘之真訣皆主宰日月之神也携提併羽者欲常提省接連不昏聵也昔陳先生與楊太初遇真人聶紹元傳二景高奔之法後得道飛升古詩曰聖人奪得造化意手摶日月安爐裏微微騰倒天地精攢簇陰陽走神鬼又曰若人間我修行法遙指天邊日月輪又曰日月交合時便是生身處本來面目真勸君勤照顧經云聖曰聖月照耀金庭日月合璧乃月晦夜交合也內丹於此下乎修合太一召天魔上卷略釋之太一乃水精元之氣所化天地之先一數生水以成象人生之前一氣之精感化而成形非水無以立天地非精氣無以立人身老子曰天得一以清地得一以寧神得一以靈萬物得一以生所以太一為萬神之宗主故能執符以召制六天大魔大洞經中凡言太一者有十如上卷太一務命根太一居紫房中卷太一召天魔携提太一真下卷太一上元氣太一儔丘蘭太一楊威明上携女太一羽節命太一太一景中王等是太一之神於五神中併而為一是故五臟皆有太一亦猶天地之間無處無水也在大道中謂之太一天尊諸天謂之太一帝君九天之中謂之碧玉宫太一大天帝專主水事斗中謂之太一五福諸地謂之太一尊神雌一女真謂之太一元君在人謂之太一之神隨處莫不皆有太一居人腦中人有罪福小則太一簡閲奏帝大則三尸奏事重則三官鼓筆所以太一乃人神之領袖也得一則萬事畢孔子曰吾道一以貫之人得一而生既已生矣復能守一則此道大明及至成全一亦何在識者宜盡心焉僧問萬法歸一一歸何處丹經云既至成時一也無蓋欲人無所執著欲求魚兔須藉筌蹄魚兔既獲筌蹄可捨又云過河須用筏到岸不須船釋應無所住而生其心帝君較萬精帝君一名七靈一名逢凌梵常守人兩眉之上執符把籙攝召六天大魔金書云太一執符帝君品命即此二真也拔遏死積氣小救苦經云祥煙塞死户蓋魔王檢較鬼精遏塞死户保舉仙人也生神章云元君遏死户是也以此為生生之命根越度仙黃庭黃庭中央仙庭四方八面朝此在人脾胃主管穀府有神曰黃寧童消散尅化以滋養四靈故越此庭則立三關已帝立三關上三關天地水亦天地人上關泥丸中關絳宫下關氣海亦曰三要在易為三極之道黃庭云三關之中精氣神是也八風舞神兵莊子曰汝聞天籟而未聞地籟汝聞地籟而未聞入則八風八方神氣也四正四維皆起思風和暢則千真萬聖歡慶鼓舞人身之氣暢快則萬神怡然氣一不和脈一不調則人神悲泣人神悲泣則將離去身體神離氣絶人將死滅可不慎歟即上開八門飛天法輪運轉精氣也左抱福醴液福醴香美之酒亦曰瓊漿玉液蓋一身之氣液灌溉本源本根者腎也腎氣上通於耳兩腎居下而腎之門户在上所以下實則上聽聰福醴亦謂之水銀神水木液黑龜精赤鳳髓金液金華玉池金精鉛汞皆丹料之異名也惜精以養氣惜氣以養神惜神以養虛大洞之道備矣右提慶元瓶慶元瓶者謂之玉池華池偃月爐懸胎鼎玄門牝户黃庭真土金鼎皆丹房之器皿也二者缺一不可故丹道成矣洞微無障玄洞聽隱微無有障礙蓋洞微者乃聖耳通之妙果妙行此即六通之一也人能修習可洞聞九天之外九地之下梵通生虛明虛明者心也自誠明謂之性心者性之宅得誠明之性自然視思明聽思聰梵通是聖耳無所不聞無音聲可逃也貫顙聞十方顙額也上窮圓頂下盡方輿無不洞達也十方四正四維上下共十方蓋自己梵通虛明普徹上下四方無不洞聞豁落一切聲一切大小音聲豁落響徹不逃聰聽蓋同聲相應無往而不聞也如聾聵者疾雷震山而弗知豈可容易回其本性哉人能六根六塵悉皆清靜即能運六神通得大自在耳根在腎多以色欲撼搖精氣耗散早致聾聵須仗大洞招真致靈返回神明宣通開導復全本體方證洞微妙行右件玉章天篆一百字上鎮竺落皇笳天下統第三壘帝德君玄契曰真人得洞微清淨聖耳梵通無礙無障內外虛明聞一切音聲能斬酆都山泰殺諒事宗天宫惡根地根魔籍鬼帳常以丹果供養元始天王結帶生核進登鬼仙鬼仙者人死而英靈不昧焄蒿悽愴昭明能禍福於人如今天下州縣城隍土地關羽張飛之類是玉清無極總真文昌大洞仙經卷之五
