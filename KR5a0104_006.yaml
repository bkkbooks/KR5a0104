front:
  text: 玉清无極總眞文昌大洞仙經卷之七冬七
  hash: sha256:07b7c57a56e4309d7b9412453f1e29ecf85f3ad347f6532afdb0e459c8319712
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_HFL_006-001a, image: hfl/0052/0052-132.png}
body:
  text: 東蜀蓬萊山中陽子衛琪註元始天王曰文昌大洞玉章第十七手足洞靈手足力通丁未戊申井革皇初紫炁中或曰人有六根胡爲又有手足等類殊不知情欲一起皆是根塵即釋氏所謂五陰六入十二根塵便是蓋手足之力在乎養炁神炁全和躭樂五道不知手之舞之足之蹈之也皇初紫虚元君在紫炁之中亦云紫尸在玉京山後户或以紫炁爲紫元以其字相類故傳染誤人問十二菩薩曰擔屎漢在乎負荷有力耳手力者勇猛精進不退初心遇大難不屈縮即傳謂擇善而固執二教謂堅持固守非謂以手執持之也足力者眞履實踐於歩趨暉光鬱霄明其光暉暎鬱明於重霄之上人之手執足行无非正理故有紫炁生腦而焕明霄字有九天神金霄遊琳和九霄外明眞焕九霄玉帝乘朱霄法垣興朱霄駕景登絶霄三秀登霄庭暉光鬱霄明回霄飛垂漠共九霄而義不同非特爲霄而蓋有冠佩車盖之稱也隨人所見而得名耳三天焕九景三炁生九炁是爲三寶九天皆清净太陽道境景光焕燦長春不夜之天手足頭名三關以護九竅務欲聰明光景離合億萬生乾坤其易之門耶離合即闢闔也易曰闢户謂之乾闔户謂之坤乾坤變通則有生生不窮之理其道炁離而復合披朱巾緑霞言皇初紫虚元君頭包赤朱之巾身披緑霞之帔上卷第三章緑霞焕金墉一云六霞錯誤以音類而誤書字上回寒童靈寒童乃青童君東方蒼龍之地皇初紫虚元君恐其尸位而苟安不能生育萬物故回其靈於萬物上使各得其所抜出五苦毒拔出三塗五苦之荼毒前篇拔出五苦界今曰毒蓋五苦界中尤有五苦之毒在謂火車寒冰嚴寒酷熱辛酸之炁超形過始青八梵九天東方曰始青天太青天此言人超度形神使其越過始青之天方至欲界色界无色界方至四梵種民天方至神霄九天无上三天子細歷數各天動計數萬里信知其不可階而升也然而有道之士通達明了不涉關津不勞登陟動一念之頃可以直造圓頂之外矣白素啓蕭仞白素右元君名啓明蕭仞即白元尊神開啓蕭臺之仞前云紫素无英也此名三素三仞乃三神名一云黄素太謬金門衛朱兵西方七寳金門其門森衛皆朱兵也此其以喻眞火煉眞金而丹道成矣此言白素右元君字金門上兵衛森嚴七祖積尸結西方七炁之天尸結陰凝也所以七祖神靈結媾其尸血之根凝積穢濁之炁不得解散以俟運通數合道炁流行一化百惡傾以眞火一化金无重鑛以陽消陰也以道炁解釋七祖之尸結使千邪百惡一時消散矣累劫祖禰一時更生矣受福東霞室東霞室一名青華長樂宫太陽所出仁化大行萬物各得其所故曰受福前曰超福如善財受記於福城東是表命反胎朱火庭雖云受福東霞先當赴南丹朱陵火府金液煉形方可居之藏教載神仙并人道不度南宫不得升化在南嶽衡山洞靈清淨行人能證得洞靈清淨之道功行方爲圓滿矣盖洞靈清淨妙行務欲精進不染一切執着之想若執着則力不通矣力通自冲明得炁力通故冲哲明達剛勇强壯此非常之力也乃宇宙在乎手萬化生乎身之力也智仁勇之力在人力行之耳淨眞手握斗清淨至眞能以兩手握挽斗樞非挾山超海舉鈞扛鼎之謂乃人爲天地之盗竊其炁以自奉故得大壯大神通足躡九元星雙足可以踏躡北斗九元星北斗本七星外輔弼二星故曰九元經云足躡北斗跨踞魁罡皆在心存非實以足踏揮執天地關以炁力通故把執揮荷天地之關天關地軸乃斗樞也晝夜璇璣玉衡以齊七政地軸三百六十遞互旋轉以運風輪以皷載方輿昔共工氏爭天下怒以頭觸不周山所以折其地軸是也兹言天關不言地軸盖總言之也黄帝素問天眞論云上古眞人提挈天地把握陰陽獨立守神故壽蔽天地盖同此義此章言炁力通盖力在乎養炁炁充則力充炁衰則力衰故在貴其炁固其根始得强壯故能揮執天地之關軸人之關在乎陰陽二炁也精神生命根精者神之本炁者神之用形者神之宅故神太用則歇精太摇則竭炁太勞則絶是以形之生也以其有神也神之有托者以其有炁也精竭則炁耗炁耗則神離神離則形死矣比之於燭燭盡則火不居方之於堤堤决則水不住故精神者一身命脉之所關係可不慎歟人所當厚此章以力通爲妙行力者非手執足行之力即釋氏五力十力也五力信力念力精進力定力慧力一是處非處如實力二知三世報業力三知諸襌解脱三昧力四知衆生諸根上下力五知衆生種種欲力六知世間種種性力七知一切道至力八得夙命智力九得天眼能觀一切力十得漏盡智力通爲十五力具載藏教不可誣也右件玉章天篆一百字上鎮元載孔昇天下統第五壘金粟澤地土皇君玄契曰眞人得洞靈清淨手足力通把握揮荷飛歩矯躡往來指措一切无礙能斬九幽地獄惡根地根魔籍鬼帳常以靈茶黄芽金蘂供養元始天王輪歩九光進登天仙天仙者修煉内外金丹功行圓滿飛行三十六天遍觀天宫妙境快樂自在如鍾吕眞人是也元始天王曰文昌大洞玉章第十八性命洞玄元命靈通己酉庚戌鼎震中央黄素炁此經順性命之理以立三才故三極之道各有攸司若能窮理盡性以至於命則歸大道矣故心生則性滅心寂則性見所謂成性存存道義之門黄素黄老君名此章以性命主意而言故脾主中央戊己之土其色黄其炁亦黄故度人經云黄帝中主萬神无越中理五炁混合百神又曰黄中治炁總統元君所以人之性命根本在乎脾胃剋化穀府滋養四靈則性命可以長保在丹道謂之地䰟丹母刀圭黄芽黄華黄男黄牛黄庭穀府眞土黄婆土釜八卦爐之類是也故五嶽五獄皆屬土昔向子文寳歷中官衡州遇龔長慶謂曰吾師司馬隱元爲委羽洞天仙官人之功過皆隸五嶽洞天聞于九天使者我師授我以中黄太一默朝上帝之道吾今修之子文告願從南遊長慶止以不可翩然而往是知能修中央黄炁其道可致神仙此言黄素中元君圓華黄仞所主之洞章圓華玉壽靈圓華亦名黄華乃胃脘也亦諱玉壽靈主剋化穀府之神也能剋化穀府則炁渾而有壽夭壽不二皆在修積致之太張上玉門太張上黄素老君之字也玉門者人腦中玉帝宫也人身之萬神所朝萬炁所聚皆萃于此一曰天靈一曰天谷伏雲三仞明盡其心者知其性也知其性則知天矣三仞者三界之上渺渺大羅天也故性命雙修者登此三界之上故伏五雲於三關之杪則光明照曜又三仞者即青黄白三色之雲炁盖紫素左元君翳鬱仞字安來上黄素中元君圓華黄仞字太張上白素右元君啓明蕭仞字金門謂之三仞赤景翳逸寥赤景日也逸寥陰也如月受日而光之謂月咒云芬艷翳寥又日中夫人名陽中陰如房日兔兔四足爲耦屬陰日屬陽故曰陽中陰畢月烏烏三足爲奇屬陽月屬陰故曰陰中陽遞相互取其理而名之此言日中有夫人亦如人陽神中有雌一陰中陽陽中陰互换交感以成文昌提携太一眞常提太一之眞太一者乃水之元炁所化常居人頭上布流眞炁化爲紫雲華盖廕覆兆形提携常提省令惺惺地帝女抱定陵泥丸雌一帝女又曰斗中中女常抱眞陽精䰟名定陵而誦大洞仙經玉文雲章以接上天之眞炁流注以生人道吟詠玉清經吟誦大洞仙經玉文雲章如司馬誦洞章以生人之類有衛房聖母監生大神天神地祇同詠玉音監護生育之事玉符編紫房紫房在天中之天收掌符圖之所注見前篇即无英公子白元尊神執符把籙齊到帝前者皆同此義乃生人之理五籍標圓庭五方符圖版籍皆紀得仙之名圓庭亦名天庭宫在腦中明堂上一寸萬神皆聚於此攝䰟𩲸生人道致神仙亦然七祖反胎仙七祖皆反胎更生而得神仙人之生也諸天稱慶萬帝設禮然後乃生非不貴也然人自取輕賤不能保重也絶滅三塗尸度人經永度三塗五苦八難同斷絶消滅三塗五苦之穢尸亦三尸神彭蹻彭踞彭躓在人身中專奏罪狀於三府三尸居人三田每尸管三蟲共九蟲復管萬蟲咂嚙身體如涅槃經載蟲皆有名字該載不盡人生陽道八萬四千諸毛竅中皆生一蟲人死則此蟲皆飛走遠遁着物流風斷血滯流風者玄炁也周流一身所以斷絶尸血尸血凝滯蓋得眞炁方可流通宣布其不得凝結滯塞所以有生化之自玄業位黄寧其性命玄業皆在黄寧乃精血之神名三生字黄寧即中央脾土也土得天地之渾全之數故生成之理始終賴焉洞玄清淨光脾胃調攝得所自然清淨光華也下云性命即元神也古人云常唤省主人翁惺惺着休受人謾又自應諾以警悟元命靈通成生神經云胞元結長命惡根應化消盖元命通靈成就大洞帝尊也此章理性命兼該語曰性與天道不可得而聞也子路有聞未之能行斯言過矣三千之徒顔子會參子思冉伯牛仲弓等皆稱德行豈不得夫子性與天道乎後之儒者談此爲口實不復考之周易中庸等書微言奥㫖以究其至極之地便云我儒家无此等性命之學良可耻也中庸天命之謂性率性之謂道易曰窮理盡性以至於命豈相遠哉上天所賦與而我禀受而生者是性命宗本堅一陰一陽之謂道成之者性也又曰自誠明謂之性性猶命也書曰克明峻德德性也釋教所謂福德性宗本堅確孝道成明王語曰君子務本本立而道生孝悌也者其爲仁之本歟仁者人也親親爲大昔虞舜時太上下降爲帝師號尹壽子教帝以孝悌之道盖上天有星辰主之斗中眞人號孝悌王名弘康字伯中昔曲阜蘭公得此道傳之媅母媅母傳之許太史皆證上仙人世能修其孝悌忠信即證此位故始炁爲大道於日中爲孝道仙王元炁爲至道於月中爲孝道明王玄炁爲孝道於斗中爲孝悌王盖綱常之道倫理當然非外爍也然而在上之人寬柔以教則孝悌忠信有可望於此此若苛政急迫則下之人應酬不下奚暇治禮義哉諺曰禮義生於富足盗賊起於貧窮豈得己也若能上行下效自家及國則普天之下率土之濵皆爲忠臣孝子也詩云其儀不忒正是四國其斯之謂歟昔田虚應字良逸齊國人也性樸拙開皇時官湖南事親以孝躬耕以盡子職父母去世乃受大洞經籙法於天師薛季昌行誦不輟後潭州旱祈雨不應召之使禱良逸但蓬頭弊衣至郡无言而兩又乆雨不止良逸但默然岸幘而坐兩即霽唐憲宗遣使召不起而尸解豈非因孝致仙乎元蜀人姚文起性好善事母孝年過五十而嗣未立居武昌而游仕婺州值元皇垂訓云汝但誦大洞經而後嗣可期後文起誦至千卷而表散次年生一男名曰文昌保豈非至孝之應乎盖文昌經言天地人三才之道皆以陰陽和暢爲生生之根若陰陽駁雜則炁數乖戾有生之根幾亦息矣文理也昌盛也生根得太和天地之大德曰生盖根本滋生得太和眞炁此生生不窮之根本也黄庭云何不食炁太和精和也者天下之達道无爲登上清易曰无思也無爲也盖自然之理大丹之道无爲而无不爲登上清境見靈實天尊也脾炁上朝絳宫皆太和之炁也大抵中卷以六根取喻釋云不入色聲香味觸法是名須陀洹一往來實无往來是名斯陀含名不來是名阿那含實无有法是名阿羅漢此道家所謂四果仙人佛家名四果阿羅漢未到究竟不輪轉地所以暫餐太和遊憩上清終期成上乘果位釋子不知命宗稍見性謂幻殻无用不肯愛惜只修沉空滯寂不能性命雙全右件玉章天篆一百字上鎮太安皇崖天下統第五壘人德君玄契曰眞人得洞玄清淨元命靈通自天尊天帝眞人神仙天趣神趣人趣魔趣及一切衆生性命宗本一切大通无礙无障能斬五嶽地獄地根惡根魔籍鬼帳常以神水靈液供養元始天王滋潤玄英進登眞仙眞仙者先在人世燒丹煉藥救濟貧窮咒水書符祭孤度爽飛升如葛仙翁之類是也元始天王曰文章大洞玉章第十九津液洞源津液神通辛亥壬子艮漸青精上華炁津液之在身如水之在物雖无可得乎前輩云涕唾精津炁血液七般皆是屬陰物雖然非藉此無以滋養生根太微玄景童一云景精乃太微小童名字此章以津液主義故以太微小童流布華景之炁通暢百關毋致津脉凝滯所以易生也太微盖經中有五上卷云玉符徵太微太微天宫此中卷云太微玄景童混合太微童下卷云越轉入太微盖神九天之上復有太微天帝太微大帝少微大帝等類神化玉室内窮神知化德之盛也身神凝結於心宅之内乃透金貫石入水不溺入火不焚亘古今胎佛母亦謂之元始天尊在保守耳虚靜先生云欲要身中神不出莫向靈臺留一物物在心中神不清耗散眞精損筋骨神若出時急收來神返身中炁自回如此朝朝與暮暮自然赤子産眞胎神化者萬炁萬神變化也玉室者即人身中金房玉室若能毓以天和千日可以變化仙集載純陽眞人遇一長者會賓眞人曰予有一部樂作一曲以侑酒可乎主人曰諾眞人取腰間一瓢傾出十二女各執樂器二女持旌前導連奏數曲其音清雅進退有節眞人曰此鈞天妙樂也與人間凡樂不同衆賔歡笑酬酢以酒眞人復引瓢接羣女入瓢眞人將瓢吞訖曰此乃身中五臟六腑之神也人炁和則神和故爲樂音又仙傳載仙人嘗聞腹中有音樂之聲文昌大洞修習至此身中亦有一部音樂善養者亦聞知也豈非下卷六章并第十四章云檀熾鈞吉祥乎蓋此經聚則爲蒼胡頡寳散則爲檀熾鈞音務以陰陽炁和然後乃可爲音文昌之道可謂盛矣飛羽逸紫空禽之制在炁故神炁既煉陽神現形則羽翰自生可以飛升逸樂於紫空之中昔薛季昌西蜀漢州人世爲官族酷愛山水遊青城父母謂不遠可從行後南遊桃源遇正一先生於南嶽授大洞經法籙研窮眞要唐明皇詔赴京問道德稱旨賜天師號後乞回山上賦詩贈之滿朝欽崇一日謂弟子曰今夕祝融峰有會予被召當往戄起凌空而去不復回顧此乃洞經逸紫空魏元君自茅山乘雲至南嶽虚空動計千里雲至化爲石今存於南嶽山日爲三矜交矜字凡三見上卷爲首章曰千景併生矜中卷八章曰日爲三矜交下卷末章曰携矜太帝房皆同一義蓋太微童子名三矜交能生津也又云三矜心中三神也一曰靈朱君一曰靈明君一曰靈黄君日與之相交也與千景併生矜同義日者太陽之精内有三足烏在人爲心奉符登帝墉太微小童既與心神交會當奉符命登上玉帝之城腦後謂之玉城下卷第三章云披霞升帝墉同即人玉枕骨是開關把金節持節方可開關節符契也出入關津當執符而行至關則合符稍有差異同詐冒金符銅符竹符今曰金節又貴重閉户扣瓊鍾但口眼鼻耳皆謂之窗牖門户閉者合也塞也瓊鍾乃扣齒左曰鍾右曰磬中曰鼓故伐魔當扣鍾朝謁當鳴鼓滅魔三酆野三酆者伏魔經所載酆都山在天地間東北隅艮地盖艮爲鬼門也高萬里分三層上層齊天號上元六洞宫仙官所主中層中元六洞宫大魔王所主下層下元三十七獄四方三十六中央一獄總其事故因三元號三酆以其曠豁故曰野非魔王无以制禦六陰六洞寃魔下皆係累世死軍敗將强䰟義𩲸好勇鬥狠殺心未散結爲群伍或假忠臣義士廟食於人或爲瘟疫使臣荼毒於物修行人當防警之恐其害道或化爲美艶戕人靈根盗人至寳故執符把籙鳴鍾擊鼓欲戰陰魔也三酆在人雙腎之間大率是極陰之境參同契云群陰剥盡始見陽和仍須戰退陰魔然後方見純陽結集輕舉飛化位爲眞人招靈上清宫攝招䰟靈赴上清眞境即中元絳宫也上天有招眞致靈之符可以攝召天眞地聖三界鬼神䰟爽有此易得凝集明出窮陰關即下關腎府人當出此陰關進登陽境乃腎炁朝心炁也丹經鉛遇癸生須急採此乃北方陽炁一動便立丹基也入精六合房六合者天地之内也傳云六合之外聖人存而勿論具六根之身亦謂之六合即易之所謂周流六虚也或云在人腦中謂一身之神聚此人死則䰟𩲸據之故枯髏所在即靈人之精乘炁而行於四肢骨髓之間故四肢健及男女交媾神炁聚於下元精乘炁驟亦會於下元人得秘固之術則將聚於六合房與神炁合成一團復自腎間夾脊雙關入泥丸謂之還精補腦故下卷第八章云桃君守六合勒精衛泥丸正謂此也世多有之謂之御女術或云三峰黄谷子一云房中術一云黄河逆流法今世往往有之初不離海底尾閭也六合有五此中卷云入精六合房下卷云凝焕六合房混化六合室高觀六合庭桃君守六合等類衍文有云制魔生六明大中六炁清五魔伐六陰堅我六仙府等盖中卷專以六根修證若能六根清靜則六明發生六炁清爽六洞魔伐六府登仙回老變皓形能令人身强體輕駐顔悦色復形如嬰兒之狀故曰回老變皓形髮白反黑齒落更生者世嘗見之盖修養至此妙還白返嬰童一云反𩲸還嬰童必誤盖髮白返黑齒落更生如嬰孩之童玉經白首面皺皆得化度專炁致柔復歸於嬰兒之性洞源清靜光洞源洞淵水源津液所出之處清靜而有光華老子曰清者濁之源盖源清流長則混混不已不捨晝夜循環无端津液具神通咽液之道常以赤龍攪華池令滿口分作三咽仍存一嬰兒於絳宫迎接下一度謂之一通至三十六通謂之小成三百六十謂之中成一千二百謂之大成如此日乆則精神光彩故曰具神通經中津液之義凡九上卷云體矯萬津波中卷液逸玄中漠左抱福醴液津液具神通咽液生萬神下卷云咽味生五芽百關納津液等語皆同理義大抵人之津液以流通關節灌溉腑臟爲上而人或惡而唾之則五臟枯槁精神不爽遂生他證以至殞亡咽液生萬神神者本一心神而已今分萬神者盖一炁生萬炁所以有萬神也天地亦一而已其間日月星辰風雨雷電變化无窮至如人目視耳聽口言手執足行亦千變萬化故能遇之善則吉遇之惡則凶養之則長存棄之則死亡所以有津液然後萬神有所依養无津液則萬神離去不存神水華池融華池者口也赤龍者舌也以舌攪取神水自生舌下二竅左曰金精右曰玉液人有病則舌枯則神去神去則人死湧升灌而潤水性就下激而揚之可使過顙神水本自下生湧騰上升灌溉五臟則身體顔容光澤潤色亦如水之在天地間也往來无有窮自下而上自上復下三宫升降上下往來无有窮盡人之津液爲炁所使炁行則津液流注炁滯則津液滯故成疾通生道之源往來不窮謂之通言津液上下通暢百關滋潤一體故曰道之源老子曰水善利萬物故幾於道水性柔順故同道天根常茂豐天根亦曰神谷亦曰玄牝老子曰玄牝之門是謂大地根人身以腎爲本根故曰天根房色過者腎必損腎損則精无所依故泄泄之太過則炁无所歸炁散炁散則神无所主故離離則形體枯槁亦摧殞矣故修行人常使天根豐茂愛惜精炁存養得所所以爲一身命脉故曰天根右件玉章天篆一百一十字上鎮顯定極風天下繞第五壘人德君玄契曰眞人得洞源清靜津液神通湧升灌潤華池神水往來通生帝心一玄是曰眞中之神長生大君左生无英右生白元名異太一司命冲靈桃康合延執符把籙宗孝尚道妙行全眞名曰眞人位證聖仙聖仙者日在世誅鉏凶惡爲民除害功成道備一家骨肉拔宅飛升如許旌陽等是也元始天王曰文昌大洞玉章第二十精血洞明精血神通癸丑甲寅歸妹豐太陽化三晨剛健中正純粹精也乃性之所寄命之根也寂然不動實性命之所關係可不貴之耶晨亦日之名日爲太陽晨景車輿也凡人修煉以子爲冬至得復卦蓋一陽初動於地下當此之時敷座習定除垢止念净心守一令陽炁漸生漸長至丑二陽寅三陽全爲乾坤如車輿之上升也紫軒徹玄路紫軒日輪也乃紫河車搬運陽炁已升入腦玄路乃雙關夾脊上入玉城關至泥丸宫凝集若出陽神自此出入元君保谷童結中元眞精䰟名元君即太一元君也在頭常遏死户開生門令人長生谷童即黄寧童也居胃脘主消谷散炁克化飲食所以太一元君保此以爲一身根本俗諺人无根本飲食爲先既有飲食无神主之不得消化元君謂之雌一盖女人爲之女仙得道皆號元君最爲極貴之稱守胃塞死户死户者人所懼入也精炁爲物遊魂爲變變則化矣安能復生離者不可復合可不慎歟谷童守胃脘遏塞死户飲食既消則人道生矣得道經云仍節飲食祛遣尸鬼云云或曰精血三眞元王君字黄寧即結中元眞精魂保谷童子是也故此章專以精血爲主修證妙行妙果是也金符焕北華金符玉契皆眞陽煉成至眞所寶焕北華光華焕爛爍暎北方十方皆有華故經有十華妙行即肺金生腎水之徵玉契抜七祖一云披七祖非也盖得眞陽所凝之金符玉契七世祖禰皆出類拔萃飛升朱陵火府陶䰟鑄魄然後方可仙化帝眞灌上生節中帝眞精䰟名灌上生一名嬰兒欲人生天界丹在念頭一動爲帝眞故生神章云結胎守黄房是也亦名幽臺生斷息三塗苦已於舌章五苦界下注訖但三塗五苦之中酆都太山泉曲十二河源地水界中多少冥官獄吏盖由在世有英雄豪傑剛毅勇猛能决判疑異伸曲就直有大饒益於世務者死則爲善爽鬼爲地官選舉充地下主者於三塗五苦九幽地獄酆都太山之中取爲幽冥官吏冥冥累暗處長夜之境不睹三光决異事斷疑訟三百年一遷轉此乃生不知道不作善因以致如此受任幽禄開絶生根修文昌大洞上乘帝一眞道者遠離此等幽官㝠職洞明清淨光洞達明了本來清净之靈光輔以津液皆水炁也故曰洞玄洞源洞明盖洞源比津字洞明比精宇洞玄比炁字帝心太玄通得帝心通徹照見无礙與釋氏菩提心同儒曰人之良知良能是也人能反求諸身收斂心神凝集虚靜自有通悟釋云應如是住如是降伏其心同義大丹爲汞水銀也下入鉛鼎以文武火烹之結成金液或者以帝心爲章題奈七曲祖師玄契以精血爲章題故從之盖心乃血府宿命過去智宿命因縁劫前劫後過去未來智之所知无不了然盖得宿命通故佛之六通宿命通爲最其他神仙未能臻此根本元由中原其自根自本皆莫由中道正心誠意格物致知无外是也中也者天下之大本由中及外粹然純全内本外末未來及他心中庸謂至誠之道可以前知故釋云衆生若干種心如來悉知又云過去心不可得見在心不可得未來心不可得不可得者不可住此境界也具六神通者方知此所謂六通者天眼通天耳通他心通宿命通神境通如意通具此六通可以知先劫後劫三世所得因縁業力果報之自一切无礙融三界十方无礙无障混融一身所謂萬化生乎身莊子宇泰定者發乎天光故有知見生又謂得解脱然後有知見洞源與洞明已前篇洞源言液此篇洞明言精血皆水之屬人能以此修證妙行乃得六通具足證果不退轉地永无失脱之憂萬道由通生萬道萬法皆從水生通則无所不知過去未來之事如指諸掌故經多以十通由斯生十通成眞通則變化自然或者謂語意繁劇琪曰且天王說經始因靈風振響寶光成音集光中之音反復敷演方成洞章玉宸序次其始末太玄編集經三聖人然後成書一經聖人手議論安敢當所以聖誥諄復帷恐人天一語不能反正故至再至三也釋之者不得不隨句命辭雖前後委曲重重亦欲人於一句下信解不及則再於一句下得悟又何難焉右件玉章天篆八十字上鎮始皇孝芒天下統第五壘人德君玄契曰眞人得洞明清净精血神通則生洞明帝心太玄眞道先劫後劫三界十方他我根源過去未來七通八達備悉知見能斷江海水帝祁波水虒泉曲河源地根惡根魔籍鬼帳常以洞源金酒洞明法燈供養元始天王生炁潤根通明朗慧妙覺大度進登玉清上品上仙之貴上仙者昔在人間修煉至眞已後白日冲舉爲玉帝保明進大羅天位三清侍臣如張天師等是也玉清文昌大洞經乃元始天王所宣而人或問曰天尊天王有異乎琪曰元始之號不一而足有稱元始天尊或云混沌自然元始天尊浮黎元始天尊元始上帝元始天帝元始一炁天君或元陽上帝盖諸天說法時天人各以己見稱尊之而已道本无名非實有相也志道據德之士著名相殢言語是非道也然未喻者不容隱不得已著爲書昔天地未判元炁始凝形如雞子中有混沌氏生焉盤踞中央自分清濁陰陽二炁于上下頭乘乾天腹盤坤地混沌氏日長一文天地亦長一丈如此九萬九千九百九十億萬劫兩儀方定以身中九宫之炁上結九天下凝九地炁中之神王九天炁中之靈主九地以心腎爲坎離日月五臟眞炁爲五星九竅之精爲北斗以呼吸爲巽風以聲音爲震雷以津液炁血爲兊澤以身體爲艮山堪輿河嶽似混沌氏形質故崇卑不等故有山崖峯嶺凸凹之不齊混沌氏飛神昇化于九天之上是爲混沌自然元始天尊身中蟲虱化爲甲子十二相二十八禽如子爲鼠丑爲牛如角木皎亢金龍之類是也形居坤腹而光射乾首是爲星辰須髮毫毛爲草木形化爲土骨化爲石涕唾津液血尿化爲江海河瀆唯中和之炁集而爲人身長數百由旬然人身尚未完或爲人首蛇身或牛首人身各以炁類相感或飛行或履地上天下地任有攸往或相吞啖无有鈐制於是三皇氏迭生而治之遂尊混沌氏爲盤古先生天皇地皇人皇即洞眞洞玄洞神是也是知天地人及萬物皆是元始一炁化生而物物具有元始皆因元炁始生故曰元始唯人得其炁之最靈者也豈不大哉今人所生之質皆肖混沌氏故伏義氏畫卦體混沌氏之形曰乾爲首坤爲腹巽爲股震爲足坎爲耳離爲目艮爲手兊爲口不以象之而直以爲字當知是體混沌氏明矣皆一炁流傳並隸其子孫冑胤豈不貴哉世人多以酒色財氣戕賊元始鑿破混沌故天神演此洞章令人吟詠情性感召元炁圓融始相以合夫混沌自然元始之天則欲壽得壽求仙得仙坐致自然永爲眞人矣中陽子衛琪稽首玉清无極總眞文昌大洞仙經卷之七
