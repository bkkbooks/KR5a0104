front:
  text: 玉清無極總真文昌大洞仙經卷之三冬三
  hash: sha256:1b2fc921d3b019b719cb8119039f6ced27b55ed44d1ce6ae7f378576b2b91ed7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_HFL_003-001a, image: hfl/0051/0051-132.png}
body:
  text: 東蜀蓬萊山中陽子衛琪注道言昔在龍漢劫初元始天王出大洞玉經於高上大有玉清宫道言乃玉宸道君言說昔在者向來往古之稱龍漢者自一氣孕於空洞之中太無之始上無復色下無復淵混沌太虛浩瀚流溟七千餘劫其氣周流相去九萬九千九百九十里為一歲言其氣如龍變化莫測故號龍漢運推數極三景開明謂之赤明梵氣彌羅萬範開張元綱流演生天立地開化神明謂之開皇三劫分曉按大有金書天寶君生於龍漢元年當年出書靈寶君生於龍漢開圖經一劫至赤明元年出書神寶君生於赤明元年經二劫至上皇元年出書此三寶方有定名而神王奏請云數終甲申洪流蕩穢赤明以來至上皇元年受度者二十四萬人開皇以後數至甲申諸天選叙仙曹空廢當於三代取十萬人充其任又舉一十二萬人充儲官又於死魂中有善功者取三十二萬人以充甲申驅除之後開大有之民儒書云堯以甲辰即位至甲申已四十年然後有洪水之患以此言之生神經當出於唐堯以前而大洞經先出於龍漢元年元始當生出書之時也故號龍漢劫初而候上皇元年太上出書時三寶各有定位一再傳授靈寶就席付與太玄故下經叙云重出斯寶是也真武經載龍漢元年說法舉往昔開皇元年之事然以開皇居前龍漢當後此乃諸真傳經之誤當從大有金書參透三寶所生之劫并出書度人之時其他未可盡信又曰天地之始有五劫一曰始劫二曰成劫三曰住劫四曰壞劫五曰空劫五劫循環不已天地皆因此五劫而成始終人與物亦然東方曰龍漢南方曰赤明西方曰延康北方曰開皇中央曰上皇自子上起三字為一劫至戌亥為延康以日言之為夜以人言之為死也六合之外姑且存而勿論且自天地分判以來於六經中可考者言之易有太極是生兩儀兩儀生四象四象生八卦兩儀者天地也四象者四時也陰靜陽動故變焉動靜有常剛柔斷矣四時代謝故化焉變化不已故有劫數河圖洛書是也二氣升降五行錯綜皆莫逃乎數也大則劫小則運皆因年月日時至微而起時有刻日有候月有弦望晦朔年有春夏秋冬故積刻以成時積時以成日積日以成月積月以成年積年以成運積運以成劫自太極既判之後又不知其幾劫運矣粵自龍漢元年化生天寶君出書時號高上大有玉清宫此乃元始天王之都大洞尊神演說大洞仙經之始也故為諸經之祖諸法之王諸經皆稱元始天尊而大洞經獨稱元始天王蓋尊之至也有元始上帝元始天帝隨所見而稱焉非實有名乃衆真强名之耳經云大道無名因生育天地萬物故有名演太玄重玄玄一之道命之曰大洞仙經玄者黑而有赤色蓋北方陽動而生水陽氣赤水色黑故曰玄太玄重玄玄一蓋水氣之盛故為天地之根又玄為幽深曠遠之稱諸經有玄之又玄者因此而云也太玄者先有玄氣元氣然後有始氣次第生長故當敷演太玄之氣重玄為玄一之道號曰大洞仙經藏中有三清大洞經一百二十卷有茅山龍虎山玉經三十九章元始天王始以太玄一音流響玉清蓋一者萬化之本萬善之宗無一事不由心上起也老子之得一孔子之一貫邵子曰天向一中分造化豈得是哉天道一而已矣太玄者北方之正氣兩儀奠位以北為子一音者天一生水而水為羽音言天地始生自一數起於北方一陽初動而生水赤猶人之生以一陽之精結而為胞也陽動則變故曰流響非以金口宣傳乃靈風振響遂成洞章弘帝一真道說大洞寶文主宰謂之帝人心是也凡為國家有九經所以行之者一也一乃誠也無妄謂之真實故曰弘帝一真道故知大洞經即儒中庸也帝一乃大洞帝尊之號有帝一雄一雌一謂之三一之道乃大洞之始也弘發也大也大發揚此道說大洞寶文欲令世人得一則萬事畢若能主一無適此道成矣亦曰不二法門此則名文昌大洞仙經外有大洞骨髓大洞演義大洞玄契按諸經注解非敢專擅示九統之法傳九光之符玄元始三氣各生九氣是為神霄九帝也故示九統之法以會帝傳九光之符以集神大洞之道始於一氣而生三氣三氣而生九氣九氣而生萬氣結成萬天止云九氣不言萬氣舉其綱也人之萬氣具足遂生萬神天地以有萬氣而立人身以有萬氣而生若神離氣散則人道幾乎息矣此帝一之道於斯為盛用九示九已於洛書敷陳九天生四九三十六天九地生四九三十六地具各注下至士誦之登齊修行即得萬神歡慶萬靈護持萬聖感格萬仙翕臨齊者齊也言潔齊心地靜定安慮毋使雜亂古人三日齊七日戒又曰齊戒沐浴可以祀上帝蓋齊者夷心戒者防患但得顔子坐忘之心齊便是大洞經了此言至士修習大洞仙經當清齊入室除垢止念靜心守一內則萬神歡喜慶悅外則百靈護持上則萬聖感格下則萬仙翕臨生神章云一唱萬真和九遍諸天朝之類是也經曰人能常清靜天地悉皆歸天地鬼神未嘗助桀為虐也可以飛度三災四殺五鬼六害七傷八難九厄十惡斗經具載甚詳兹不重贅為人在世有諸魔難若不精專至道何以脫離煩惱宗門有語云磨刀石子損己利他克己奉人也登仙入聖神生紫微自然無為易無思也無為也正合大洞自然之道一本云登仙入聖悟矣自己元神與諸天帝比肩享受天堂快樂自在豈有所為乎皆自然之理也昔唐楊泰明以儒登顯仕為長安令佐郭子儀幕府後棄官入廬山結茅一日採訪真君下降曰太素三元君命我授汝九天太真道經觀之乃高上大洞經泰明修誦不輟至憲宗元和八年正月一日輕舉升仙豈非經中登仙入聖乎不係陰陽五行六氣之所拘束六氣者寒暑風雨晦明是也天有六氣降生五味發為五色徵為五聲淫生六疾按醫書陰陽五行五運六氣錯紐於天地之間順則致祥逆則見凶祥則聖人出天垂甘露地産靈芝五穀豐登人民安泰凶則天地閉賢人隱天變災異山崩海竭人民死亡此皆為五六之所拘束也修行人當脫五行之殼離八卦之機八卦屬地專至道者除地道法天道故陰陽不能拘束也念念增長趣入大乘弘之無窮諸天下觀玉帝降鑒飛天保迎即這念頭便是金丹務欲乾乾不息綿綿若存若人一念不移念念相續逐旋增長進悟大乘以至上乘弘揚此道則諸天帝王下觀其身上帝降鑒飛天魔王保舉爾身昔高雲舉誦大洞經一日採訪下觀相與語善後雲舉成仙豈非諸天下觀乎億曾萬祖歷劫種親遊爽滯魄俱得更生己身未度先度祖先況千萬劫前祖宗無數遊蕩英爽沈滯魂魄咸得上生晋代許旌陽吳葛仙翁皆以祭煉孤爽鬼神而沖舉成仙蓋孤爽亦是千生萬劫曾祖父母世胄接仙長為貴人世代子孫華胄與仙相續在世長久得為貴人如張子房之類天師繼嗣綿亘無窮功滿道備骨肉同升功圓行滿道德充備一家骨肉同時飛升如許旌陽四十二口骨肉白日拔宅之類乘龍駕雲上朝玉清化自己之陰陽二氣為龍為雲乘駕以騰空上朝玉清聖境元始上帝為三清侍臣元始天王嘯詠太玄凝神遐想而說洞章元始吟詠太玄之氣而成音凝聚神氣深思遠想使神氣精詳而後說是大洞寶章謂如慮而后能得者也說洞章者非謂口談也乃凝集神氣炳顧於空洞之中成音高上洞元此章名大洞帝一尊神高上虛皇君總冠一經之首章中之字有數斷章取義故略而言之元始生於太無無始之前五太未露眹兆之初一氣化生於空洞之中無形無名無氣無象無色無光周子所謂無極一動一靜一陰一陽陽變陰合遂生五行即太易太初太始太素太極今曰大洞即易之太極也高上者高高在上不可名言即無極也混沌太無元者即元始之祖氣生於混沌未分空洞之中太無之始元者始也故號元始或云混沌亦通今本無元字當添置之蓋元始謂之高上混洞太無元靈寶謂之赤混太無元老君謂之冥寂玄通元總謂之三元非天地水三元乃生天立地之祖氣也天寶者元始號天寶丈人天寶君玉皇者非常所謂玉帝玉以比德以其性溫潤而徑硬皇者大也元始以其本身至大至剛之氣成立天地開物成務孟子所謂浩然之氣充塞天地是也元生九天元者善之長也蓋元為萬化之祖宗今言元者三元也言三氣生九氣即生神九天也天地萬化自非三元所育九氣所導莫能生也故三氣為天地之尊九氣為萬物之根人能修之是與三氣合德九氣齊并也自此已往生生不窮之道著矣故易曰天地之大德曰生他本云高上洞玄必懼氣祖太無玄元始三氣生於太無之前合虛而生氣氣生於空空生於始始生於元元生於玄故曰氣祖太無此大道所出自無中生有衆風胤玄一云宗風非也風氣也衆者非一也混沌太無元之氣九萬九千九百九十億萬氣赤混太無元之氣九萬九千九百九十九萬氣冥寂玄通元之氣九萬九千九百九十萬氣蓋萬氣根於九氣九氣始於三三氣歸乎一氣故曰衆風胤玄胤者嗣也繼也續也根胤出自玄氣是名回風混合曾親絶散一云統散誤也既有所統是有拘係豈得散耶人修本洞則三曾九祖五族六親各遂生化而無胎根結滯之病以阻隔之四清撫間四清四氣朗清也蓋天地既判四方廓爾喻人祖宗滯識皆得生化則無所殃連故四方備守安處無為即得生天快樂自在帝一上景連衆攝煙大洞帝尊名帝一也上乘玄景之龍輿招神攝風以度苦爽亦如靈風聚煙之說長契一運七世投間長遠契合嘉良運會儔靈運良辰會同義七世祖禰皆得投間致散良會皆得度世託靈屬命反華自然一點靈光皆有投託本命元辰亦有所屬還返光華無虧無缺不有勞費故曰自然泯邈流輝六曜沈遷泯邈遠大貌流輝者精彩流布靈光備體六曜南斗注生之司六府凝定無有變遷凌梵御暉西華彰安玉帝君諱逢凌梵字履昌靈又曰神丈人白帝君諱彰安字西華人之肺腑安和也併編帝簡盡得解源西華玉靈瑶府編修青簡玉籍以奏玉帝若修煉則惡根地根魔籍鬼帳盡得解去胎田邃路世發玉蘭上田泥丸中田絳宫下田氣海胎息之所道路深邃黃庭之回紫抱黃入丹田世世生生發育玉潤芝蘭生神章云耀玉葩同意言人能存養下田則精華遍體如玉階之芝蘭也蘭者取其清香故黃庭云體生光華香氣如蘭此下有丘蘭素蘭同義靈光八輝混生萬神自己一點靈光洞照八室所謂八窗玲瓏人之欲生萬氣不備萬神不具終不生也右件玉章天篆合八十八字總冠三十六章之首三十六天地神明並備此章玄契曰兆修大洞太玄帝一洞章誦之一遍消一切罪身神六根皆獲洞清六天自降群魔束首萬氣齊正得無礙門元始天王曰文昌大洞玉章第一一月生胞金丹一還丁丑戊寅豫隨始氣生混氣其色蒼為東方九陽木氣凝成天境號鬱單無量天劫號龍漢此天精魂開陽之氣主泥丸宫帝真胞命元一黃演之氣生胞元高上宴紫清文昌經古以此章為首驗之玄契并經之數目宇相合今從之上清大洞一本以東華發胎暉為首且中卷十章諸本皆將前後互相换易今以六根順列為叙上卷體生神章具受胞胎神氣為叙庶幾覽者有所倫次然寶章不特為受生者說蓋修行人內鍊金丹亦必因此月分次第行之如婦人懷孕牝雞抱卵專心愛護念念不忘自初啓首以至十月聖胎完成突然而見陽神兩途而一轍也人生胞元易曰男女媾精萬物化生父精母血憑虛交感此乃太玄之氣生於太無是也天一生水以為其根先有西北壬水一生與西南之丁火相合謂之水火既濟陰陽相感會於元宫懸附於脾脾屬土故萬物得土自然化生因之結胞所以水土同胞於巳己為六陽純全之地為乾屬巽此乃回風混合之所男左旋十月至寅為三陽交泰故生男女右轉十月至申為三陰全得否故生女故經曰高上宴紫清者高上太有玉清宫乃元始所居在紫清天元始遊宴其上斡運始氣以生人之泥丸宫次第生長人之初生先有鼻故後生耳古人云鼻祖耳孫此生人之始末也鼻貫於顙故先得始氣生泥丸次玄元二氣生中下部人之生也陰陽二氣五行而已得氣之清明者為聖賢得氣之重濁者為民庶得氣之駁雜者為萬物故下云五老輔玉根者言各氣之分數也如東方九氣之類輔玉根與五臟植玉根同有揮絳華飛玉駢等皆以五方降真氣然後成人之神氣形體五老輔玉根所謂四玄禀元禁長保五帝城是五臟為一身之根五神守之故輔玉根五子歸根壬子木至庚申九數是為東方九氣戊子火至庚寅三數為南方三氣甲子金至庚午七數為西方七氣丙子水至庚辰五數為北方五氣庚子土居中央是為一氣東方青靈始老九氣天君南方丹靈真老三氣天君西方皓靈皇老七氣天君北方五靈玄老五氣天君中央元靈元老一氣天君輔玉根言五臟之氣歸根復命也精神魂𩲸意乃心肝脾肺腎為根太素拂渺景太素即三素母其神拂過遠景也渺小也盡也見三華氣注太素者乃隨品所證之妙果也有太素清虛真人之號合符帝一前無英公子名合符又將所執之符將合之於帝一前面符節既合受生無疑矣合符又名玄元叔主守肝臟之户白帝皓鬱奬白元尊神皓鬱奬主西方肺氣又名白元洞陽君鬱靈標字玄夷絶以西方七陽金氣主鎮申酉下統兊宫中守肺回金太霞鄉肺氣屬金故回風混合入太霞之鄉上有太白金星西方七宿經緯天文下鎮西嶽分野中通人之肺腑以注真氣度我死户閉既度我以生門當遏塞其死户人身中有三十六處生門三十六處死户慶雲開生門祥煙塞死尸祥煙真氣也拔出三塗梁欲拔出三塗苦海當架玄津橋梁若過三關當架鵲橋古人云上鵲橋下鵲橋天應心地應潮蓋與飛玄梁不同十通由斯生六度十通萬行圓成於是得長生久視之道人以十月胞胎具足萬神備體然後降生先因此胎根堅固方至十通妙行由此興三千妙行因此興起圓滿具足人之神氣已布日吉時良於是興起而生金丹之道修十大洞妙行可證十大妙果洞明光景中在太陽道境光景不凡人之濯質太陽方見光明境界華景與光景同古仙云溫溫鉛鼎光透簾帷此乃光景洞明帝一真玄玄帝一者大洞帝尊之名人修金丹亦證此果豈非玄之又玄乎經有帝一雄一雌一號三一之經蓋帝一乃北方水數玄亦北之色象故雌雄帝一之真至此玄之又玄矣昔劉根先生宦遊四方為政有德常修大洞帝一之道即得玄化成仙大凡天道流行發育萬物其所以為造化者陰陽五行而已莫不先有是理而後有是氣及其生物則必因是氣之聚而後有是形故人物之生必得是理然後有健順仁義禮智之性必得其氣然後有以為魂𩲸五臟百骸之身周子謂無極之真二五之精妙合而凝人以初月受氣結成胞胎以至十月神布氣足而後乃生修煉金丹之道一一如之三百功圓聖胎堅固也右件玉章天篆計六十字上鎮太皇黃曾天下統第一壘色潤地土皇君玄契曰兆誦文昌大洞仙經修行帝一真道妙行方全始證十通聖功初積玄理幽深常誦百遍自然通氣千遍不輟通神通靈正一科有自稱曰小兆真人臣某之語是知玄契中凡云兆并真人者自稱也元始天王曰文昌大洞玉章第二二月生胎金丹二還己卯庚辰蠱臨混氣生洞氣其色赤為南方三陽火氣凝成天境號上上襌善無量壽天劫號赤明此天精魂陽明之氣主明堂宫帝真胎命元洞明紫尸之氣生胎根玉虛順玄歸此乃二月生胎之徵先令太一精魂名玄歸子字盛昌主管生育之事玉虛即玉帝宫人之頭有九宫此其一也第五章帝臨登玉虛故知其為玉帝宫又曰上方玉虛明皇天尊仙傳有玉虛尊師赴南溟夫人并安期生之會故玉虛者隨所證果位而得名也今玉虛乃太精魂所居天晨金霄遊天晨日也金霄黃道也又曰雲漢玉帝登殿時太陽之氣旋轉於虛空後云玉帝乘朱霄如人陽精乍凝於空無中朗朗生帝景天日遊行霄漢明朗以生帝一玄景龍輿又雄一神名也蓋精為九入光彩明亮而欲生腦宫後云駕景發絶霄是也欻爾駕玉洲欻者長生可馬名姓柏成欻生乘日光車遊玉洲即玄洲為兆身胎元九天司馬不下命章終不生也欻爾倏忽也左攝始童神木王之氣故有東方青靈始老青童君又云太微小童名在人之左攝召青氣以主肝部三魂始童乃初生之童子右命起常符起常符帝卿佐名也西方有白帝君主事在人之右則命令白氣以生肺部七𩲸陰陽二神侍立左右運輔神氣也明真焕九霄心玄九帝尊神君諱明真如日輪焕明於九霄之上日月交合曰明陰陽交會於空無之中丹經云會二氣於黃道三日映玄敷玄敷即玄圃在西北崑崙之山亦曰北極三日者南方三氣太陽帝君以真火照映北方之玄圃此非既濟之道乎古人有言積分成寸積寸成尺尺寸不已遂成丈匹人自一時覺悟勇猛進修以至一日二日乃至三日則玄氣通暢如湯書云茍日新日日新又日新漸洗以成吉人干景併生矜一云千景必誤刀太微小童名千景精字會元子又諱矜視水火既濟陰陽交感將有生育之兆故併意矜憐愛惜內有幽寥無上玄帝皇精魂名幽寥無即太一也此神為變化之主胞胎之精至人得此可以為聖胎之根本金丹以此為藥物令我得長年能令人長生久視虛靜天師云道不遠在身中物即皆空性不空性若不空神氣住氣歸元海壽無窮此謂長年千劫始一周一千劫方為一周歲循環無窮天堂有拂石之年其於地獄受苦者時亦不少度人經禁戒八萬劫一傳玉皇經四萬劫一傳生神章自非天地一開其文不出然則其受苦者何時而出離方悟正因也見是經宜早省悟以臻千劫長年之樂可也是經亦無冒濫傳受之責人人有分黃籙保劫仞仞俗作軔度深七尺曰仞書云為山九仞孟子掘井九仞明真黃籙可以保制劫運人既得受生天上則黃籙書名經云黃籙白簡削死上生天地真宰聞人生則歡慶黃籙書名其上以為祥瑞而人甘欲棄生以就死地哀哉仞者高也尖也極也蓋劫數之將極盡處故以黃籙保之披錦入神丘丘空也大也聚也在崑崙之東南四方高中央下故曰崑丘在人曰神丘天谷也或云玉枕言幽寥披錦衣以入帝庭也此乃陰陽之氣上貫於腦門也下卷云太一儔丘蘭同義錦者五色雜錯也言五臟之氣薰染成文謂之錦衣又云繡衣皆執法真君所衣之衣執斧鉞行刑罰也太一務命根此章名太一尊神章太一者先天水之精氣也天地未形天一生水此神主之此神為長生之主在人身中形如嬰兒不著衣服長四寸所謂大洞返胎始形之神也名務猶收字歸會昌常守人玉枕下人之初生執符而混合百神專掌人之命根此下有十處太一字事見中卷解注公子召合符左曰無英公子名玄元叔字合符子太一召之以符節相合同則謂之真氣乃能生人不同謂之邪氣即當却之十回度初心即度人經周回十過十回度人同初心者將信將疑之間似有似無之際故以十回數足得不退轉地傳曰人一能之己百之人百能之己千之果能此道雖柔必强若能以十回試初心即此道成矣蓋欲人下死工夫精進不退也欲轉心至道者當對高真上聖發大誓願堅固初心得入大信根以大洞仙經開化引導必使得入大定信實無妄之根本與物無違之謂信蓋信屬土土成數十亦河圖之數也此卷十章有十回十善十方十華十德十仙十真十通等語皆以足格言之缺一不能成生化之道蓋十為地數取喻土能長養化有之義信者誠而已故以誠信為根本右件玉章天篆計九十字上鎮太明玉完天下統第一壘元德君玄契曰誦之二遍得入性根善因不絶仙籍書名萬氣齊和得定觀門元始天王曰文昌大洞玉章第三三月生魂三還一返辛己壬午觀噬嗑洞氣生浩氣其色白為西方七陽金氣凝成天境號梵蓋須延天劫號延康此天精魂始陽之氣主上丹田宫帝真魂命元長靈明仙之氣生三魂玉帝玄上幡一云玉帝有玄上之幡制命九天之階蓋多三字大凡靈書玉章之屬每一句只說約一字或二三字如亶蔞阿薈四字說多少文義如高上洞元一句說幾箇字義章中皆有五言為句豈得如此多加三字必所傳之誤太微玉帝有回黃旗命靈幡以為攝召之具欲使陽魂歸體制命九天階此旗幡制命出自九天之階天不可階而升故號令以旗幡其貴重如此天階言其等級次第不可造次而升進也七覺乘妙道覺者即釋之圓覺妙心也在天為七星布氣於人名之曰心降靈於中名之曰神賞監七覺神王之職也七覺者人之良能良知之心也心有七竅故曰七覺言乘大道力以落死籍注生名七覺凡三見同飛七覺元太和度七覺蓋人覺則為善人不覺則為凶器又七覺注在他處歡熙神風回歡者喜慶熙者明亮人身中之氣太和雍熙則神明自來一曰神風一曰靈風神靈皆自己之元神回風混合也飈燦北停華飈俗作飊炎風暴至又云巨焱扶搖謂之旋風又云日魂名停者亭樓臺之屬本亭字後人作停宇留也集也紫英唱東隈長靈明仙之氣化生三魂如善芽增長紫英發達於東方仁德之地飈燦紫英二神歌謡大洞寶章上聞於九天也琳和九霄外正一左仙名琳和蓋如琳琅振響聲徹九霄之外如語天將以夫子為木鐸天人之間和氣致祥皆欲聲政洋溢也玉符徵太微玉帝以玉符召太微小童名干景精令在左右命之執回黃旗使無英執命靈幡以召幽爽生神章云太微回黃旗三素生泥丸素者純也三素者純而不已泥丸者頭有九宫兩眉間入一寸為明堂宫太一居之左有紫房右有朱户却入一寸為洞房宫中有三真左無英右白元中黃雲却入三寸為泥丸宫萬神出入之所皇老三素君名罕張主此宫入四寸為流珠宫五寸為玉帝宫明堂上一寸為天庭宫洞房上一寸為極真宫丹田上一寸為玄丹宫流珠上一寸為天皇宫總謂之頭上九宫皇老三熹君生神於泥丸宫亦曰三田之氣青黃白也黃庭云泥丸百節皆有神三素亦丹名昔王先生煉三素丹詔入中嶽得道又周武穆公主周惠抃修三素之道遇西靈聖母傳經士女景慕者數百自云世代亂我將往後百年再來遂化去發曜金靈輝三素發泄金華靈輝照耀上下如人慧眼一通無所不見眼為五臟之華蓋以表日月之明黃庭眼神明曜英玄君老君罕張上罕張三素君之諱此生泥丸之神也人之生也自上天降氣然後受父母精血始形之初自泥丸發仞次第生長為完形守衛死節機誦之三遍三魂自生蓋三素君當守閉死氣關節機鞬務令受生下卷云守閉死氣關同蓋罕張字神生道神職也十善生玄中人性之善皆可以為堯舜人無有不善而人自流凶惡之地以致其殃禍善惡報應之說儒者或以為虛誕又曰王維畫鬼神以恐人不知書中有云作善降之百祥作不善降之百殃虞書曰惠迪吉從逆凶惟影響又曰滿招損謙受益時乃天道易曰積善之家必有餘慶積不善之家必有餘殃此聖人之所以訓人者如此其諄諄善惡報應之理如此其昭昭聖人何嘗不云而但以汝未暇讀書講明之爾人有十善即生玄氣之中顔子得一善則拳拳服膺禹聞善言則拜蓋人能止於至善之地謂如為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信則舉止進退莫匪至善度厄而自然過度厄會即得自然無為也叙經云飛度三災四殺以至自然無為不係陰陽五行六氣之所拘束至此諄諄章義右件玉章天篆計七十字上鎮清明河童天下充第一壘元德君玄契曰誦之三遍得自在智度一切厄入玄上關萬氣齊清入希夷門玉清無極總真文昌大洞仙經卷之三
