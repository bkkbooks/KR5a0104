front:
  text: 玉清無極總真文昌大洞仙經卷之八藏一
  hash: sha256:5d4a9ed6f11f3b33b6769df80a24efc02f4cefe5999f526a75b78fc0666caefd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_HFL_007-001a, image: hfl/0053/0053-004.png}
body:
  text: 東蜀蓬萊山中陽子衛琪注道言爾時道者真淨明妙虛徹靈通天地未判父母未生卓然而獨存天地萬化萬事萬物無不混然其間萬殊一本者也老子曰有物混成先天地生寂兮寥兮獨立而不改周行而不殆是也在人為心變化莫測隨事隨應靜而為性動而為情情逐境移移而不止化而為欲心性情欲四者同出而異名也人能靜而守心則本性自見若逐情欲境界流而忘返則汩於生死苦海何由出離故天人説經以道言者此也玉宸道君演元始之妙音故曰道言守性為玉宸元始天王以大洞高上混洞太無元天寶玉皇之氣注見上卷高上洞元句下結一寶珠名曰黍米珠又曰摩尼珠注見中卷體寶圓珠映下此第二節既知道之所在即壁立萬仞兩手放下閉眼一跳坐虛空中上不頂天下不履地浩浩蕩蕩渾無際涯於混沌洪濛中自有所得所得之妙如病得藥如夢初覺如獲尺璧如得寶珠此乃玉皇之氣聚而成珠之時也豈不樂哉第三節既知樂處逐處圓通通身手眼列有隔礙才到此地不可執著以為自足須是把他撇下命之曰蒼胡頡蒼者青陽正色胡者大也元氣光明正大頡者直上而徑故下品十一章云五氣理中頡言元始以其至大至剛之氣結成寶珠而命稱之曰蒼胡頡命者天命之也蓋天理流行賦與萬物謂之命人稟受以生謂之性蒼胡頡者性之德也以其剛健中正純粹精神所發曰吾以此寶珠從道妙一善貸生根寶珠非有象乃人之性命也魯語曰性與天道不可得而聞也豈下格小仙之所可與聞焉蓋元始自稱曰我以此寶珠從天一生水藉以為根以立天地善者水善利萬物故幾於道或曰從道妙善一貸生根必誤一者道之子道氣一動而生水故一為天地之根萬善之長老子曰夫唯道善貸且成善貸者假借之而已天地萬物無非假此以為生成之根孕玄分元誕始傳真孕玄者包含太玄也分元者開明太元也誕始者發生太始也玄元始三氣化生三寶君父子相承師資授受故曰傳真三氣太玄之氣所生融炎演三氣太元之氣所生旻景遁三氣太始之氣所生混洞浩三氣總謂之九氣所謂三氣合德九氣齊併化生諸天九氣各生萬氣以生成四梵種民四天無色界四天色界一十八天欲界六天謂之三十二天此下又生八梵九天與日月星辰羅列空界度人經五文開廓普植神靈易乾道成男坤道成女二氣交感化生萬物自此已往人物藝藝蕃衍盛大唯人最靈至貴位乎其中當體道法天以神明之凝成萬氣此句當在化生諸天上元始凝聚本身之氣開演以成萬氣方可化生諸天大有金書玉皇之氣九萬九千九百九十億萬氣大哉至寶惟我獨存元始自稱如易大哉乾元萬物資始至哉坤元萬物資生至大二字惟乾坤當之獨存獨有也今大洞經又在乾坤二卦之上故謂之無極無極而太極易曰太極生兩儀兩儀奠位混沌氏立頂天踏地混沌日長一丈天高一丈地下一丈即元始是也今為玉宸道君重出斯寶易曰苟非其人道不虛行元始久藴此寶待其人而後傳玉宸道君即靈寶天尊也元始以此大道傳之與靈寶也重出斯寶者蓋元始於龍漢元年化生當年出書者出此書也今為玉宸重出者此經當在開皇以後一再敷演之耳諸天諸地各有定位孔子所謂天尊地卑乾坤定矣卑高以陳貴賤位矣書所謂五典有序道經曰吾乃汝之根亦此意也亦猶乾坤坎離始有四象便有八卦亘古布列不知其幾劫塵後至伏羲氏出仰觀俯察而晝八卦方且顯露文王重爻孔子繫辭經三聖人手始得廣大悉備將以順性命之理兼三才而兩之此大洞仙經先天先地已有之矣至是元始重出之道有所待豈可輕易道君畀付太玄道父亦經三聖授受然後三界鬼神及諸人天方知所生之自蓋自乾知太始一元之氣也諸天帝王天真大聖膽望寶光其光分敷百千萬億結成大洞仙經真仙翹首仰望景光分輝散彩光華文縷有百千萬億無量無邊不可思議之光結成大洞仙經又玉經云藴發光芒又載十七帝光之類皆自己身之中靈光所以能結成文章也又如五方真文玉章皆係天光神氣凝結成文也王文凝而成雲絢而成章王者寶之至也言其寶文凝結成雲篆絢綵成文章雲漢昭回諸天帝王天真大聖以清明識以始通觀以華舌通齊聲宣詠大洞雲章諸天帝王如三十二天帝釋氏以天王稱道以帝者稱諸天各有天真大聖既見空中雲文玉章各以清淨明了知見識認以始通道眼觀睹以玄明華舌通議諸天帝王真仙萬口一辭同聲唱和吟詠洞章音徹萬天流響九地玉經云流響雲營又曰六合至邇三景非遼同其音聲響徹九天九地前三品並不言地惟一向説天道至此方見有九地蓋先陽而後陰也九地者九壘土皇也一曰元德二曰皇德三曰帝德四曰王德五曰人德六曰地德七曰里德八曰福德九曰昌德此九壘也每壘一重土一重水一重風各有四土皇分掌四方之域號三十六土皇各有土父母宗正令卿丞長將佐二千石等官僚曹局各以萬衆分掌機務上有五嶽名山總制綱權每壘動計萬里而天真在諸天高高之上吟詠洞章其音聲下達地水二司如此周遍可謂大矣蓋以元始一氣周流通天地之外無遠弗屆天界地界水界神鄉一切神靈不離本座俱覩雲章絢目仙梵歷耳天界上元天官所統地界中元地官所轄水界下元水官所管三元各有攸司主管鬼神及人天罪福每年正七十三會考較實非細務故下云三元乘晨回太一上元氣因知首章係上元九府四司也諸天大聖為能宣詠洞章其餘三界鬼神不動其所惟能得見雲章絢耀其目喜聞仙梵一歷耳根頓悟大乘蓋諸天人民雖受快樂終不悟道今見洞章心所渴仰皆悉百生障滅萬劫塵消清氣為天濁氣為地沖和之氣為人而人自曠古以來淪洄其間不知其幾萬劫塵或為天人或為鬼神或為世人或分男女或入異類千生萬生出彼沒此升沉潛躍不知幾何不可以算數譬喻經云百生萬劫誠如是也幸而今日得復神靈見聞妙理敢不兢兢戰戰進修以滅往者不知不悟之因於是此心一悟則前生今世一切過惡普皆消滅鬼尚如是人胡不然釋云衆罪如霜露慧日能消除慧日者一心也三塗九幽十方惡趣三塗注在中卷拔出五苦界下九幽者東方風雷南方火翳西方金剛北方溟泠中央普掠東北鑊湯東南銅柱西南屠割西北火車總謂之九幽地獄諸天諸地真仙鬼神既以各分尊卑職分定位不紊則必有刑憲賞善罰惡之司糾正真仙則有流金火鈴及雷神謂之杖直繩法鬼神則有天一北獄女青條律地下考人之功過則有三塗五苦九幽酆都諸大地獄故十方三界羅列凶惡鬼趣以治其事考驗功過咸承光音所及十纏九結六染七塵於時頃間一時解脫十纏者十惡大罪不孝父母不忠君王不敬三寶殺生偷盜邪淫貪嗔怒愚癡綺語妄言惡口兩舌等是也九結者負命負財負呵罵負心負人負國負鞭撻負力負恩義等類是也六染者即釋氏所謂眼耳鼻舌身意也聲香味觸法是也七塵者喜怒哀樂愛惡欲是也三界鬼神皆承仗大洞寶珠之光檀熾鈞之樂音所有夙世纏結染塵咸於此時頃刻之間並得解脫所謂七年之病求三年之艾也兹以人身言之蒼胡頡者即度人經之黍米也人之一點靈光便是化生諸天者即人之五體百骸血榮氣衛也諸天帝王齊聲宣詠者即心念一動一身之氣血運轉流通也萬天九地者即人上至頂下至踵也天地水三界者即人三田也障滅塵消者乃氣體和暢也三塗九幽者即腎部情欲也咸承光音者心目所極也一時解脫者諸塵漏盡也中田之上諸天真仙即清明神識上部人神也中田之下地獄鬼神即下部人神也若修清明則此神化為真仙若染情欲則尸穢皆化地獄一善一惡不出乎一身為鬼為仙在反掌間爾於是太玄道父前詣蕭臺再拜稽首求受寶珠所結大洞仙經玉文雲章於是太玄道父殷勤前進請受大洞雲章須知此文章乃自己真氣所化能養浩然者充塞天地周流六虛化生萬物上通泥丸下達湧泉熏蒸關節煉成陽符玉文及至成全復化玄氣歸于虛無自然矣庶以導化人天衆生俱免萬災咸消衆罪不沉苦趣俱等一乘忠恕為道不遠夫子之道忠恕而已矣道父之心欲推己以及天下故令衆生皆與我一體可謂用心普矣導一云道非也道父請曰而今而後庶可以導引開化塵世人天及諸衆生也三界鬼神已得聞見惟人天衆生尚未及此故專為請受以化之使之但得聞是經免釋萬災千障諸業衆罪自今已往更不沉淪惡趣皆得升入一乘果位三界鬼神元有仙職者俱升一等亦如人間恩例普覃一體故幽明普利人能掃除一切根塵萬事萬物一無所染著是名一身清淨一身清淨則多身清淨多身清淨則一世界清淨一世界清淨則無量世界悉皆清淨豈有衆生災罪之説弘是願言殷勤啓請道父發弘大願元始前勤勞前進啓問請受寶章三寶貴重正法難遭當盡禮元始天王命元神大聖玉宸道君具俯仰威儀手付太玄道父蒼胡頡寶元神大聖或云八聖訛謬太甚殊不知三寶尊重況授受之際以心印心口傳心應威禁至重其孰能與之哉以八聖而簉三寶之席其不為火鈴之擲幾希矣元神大聖玉宸道君當作一句念蓋道君乃元始之元神也如華嚴善財即釋迦之精神變化也若以為八聖人在玉宸之上則三寶何以為貴道君老君在八聖之下理必無此具俯仰威儀元始本為道君重出而道父請受之勤於是元始就席命玉宸傳與道父遂具俯視仰望之禮貌威者可畏儀者可象言其進退俯仰之節威嚴如此則玉宸親手將大洞仙經蒼胡頡寶付與太玄道父由此觀之三聖遞相授受灼然可見何從别有八聖焉以人言之太玄者即兩腎間一點真陽元命也前詣蕭臺者乃升中央黃庭也求受寶珠者真陽合於祖氣也元始命玉宸者乃意以歷劫不壞元神會於元宫也手付寶者丹已成也由此觀之則修習是經即是修煉金丹大藥一體當反求諸其身不可向外馳求以招譴元始告曰此蒼胡頡寶與檀熾鈞音若非太玄何能求請唯子慈深願重可畀寶章元始重告道父曰此經聚則為蒼胡頡寶散則為檀熾鈞音深為貴重若非道父誰敢求請惟道父慈愛衆生之心甚深救度衆生之願頗重故可以畀付寶章三寶師資授受之間尤且諄切至再保護至重況下格小仙豈容易聞切見世人輕傳竊漏或生謗訕豈無冥責者在焉此以內言若非太玄者一點真陽可以成丹故曰可畀寶章元始天王曰文昌大洞玉章第二十一天一生水一玄妙行乙卯丙辰旅巽九皇上真氣九皇天上有九皇地下亦有九皇星中亦有九皇真仙亦有九皇如近世張平叔等皆九皇真人因較劫運之謬謫降人間度人經本命日誦之得九宫真人皆是玄元始上真之一氣化生即上卷所謂九月所受之九氣是也又喻人頭有九宫以應九天身有九竅以應九地九州或以為九真氣心中一真胃脘二真精血三真肝中四真脾中五真肺中六真腎中七真膽中八真泥丸九真即生神九帝真氣同出而異名乃三十六宫之總會所在四司天仙王四司即四天王也常以八節日命三界四帝煉化學仙之人東華宫青童主之朱陵宫上元君主之西華宫王母主之北上宫玉宸君主之亦喻人四靈也故四靈金木水火也土無正形寄旺四季辰戌丑未是戊己乃中央真土謂之天地土皇又曰四司者司命司祿司非司危乃天上四司司命司祿司功司殺為地下四司經曰天仙土者必天上四司也人之四司眼司視耳司聽鼻司臭舌司味儒書謂之五官視聽臭味皆欲得其正不為邪氣所乘飛霞散天日天玄而地黃散天日者各現其正色也蓋諸天各有日月星辰天真飛霞散彩光奪天日喻人四氣朗清照爍元陽凝焕六合房凝結也焕明也言天真飛霞散彩凝結焕耀於天地之間喻人大丹成就光明烜赫於上田謂之六合房即腦宫是上真朝玉清諸天真仙亦當整肅威儀以朝玉清上帝喻人修行以中為主凝集四靈之氣上升泥丸謂之朝元久之可致神仙乘景晨中暉景晨日月之域也於人乃兩眼是此言乘日月之車輿也言諸真上朝皆乘車輿光暉煒燁大丹之道牛車鹿車羊車三車搬運上通崑崙之頂天真有景晨明霞之輿後云駕景登絶霄故知景乃車與左右之日月也暉者光彩焕爛言丹自黃道上升之候經云溫溫鉛鼎光透簾帷五辰號發紐辰非北辰也乃司命精魂君名曰發紐即五氣五辰壬子戊子甲子丙子庚子是也謂之五子歸庚亦謂之五老啓途紐關鍵也五臟氤氲之氣發其關節方得凝集於四靈辰者亦皇極之辰之元會運世也循環天地之間源源不己度人經云旋斗歷箕回度五常五常即五辰五行捧籍啓虛皇諸真各執版籍言世人罪福虛皇即玉帝也專一主管上方上界之事以喻人真氣自九關百節之中聚於泥丸逸緑登紫清紫清天即玉清聖境元始所居也逸緑輿也一云逸緑與回祿同九關精魂名回緑道字絶冥此緑字作顔色字看金符刻羽宫金符玉册乃紀神仙之名羽宫者蓋梵氣所化輕浮之宅亦水為羽音之謂大丹非金無以為體故金為丹母生水領玄蒼胡珠諸真咸受五色蒼頡之珠以喻丹成萬氣凝聚而領受百靈拱衛以侍之蒼胡見中卷注乃人之性命鉛汞所就也弘濟登普光弘大也濟渡也必令皆得其所在人可以大弘利濟而登上普光明殿聖人之用心無不普必令上下咸得其所運度玄中人太易為玄氣應度者以劫數氣運論之合道者當度玄中人如生神經云應合得度者幾萬人既以成道當出世度人咽味生五芽味者舌下之津液以應天之水謂玄氣中人得漱咽灌溉之道當生五芽珠也即五臟之精華凝結五味酥辣可咽結集成胎仙婦人懷胎在下田與腎相對謂之胎田男子常能存養胎息凝結神氣故無飢渴寒暑之所撓陽神出入謂之胎仙丹母全真陽大丹之母以純陽為之若不尅化陰氣不成丹也謂之金鼎龍虎大藥坤為母經云産在坤種在乾女子十六天癸降男子十五天精泄人之初生為純陽之質為乾卦自十五泄精至二十五拆初爻為陰為姤卦三十五拆二爻為遁卦四十五拆三爻為否卦五十五拆四爻為觀卦六十五拆五爻為剝卦七十五拆六爻為坤卦純陰也陽爻消盡則去死不遠陰陽和合本有生生不窮之理人到中年女男已具便可止欲煉丹母以全真陽復本性主伴合元範宗門云賓中主主中賓如善財參見五十三位善知識是今以先天氣為主以後天氣參之元範法度也循合法度規矩準繩而已煉金丹須慎言語節飲食省睡眠三者次則厚鋪坐褥解寬衣帶端其身直其脊唇齒相著舌拄上腭微開目常視鼻端八者不可缺一合元範者此也太易生玄光太易在混沌之初無極動而為陽生天一之水太玄之氣故曰太玄玄者黑也言水氣之初生而色黑故曰玄光乃先天一點靈明是曰性從虛無生靈是曰神神也者妙萬物而為言也未入殼子內則上下與天地同流既歸人身各有所附人無此靈則頑然一物而已神居泥丸右件玉章天篆九十字上鎮太皇翁重浮容天下統第六壘金剛鐵澤地土皇君玄契曰太易一玄妙行息門氣通初入性根始於心地次第生長滋茂成林蓋由斷疑遂生信解乃曰一度修證一曲水天行一百功從聞入見一和含攝皆起初聞由是天寶為之開光黑帝為之通血北斗落死定名玄籍元始天王曰文昌大洞玉章第二十二地二生火二元妙行丁巳戊午兊涣天皇上真氣前云九皇上真氣今云天皇蓋天皇大帝在紫微垣勾陳宫衆星所拱之位故云星中之尊總司天府星辰之事又流珠上一寸為天皇宫上真氣皆自元始所生也王弼云實三元之胎祖鼓舞裁成正同此論此乃混沌太無元赤混太無元冥寂玄通元所生玄元始之三寶真氣三元乘晨回晨一云神非三元天地水三元各列百二十曹主掌世人罪福每年三會考較簿籍按生神章經並三元經三官懺等所載三元考較實非細務蓋三元上朝玉帝奏人罪狀乘景晨之輿以喻人以三元之氣導養形神所謂三元導養二象攝生中庸云鬼神之為德其盛矣乎視之而不見聽之而不聞體物而不可遺元亨利貞屈伸往來宰制萬品莫不皆由三元也屈伸相感而利害生罪福之報咸在是矣雖係人之感召然亦有鬼神司其分數也法垣興朱霄已於中卷十章解釋朱霄絳霄也乃九霄之一太丹之光氣開太丹之天凝絳霄之宫於南方法垣紫微太微天市等帝昌啓玉扉泥丸九真帝昌上皇宇先靈元其時開玉户以相待氣隨神往咸歸衆妙之門襌宗云别具一隻眼看正謂是也拔尸命門內拔取尸穢之氣令離命門雙腎右曰命門一身命脈之所關係人不能貴其氣固其根貪愛淫欲搖動命門死不遠矣解結桃康階解釋結滯根蒂於桃康之階桃康乃真氣正神即腎神字合延又云玄冥字育嬰人神之名或一神而兩呼兩神一呼斂神保五籍聚斂一身萬神端以保守五臟上以應五星中以應五氣下以應五嶽皆有版籍存焉乃注記世人得道之仙名越轉入太微太微乃南斗之垣經由三界保舉乃得入太微皆自下而上展轉升遷由太微而登三境是為三清侍衛之臣單入而雙修以一身而入道福慧雙修利及幽顯也喻人存念一誠之明參究一竅之妙而先天後天之氣並為一家打成一片一曲水天聞始因天一生水而方得地二生火故下曰海日蓋水性就下而行地中其聲響應于天聞者不聞之聞君子恐懼乎其所不聞人間私語天聞若雷況暗室屋漏之下十目視十手指敢不恐懼其獨鶴鳴九皋聲聞于天謂修行人靜極則天上地下無一聲可逃悉知悉聞或以聞為開海曰自東生地二生火故曰海日蓋日出東海上扶桑山喻人欲結胞胎陰陽氣凝聚於己六陽純全為乾卦乾體具方得成形元命升太初元命元氣也天地根於天一而至地二形氣眹兆之始人命根於精氣交感真陽凝聚方結胞胎化太初欲形之時論性不論氣不備論氣不論性不明蓋性神也屬陰命旡也屬陽修性不修命不免宅舍易敗修命不修性雖千萬歲終是不明妙理故性命雙修為上仙果位右件玉章天篆六十字上鎮無思江由天下統第六壘地德君玄契曰太初二元妙行息門通觀起性心動得性之機念信不忘守信不失為信而行夫五信在中心和見和乃曰二度二點火地行五百功從見入觀觀定則澄神神澄則氣清始名正觀二和含攝神目方瞳由是靈寶開長夜之幽赤帝養通和之氣南斗上生注記丹文元始天王曰文昌大洞玉章第二十三天三生木三始妙行己未庚申節中孚太一上元氣茅山玉經無此章太一見前注前已兩見上真氣今曰上元氣泥丸宫亦謂之上元宫主司天府事或曰元禁無義日中司命童太陽宫中有日中司命接生君字道靈又曰司命靈童以喻人心屬陽而司命者心之神也一名丹元字守靈此章言人心屬火火生於木母隱子胎五行顛倒術龍從火裏出陰符云火生於木禍發必尅木中生火而反燎於薪於事上有反害之禍於丹道木三火二為五有變化機焕然神光明心為離明之象神明之府其靈光焕爛修此文昌大洞如揩泥中珠拂塵中鏡吹寒爐火復取其本然之光明而已披霞升帝墉霞有五色彤霞丹霞絳霞朱霞紫霞皆陽氣也此言心神披此紅霞上升泥丸玉帝之官墉城也注在前字多互顯列坐震靈席萬神皆列坐席於震位東方木德乃發育生氣之地帝出乎震少陽之位也下見二震靈注至此見坎離震三卦也混合五日房五日為一候言精神混合於紫房五日後方各還宫室大丹之道片餉工夫立躋聖地此蓋言火候當以時日守之抽添進退傳曰擇乎中庸而不能期月守回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣又曰回心三月不違仁人既得此竅妙當力守之則將終身然何拘於一候也五日亦五帝散日精日中開五暉等同義靈寶經云七日七夜諸天日月星宿一時停輪此皆以神氣凝集陰陽混合於空洞之中目不瞬心寂定為是白氣育尚生胎中一元白氣君名育尚生字盛昌一名玄歸子後章云右輔歸盛昌生神章云務玄育尚生又云腦宫玉帝名字青君案延昌結中青氣君案延昌字合和嬰乘東方木德歲星之氣流布正真生氣降注人身及萬物肝部之中以生三魂之精左携精上門節中黑氣君斌來生字精上門蓋青君携之以生左目童子名飛靈在頭為日日有九色光芒輝煌熠耀為九魂真右抱合和嬰白氣君右抱青氣合和嬰合以太和之氣以生右目童晨嬰在頭為月月有一十四曜精彩清明瑩潔為七魄之真我生日月華人之兩眼如日月之代明天地之心元不洞見而天下豈外我耶天道流行化生萬物凡有聲色貌相而盈於天地之間者皆物也既有是物則必有當然之理而自不容己是天所賦非人所能為詩曰天生蒸民有物有則民之秉彝好是懿德天地萬物皆備於我二氣備體則雙目如日月之光華金丹謂日月合璧是也參同契兩弦合其精乾坤體乃成又曰晦朔之間混沌洪濛陰陽氣全此日月交合之時也吕仙曰曲江上月華瑩淨有箇烏飛友寶赤氣王友取和諧寶取貴重赤氣王乃心之神也當愛護之使安靜和平或曰友寶乃赤氣王之字即靈臺虛明不昧之理八景照泥丸三部八景乃脊梁三八二十四椎歷其關節上照泥丸三部八景之神內名隱諱注在中卷在人精思神明自來朗然洞房中洞房宫在腦宫元陽真氣自二十四節上升洞房宫明朗洞照八室至此下視六極之境如在掌中所謂三境非遼嬰兒為赤子下丹田之神名嬰兒如初生之赤子即我修此道復歸於嬰兒兒復化為玄氣傳如保赤子心誠求之雖不中不遠混合生玉容坎離交姤水火既濟陰陽混合凝聚成丹於元宫溫養得所抽添得宜自積于中而形諸外見於面盎於背五道秀金華五道即五行具體於地而氣行乎天如人之五臟具於內而五氣沖於外也故五臟皆發秀金華者天中之山名也位為上清公當列位於上清真境作仙公之貴公侯伯子男亦如人間五等之爵上清中脘是也萬氣一定位為中宫凝而成丹七祖斷玄滯七祖九玄有滯礙不得出離者自此如刀割斷一齊解脫幽夜冥關更無阻滯同與飛升上境證聖成真快樂自在身神乘仙風一身之神飄然輕舉如列子乘風而行上古三皇時人多身輕飛行虛空後世因食五穀甘味故沉重不能飛行徘徊三清上優遊於三清之上位在三清而遊宴可至三清之天生能遊神於三田死則可以升三清之境在三十二天之上大羅界和樂返胎嬰易曰乾道變化各正性命保合大和蓋大洞至此返老還嬰和樂且耽也頤養和氣嬰兒自生臍腹之中如懷胎狀大始三氣周太易太初太始即太玄太元太始也玄元始三氣周備是為天地之根也人生至此氣已具備丹亦如是火候周備真文肇生明真文如五方雲篆煉之於洞陽之館冶之於流火之庭方始成文天真皇人書之以鎮安天地此大洞仙經元始以混洞太無之氣結成珠珠光分敷百千萬億凝而成雲絢而成章演成大洞仙經其真文寶符肇明於此人生至此五臟具也謂之五文開廓五神各守五臟精華故曰文右件玉章天篆一百二十宇上鎮上揲阮樂天下統第六壘地德君玄契曰大始三氣妙行觀門通定記信金石至信大成善信能修堅信進趣方名正信十信大全意和則生氣延志和則大美益氣和則三氣就乃曰三度中三真天數分一千大功立從聞入見從見入通由是神寶為之制萬靈青帝為之護魂爽東斗注長生之算木公書青簡之名元始天王曰文昌大洞玉章第二十四地四生金四梵妙行辛酉壬戌小過既濟元靈黃房中此章當以金為主色黃以應中央脾臟黃房乃黃庭也易曰君子黃中通理正位居體正謂此元靈即虛靈不昧是內有黃寧童精血三真元王君字黃寧子玄住黃房中主管尅化水穀之府披錦衣黃裳坐金臺之上周圍城郭亦謂之太倉左有堅玉君胃脘二真堅玉君字凝羽珠守胃脘之左主管胃氣水穀滋養四體令如金玉之堅真氣如碧雲之色下布太倉之府右有帝昌皇泥丸九真帝昌上皇字先靈元守脾胃之右分散水穀灌溉五臟肌膚俾之昌盛一云帝昌童必誤不應重作童浮黃翳神氣脾氣屬土土色黃真氣蒸翳蔭下田之神明真氣丹經云名為神氣穴內有坎離精所以精氣神三者皆聚於此矣鬱鬱虛靈谷蔥蔥鬱鬱覆蓋虛靈之神保護容顔此乃堅玉君帝昌皇之真氣下注於脾胃之府如此蔥鬱之盛所以潤澤顏色青肝明輪子肝中四真青明君字明輪子受胃氣而雙目明朗肝屬木木色青故曰青肝明輪者日月也諸天日月為飛精諸洞日月為伏根人間日月為明輪若吞明輪者為仙服日月光華各有法能澤五臟潤顔容木屬東方甲乙之地乃日月所出之門户地祇於此旦望迎送鬱儀結璘之神開朗徹八窗日月所出容光必照況八窗玲瓏豈不明朗一本作八聰必誤蓋八景照泥丸之類言其光彩熙媚照耀三部黃道太一儔丘蘭儔丘蘭斗中大女名又曰下脘神名皆比喻也如僧問西來意曰庭前柏樹子又曰濂溪窗前草與自家意思一般奉符入玉宫奉太一之命捧符執節升入腦後玉帝宫中呈世人罪福凡初一十五庚申甲子本命之日上奏人魂神問之所作拔赦七世罪超拔七祖之魂赦宥愆咎蓋魂神聚於泥丸呈人所行善惡首先超度七世祖禰若人無善因則纍及祖禰受罪回元期十通度人經所謂十回度人十通亦土之成數回元即返本還元之説期以十遍周過可以度脫七祖九玄之幽魂滯魄混合帝一室回風混合於帝一之房帝一室在玄關之中或謂大洞經無倫序互相參雜難可尋詳蓋此經以回風混合為目故前後上下左右互换實由珠光交映絢耀叢雜所以成文不可以一槩論昔鄧欲之字彥達隱於洞靈臺修混合帝一之道每夜誦大洞經或感魏夫人下降告之曰君有仙分且誦經不倦故來相訪一日忽見三青烏至如鶴鼓舞飛鳴移時方去欲之謂門人曰青烏既來朝會至矣遂玄化成仙豈非帝一之徵焉五老變孩蒙五老見前注今以修大洞回風混合之道皆變為蒙昧為無知識孩提之童五老者五行是也故曰老即五臟神也太素梵行初氣形質具未始相離謂之太素修進梵行未滿之初火候未足金丹未圓梵行妙果方至第四更宜謹恪精進毋怠一善四金通一者水也善利萬物也所謂五行不順行虎向水中生丹之道天地生成之數地四生金名太素水生金子隱母胎金為神性居上丹田是謂頂門人呼為性門性最靈故性門未合尚知前世事及其合則不知也寄體於心以應萬事人能知性門可以修太素妙行觀門化為金仙右件玉章天篆八十字上鎮無極曇誓天下統第六壘地德君玄契曰太素四梵妙行觀門通生初弘一善精水沾濡枯朽發荄是曰精和精和則神和神和則氣清氣清而和故曰清和四度克成四金地數五百功分由是太一以具神身白帝以侍魄元西斗記名玉靈瑶篇元始天王曰文昌大洞玉章第二十五天五生土五靈妙行癸亥未濟乾太極主四真四真乃太易太初太始太素也太極為之主者以其五太至此方始得離而各具其體所謂物各有一太極是生兩儀兩儀生四象四象即四真也又有皇極為君臣民物氣運為年月日時數為元會運世人為形體性情天地人物莫不由此而生在天則有太極真人太極仙翕太極仙官掌管仙籍徐來勒霍山王元輔西梁子王總真安度明鎬京社沖等皆號太極真人玉皇經中四真人與釋教楞嚴經之四真其實一也在人為心肝肺腎為四真淩羽逸上清凌羽奮迅其羽衣以逸遊上清之天古詩刀圭入腹生羽翰人服黃精不食五穀即生毛羽可以飛空步虛而行七轉召司命七轉七返九還也丹道至是火候足矣可以召心中司命之神與之同遊上清也上清即心府絳宫萬神所朝之處太一揚威明太一在頭明揚其威武在人硬打塵勞勿令睡魔陰邪之所侵撓昏睡則精神散失魔鬼欺凌故為武備以鈐飾之司録保儲命度人經有司命司祿延壽益算度厄尊神同此義也司祿神君主生生不窮之理所以保舉儲二之命為大根大本三舉登震靈太極既判天地定位乃立東王西母為萬物之父母今來司録神君常三舉其長子以主震器俾不墜其緒故知立天地之道與皇極之道無異誦之者以此祝頌東皇千秋者魔王來受事得道之人非魔王保舉不得過三界既得過度三界承奉玉音令掌管機務則向來遏截吾之大魔必來拱聽受事仙官束鬼精易曰精氣為物言精氣聚則為生遊魂為變魂升魄降為死既死則為鬼孔子曰昭明焄蒿悽愴此百物之精也酆都有六洞宫仙官雖管魔鬼亦係仙職隸天官所治之府故仙官將為修行人束縛其鬼精不令返道敗德此舉陽抑陰則性圓而情滅可以升進三境果證真仙月中青帝母一云日中非也青帝亦陽也母者陽中陰也亦離宫腹裏陰後云月母寧素蘭同義日陽月陰一合而生成萬彙號曰芬艷嬰此乃月魂名號雌一之神道經月中桃康君燦爛黃房內月宫仙方盈等語皆同天地以陰陽交而生化之理具太張上五符黃素中元君圓華黃仞字太張上進五靈之符安鎮天地如人亦以五氣安鎮五臟也此章應土總統四象故言五符安來上玉名紫素左元君翳鬱仞字安來上玉名玉字也一本作安來生太誤蓋三素君玉諱白素右元君啓明蕭仞字金門上混化六合室混化歸乃九魂名也當混合變化於六合者方輿所載皆謂之六合八紘在人則腦宫泥丸萬神所聚處洞房列火兵洞房即絳宫也玉經朱陵大帝赤騎神仙兵馬赤童斬邪籙役使火兵咒曰開明靈童總御火兵南方赤帝玉司君治朱陽之臺使火精赤丙之兵總統上真之權役丙丁之神以行天德使巳午之神以正地氣其實即心火也用之正則煉成金鼎大藥用之邪則起無明火坑黑暗地獄太極五靈沖五行全備則沖和不全則戰剋太極未判之前五行混然其間太極既判之後四象各尊其位而太極居中屬土所以寄形四象託旺四時今則太極五靈既以沖合則無戰剋也五靈者水火木金土五行五老五帝五嶽在人為五臟和合五氣沖粹五華自生五體康健至為真仙人橫文帝子賓帝賓上卷見之曰帝賓奉五符又真陽帝賓老蓋此神在人五臟之上能入腦後玉帝宫奏人罪福橫文者五文也即太極五行是也河洛縱橫十五數也此乃皇一之魂上歸字帝子萬神之一也在天則為帝子賓客在人則為心之賓客能糾正邪氣降流真氣以滋育萬神縱橫有理右件玉章天篆八十字上鎮皓庭霄度天下統第七壘水制澤地土皇君玄契曰太極五靈妙行觀門思神次興四善五數居中屬脾土主意根故曰思神心之官則思思索蓋出於意根即洞清冥慧妙行故天五五度五橫文即丿文也總五方共為十佺聞善則玄上貫顙六丁洞光即中卷貫顙間十方乃耳根洞微妙行視善則丹元方瞳八史洞明即中卷驪珠湛方瞳乃眼根洞觀妙行語善則通命含漱五文玉華即中卷舐煉五芽珠乃舌根洞微妙行履善則扶就力通地關生命揮執天地關精神生命根手足力通洞靈妙行一性初合五度剋成五橫文就天五太中五百功成總氣中靈帝君由是結元命形黃帝中主萬神衛屯中斗大魁總監衆靈玉清無極總真文昌大洞仙經卷之八
