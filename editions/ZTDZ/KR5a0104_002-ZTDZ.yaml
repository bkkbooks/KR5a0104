官五億萬騎蒼老麻姑金剛力士等收捕之先牒年王次申岱嶽分委城隍社令劄遣瘟疫使臣聞經不依盟約拒止不伏退散者然後奏而滅之夫大道尚慈太清常善上帝好生推仁止殺行經法籙者不可徇私苛暴以招天譴但以禮遣之以經奉之以法籙威之以善功勸之亦方便脩行之捷徑也行此經法籙之士宜在詳酌以立玄功此經能解寃結止譴考釋㖦咒解觸犯安墳宅寧軍府息甲兵止疾疫祈風雨降祥瑞致蠶穀保形命庇族屬救鄉社安邊陲禁蟲虎止旱澇滅妖恠息群凶退消暗曜惡星安奉祀典鬼神資薦祖先䰟識賑濟窮䰟滯𩲸此乃文昌二十四種上妙功德以應周歲二十四炁皆可設齋誦經行法以禳謝之其餘治病馘毒有紫庭天醫神方乃禹皇金后之餘恩及乎萬世使人无横夭之傷時免札瘥之患奉教之士當尋訪受習以取玄功予證果太上不驕樂育天帝澄眞正觀寶光慈應更生永命天尊實由誦經之勤遂臻上清之貴得受誦者勉而行之願與同文昌一會中人齊登妙行謹叙元制誥上天眷命皇帝聖㫖維明有禮樂維幽有鬼神妙顯微之一貫在天爲星辰在地爲河嶽形功用於兩間矧能陰隲於大猷必有對揚於懋典蜀七曲山文昌宫梓潼帝君光分張宿友詠周詩相予泰運則以忠孝而左右斯民炳我坤文則以科名而選造多士每遇捄於菑患彰感應於勸懲貢舉之令再頒考察之籍先定賁飾雖加於涣汗徽稱未究於朕心於戲予欲文才輩出爾丕炳江漢之靈予欲文治宣昭爾濬發奎璧之府庶臻嘉號以答寵光可加封輔元開化文昌司禄宏仁帝君主者施行延祐三年七月日下七曲聖號金闕昊天太師混元内輔三清上宰大都督府都統三界陰兵行便宜事管天地水三界獄事收五嶽四瀆眞形虎符龍券總諸天星曜判桂禄嗣籍上仙元皇眞人天台丈人五炁君司禄職貢舉眞君編修飛仙列籍掌混天造化淪洄救苦天尊筆端无一事之不言分身无一民之不救九十五化之昭乎日月億千萬劫之拯乎黎民全忠孝之大倫示臣子之彝式威光自在道德无爲南極長生眞王九天定元保生扶教開化度人主宰長樂永佑十號圓滿慈尊紏察三界禍福事證果定慧王菩薩迦釋梵正如來太上不驕樂育天帝玉清内境清淨道眞身現紫微巖手執如意杖普濟諸苦統御萬靈都統混天誠心接物萬天教主隨願慈應天尊大聖大慈大仁大孝无邊无量至妙至玄九鳳闕右丞相元皇上帝新册輔元開化文昌司禄宏仁帝君祖師澄眞正觀寶光天尊詩曰天封并寵錫元始昇眞靈數足三百字功侔三洞經眞仙互傳誦陰符奠與京若人持念者世代享亨榮十號圓滿尊號澄眞正觀天尊寳光慈濟天尊靈感慈應天尊注禄定籍天尊消魔護國天尊慈悲應感天尊淪洄救苦天尊消劫行化天尊隨願靈應天尊更生永命天尊玄帝聖號北方太玄湛寂天大梵龍阿境天一長生闕瓊瑶紫極宫體道凝玄變眞離相化身萬億普現諸方太極眞宗太玄道父洞神金闕祖普光弘濟尊靈通太妙仙八威九光聖執洞淵帝心印秉陰明斗極符統玄武右弼司判左領勝府院大弘慈願變現威神誓斷妖魔救護群品匡扶劫運保濟國民威德无邊神通浩博受蒼胡頡寳持檀熾鈞音萬行周圓神通滿證大悲大願大聖大慈紫極元皇玉虚師相玄天元聖仁威上帝金闕化身天尊文昌皇人聖號太極上眞九疑主宰文昌皇人玄聖道君東海廣桑山眞君闡猷大帝興儒盛世天尊鄭淵藪眞人大洞經贊讚嘆寶經甲一大洞眞經本大乘淵深藴奥極玄冥十方三世諸仙聖修習功成達始青具宣玄妙乙二三洞三乘未易涯虛皇妙語絶纖瑕諸經萬法歸宗祖解悟登躋浩劫家奉勸當世丙三帝王宰輔及公侯州牧諸官與庶流富貴榮華无别事總眞大洞究玄猷誡諭三教丁四緇黄二教若殊途聞禮聞詩君子儒咸可誦持眞大洞先天先地一虛无誘引勸諭戊五全眞學道衆王民萬法千門枉用心大洞仙經持萬遍虛皇老子自知音善信男女己六世間文武衆曹僚娼妓閭閻比比儔咸可率心持大洞罪根削滅與神遊决定證果庚七大洞眞詮異衆經登仙入聖謁玄眞饒經八萬塵塵劫圓證虚皇无上人憂嘆愚俗辛八咄哉蠢蠧未明徒豈識浮黎黍米珠大洞度人元一體等閑平地達玄都方便勸勉壬九若欲修行達上乘争如大洞幾篇經盡心盡性修身法悟得高昇大有庭因縁際遇癸十予因諸子鋟斯經述頌稱揚讚此經功德巍巍无盡藏虛皇妙道本无形元皇大天帝大洞經贊因由縁起歲君始自蒼胡檀熾音結成雲篆度天人太玄道父親求受下世方聞大洞經修眞學道立春一大地凡夫學悟眞仙源路杳實難尋欲知捷徑无差錯口誦心持大洞經祈禄仕保子嗣雨水二宗祖前生善力輕今生禄嗣頗艱辛禱祈欲得如君意何似勤看大洞經消弭災異驚蟄三日月无光苦併吞星辰錯度紊天文上消天厄寧凡庶至士同宣大洞經祈風雨致蠶穀春分四魃爲災雨若金蟲蝗水澇穀无成普教豐稔无饑饉祈禱全憑大洞經誘化凡庶清明五工賈農商與四民貪求不覺業隨身忙中好割閑心力習誦文昌大洞經寧軍府息兵甲穀雨六府庫資財甚滿盈兵戈水息樂昇平民歌有道圖長治報國勤看大洞經安奉祀典鬼神立夏七社廟神祇與百靈欲求陞擢盖无因遷名善籍增威力旦暮須聽大洞經資薦祖先䰟識小滿八眷屬宗親父母䰟乆留地府不超升欲思薦抜縁无力齋戒勤看大洞經除冢訟絶徵呼芒種九冢訟徵呼累後人又兼譴吿在天庭生生世世遺殃咎解止宜看太洞經解觸犯安墳宅夏至十或爲營修與築墳興工動土犯凶神致令宅字多災咎解息宜持大洞經除瘟疫小暑十一行病年王統五瘟遍州歷里害生民保全鄰族無傳染嚴潔同看大洞經救疾病大暑十二月厄年災乆染身尋醫問卜與求神不能解離无門吿命道皈依大洞經拯濟窮䰟滯𩲸立秋十三六類寃親男女䰟㝠㝠漠漠在幽陰普教受煉生天界好與頻看大洞經解寃結處暑十四六道寃家結得深寃寃相報幾時停欲令各各生歡喜除是聽聞大洞經稱咒白露十五或爲爭財或爲嗔一時忿怒呌神明結成鬼訟何時了解雪无非大洞經息群兇秋分十六疾病喪亡不離身官災盗賊苦侵凌財消物散如冰雪保佑當持大洞經滅妖恠寒露十七木石狐狸猴犬精抛磚放火現人形作威作福求淫祀殄滅宜看大洞經禁蟲虎霜降十八居處山林與獨行蟲蛇狼虎每傷人尋聲迴避无遺毒住坐留心大洞經開心志啓聰明立冬十九士子儒生茅塞心神童應對不聰明揮毫欲得如神助先好常持大洞經保形神小雪二十如幻如泡是此身炁精神裏好修眞保全形命同天在熟玩文昌大洞經教誡富家大雪二十一莫恃家豪積萬金天司奪禄易危傾有時正好修功德割己刊行大洞經述古應驗冬至二十二一片眞心達上清感通得授自三神此身位證天尊果只爲勤看大洞經普勸善信小寒二十三聽我重言大洞經斯文玄奥果難名无邊功德莫思議普勸凡夫不可輕收因結果大寒二十四元始天王說大乘有縁方遇此尊經若能終始勤修誦共作文昌一會人仰啓頌仰啓三清境无上三境尊元始大法王大慈眞教主玉宸大道君太玄眞道父仰稽大羅天无上玄穹主仰啓三清界侍宸諸眞衆蒼胡頡寶珠所結大洞經妙道難思議玉章生萬神大慈元始尊金像岀地户化現三神人葛衣贈金寶夢中袖二書籙法並相授變化現文昌隨願隨靈應臣今淨三業永斷血屍根奉符入玉京稽首黄金闕一心頭面禮元始大法王惟願大慈悲開受臣所請願臣默想念合符帝一前越度仙黄庭俱躋太漠外七祖斷玄滯受事會王皇願臣諷誦時百靈皆會集音徹通萬天流響達九地成就一切願如經所稱述從此漸進修成道事諸聖禮請頌經筵諸孝友金石矢初心一禮一稱名皈依七曲主注想始青天先天長壽母注想紫雲巖文昌眞國土後天慈父母化現桂香宫孝子及慈孫列見侍慈容願受眞信禮放大如意光隨心隨夢應嗣禄互儲祥願我侍慈親生生榮鶴髮願我逢聖時步步榮寵渥願我處生方厚生富財寶隨念如意光隨方躋壽域願我因縁熟學道得神仙願我業垢空惟心即淨土普與人天衆出離諸苦門漸進漸修持量縁證諸果金石一眞心眞心歸七曲諸佛諸天尊心香同贊祝願與諸經生一心歸命禮至心皈命禮玉清聖境清微天宫鬱羅蕭臺之中森羅淨泓之上現有爲之梵相具无極之神通敷演眞玄破无有色空之礙拯提趣類絶智愚高下之分妙用難窺靈機罔測大悲大願大聖大慈无量度人元始天尊至心皈命禮北方境内玄武位中始從金闕以化身終輔玉皇而斷惡修眞學道功成於四十二年拯世度人澤被於千萬億劫有祈皆應无願不從威德稱遂於乾坤願力洪深於海嶽功過必察賞罰无私大悲大願大聖大慈玄武助順靈應眞君玉虚師相玄天元聖仁威上帝終劫濟苦天尊至心皈命禮始青天上元命化初一炁未漓含七曲眞元之粹九天肇始包三光精體之全鸞機无眹兆之可名鶴質仰清高而莫議先天先地之慈母不古不今之婉容陽回十月五日之春教演三綱五常之祖壽綿長壽形賦无形載觀本行集之跋經莫測始青天之證道大悲大願大聖大慈七曲初劫賦形先天長生壽母太極元君十月初五日誕至心皈命禮桂香内殿文昌上宫道體混成含九十五回之化眞元未露儲三萬六千之精開後天不老之鸞書本青霄莫測之熊夢神父之大慈父至人之上善人脉壽三綱五常之根心包百行萬善之體皈依莫盡稱讚何忘大悲大願大聖大慈七曲聖父顯應慈佑仁裕令德王證果長壽王菩薩儲眞衍慶天尊諱隆祖二月十一日誕至心皈命禮桂香内殿文昌上宫淑質春和含太眞之淑氣清光秋湛藴七夕之清輝包龍象於未漓隱鸞機於不露劍泉之大慈母蓬萊之上善人産萬世之綱常生九天之名教皈依莫盡稱讚何忘大悲大願大聖大慈七曲聖母昭德積慶慈懿恭惠妃證果保光菩薩嗣慶儲祥元君戚氏七月七日誕至心皈命禮桂香内殿文昌上宫九十五回種善果於詩書之圃百千萬化培桂根於陰騭之田自雷杼炳靈於鳳山至如意儲祥於鰲岫開人心必本於篤親之孝壽國脉必先於致主之忠應夢保生垂慈憫苦大仁大孝大聖大慈神文聖武孝德忠仁王新册輔元開化文昌司禄宏仁帝君澄眞正觀寳光慈濟天尊諱亞二月初三日誕至心皈命禮桂香内殿文昌内宫懿範冰清掬九天之霽月仁心春粹扇七曲之家風婉儀入侍於親闈慈淑天全於母道上下一堂之和氣古今萬世之春臺應夢儲祥因心演化大仁大孝大聖大慈恭順淑應德惠昭懿皇后證果定應菩薩冲和洞妙元君先仲氏諱質正五月初三日誕後興唐公主李氏至心皈命禮桂香内殿文昌輔宫聖德慈祥一念嗣家聲之脉神功顯著九天寛帝父之心戲綵雲巖詳无體无聲之禮樂問安月窟傳有典有則之箕裘錫五福於生生仁孝之家榜三元於奕奕詩書之裔因心立教應夢儲祥至仁至孝至聖至慈聖長子嗣德履孝王文昌衍慶眞君諱然明石三月初二日誕至心皈命禮桂香内殿文昌輔宫淑質春柔粹婉容於侍問貝心玉潔儼懿範之清高相成震長之家聲默識克和之閫則教流愷悌化洽冲和應夢儲祥因心錫慶至仁至孝至聖至慈聖長婦善助顯懿循孝夫人文昌靜應天君韋氏八月初一日誕至心皈命禮桂香内殿文昌輔宫父子一家全克孝克慈之道君臣千載盡止仁止敬之心模範人文本綱常而立教準繩世道根詩禮之趨庭幹蠱於陰騭之天福謙於行藝之圃因心演化應夢儲祥至仁至孝至聖至慈聖次子昌德立孝王文昌司禄眞君諱懋陽正月初一日誕至心皈命禮桂香内殿文昌輔宫孝德謙柔禀一元之淑質貞心坤順婉七曲之閨儀五婦嶺前揭問安之華典三潮水上流積慶之清源應夢儲祥因心演化至仁至孝至聖至慈聖次婦助順惠懿克孝夫人文昌嗣慶天君韋氏二月十八日誕至心皈命禮桂香内殿文昌内宫蟾𩲸凝祥根父天之慈愛鸞心斂福陶母德之雍和霜姿雪質之清不物於物春風秋月之抱自天其天内觀萬境之空幻得九天之道心清莫議德婉難名至仁至孝至聖至慈淑眞妙靖懿孝公主文昌萬壽天君四月十六日誕至心皈命禮桂香内殿文昌内宫凛凛天姿道矩肅家聲之粹挺挺風烈仁聲流化冶之新雷霆間發於春和人人開悟雨露旁周於天表物物生成應念儲祥炳靈應夢至仁至孝至聖至慈聖長孫紹應昭靈至孝侯文昌積慶眞人諱河七月初三日誕至心皈命禮桂香内殿文昌内宫聖質天姿粹出春風之抱仙標道矩割開秋月之清四世一堂印印閨儀之雍肅百行萬善天天家慶之精詳應夢炳靈隨機演化至仁至孝至聖至慈聖長孫婦淑應紹孝夫人文昌積慶天君李氏五月一十八日誕至心皈命禮桂香内殿文昌内宫談笑春風字字仁心之發育動容和氣言言家法之流傳子承聖子之心根培陰隲孫繼神孫之體果證眞仙應夢儲祥因心立教至仁至孝至聖至慈聖次孫承應宣靈順孝侯文昌襲慶眞人諱淮十月十三日誕至心皈命禮桂香内殿文昌内宫玉質金姿父母熟栽培之地恩光化日子孫綿嗣續之天生根榮陰騭之根内資相警休命續衣冠之命婉出相成應夢儲祥隨機演化至仁至孝至聖至慈聖次孫婦慧應體孝夫人文昌襲慶天君郭氏七月二十三日誕禮請已周依光懺悔七曲慈尊眞教主慈父慈母同我生子生聖子皆孝慈孫繼神孫盡慈孝一家和氣春无盡萬世春臺月有光慈光普照諸天人細入微塵滿天地我生同得乾坤體一似文昌始劫時聖非自聖凡自凡流浪至今方覺悟願逢七曲慈尊教惟忠惟孝惟慈心不以口業傲神人不以身業累父母不以意業欺天地不以心業禍子孫願從孝行與陰功種種力行諸方便懺贖多生諸罪垢皈依元皇大慈光求嗣求禄求生方不求諸人求諸己惟我文昌七曲師歷劫待人存恕法願放一種如意光憫念衆生眞懺悔懺悔已周次當發願父母願同長壽果龜齡鶴髮映慈光己身願拜大吉祥仰事俯育無苦惱子孫願嗅雲巖桂嘉與己身同發榮父慈子孝一家春光明無負慈尊教願蒙七曲親提接指引登眞選佛門捨生受生正徧知盡未來世俱圓滿發願已周次當贊頌桂香殿上仁孝主教雨周流洗業根業根化作桂花香善本種成長壽果一家骨肉无煩惱七曲子孫同護持普願今世與來生紫雲巖前長得道步步心心帝左右生生世世天主張骨凡可换心可灰一點眞心自金石信禮澄眞正觀寶光天尊文昌大洞經筵平座讚梵音唱稽首虚皇天尊前請誦洞經凡欲誦經先淨三業淨身業神咒淨水洒頂盥手左手玉訣右手劍訣身中之内境三萬六千神動作履行藏前劫并後劫願身常清淨常住三寳中當於劫壞時願身常不滅急急如律令淨心業神咒傳手爐嚥香煙一口左手離訣大道降眞炁吐納煉五神願使攝諸魔心業常清淨斷除萬種障驅蕩一切殃降伏諸有情動念歸正道急急如律令淨口業神咒仍各飲水一口左手坎訣口爲太和宫吐納降眞炁時時誦寶經日日餐法味勿發諸惡言莫起邪淫意願滅罪苦根常論正眞義急急如律令淨天地神咒以水洒經筵内外左手四正訣太一之精東井之華流灌一體蕩穢除邪淨如明珠潔如蓮華化金光身步雲錦霞登七寶殿爲眞仙家急急如律令安土地神咒左手寅訣元始安鎮普吿萬靈嶽瀆眞官土地祇靈左社右稷不得妄驚回向正道内外澄清各安方位備守帝庭太上有命搜捕邪精護法神王保衛誦經皈依大道元亨利貞急急如律令開經玄藴咒玄元始炁分玄元始三炁初分清華開洞神清明文華開啓大洞尊神靈風回太和神風鼓動太和之氣玉音攝流精琳琅之韻玉振金聲至哉本自然至哉之道非勉强爲之誰識此幽文誰能識認幽隱之文堅剛明一悟人能勇猛不涉中小二乘倏忽超三乘傾刻之間頓超最妙上乘寂寂无色根寂然虛靜不滯空色永劫奚漂沉歷劫不昧安能流浪胡能精修持何不精進以成此道究竟登玉清終登玉清聖境一云爾身得長存玉清无極總眞文昌大洞仙經卷之二
