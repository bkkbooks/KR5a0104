front:
  text: 玉清无極總眞文昌大洞仙經卷之二冬二
  hash: sha256:6e7e243e9850e0b6208ce42a2d1e6dab561d9da41b4639e62fb16adb360e080c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_SJB_002-020605c, image: sjb/02/020605c.png}
body:
  text: 東蜀蓬萊山中陽子衛琪註發明經題玉清者玉清已有太易太初太始太素炁形質具未始相離則有大洞高上混洞太无元天寶玉皇之炁以生元始時號高上大有玉清宫故大洞即太極也時號龍漢上劫文昌經所出之時也无極者无極而太極太極本无極也五太已前冲漠无眹不可稱說故曰无極總眞者乃總括天眞地聖人神精䰟六緯之姓名盖有是形必有是炁有是炁必有是理理者天理也純粹不雜誠實无妄釋曰實際道曰眞儒曰誠其實一也誠者天之道也子思孟子發明已盡旣有此誠實之理必有主之者即周子无極之眞二五之精是也道曰杳㝠之精其精甚眞又曰眞中有神是以三才中各具此理此神以生莊子曰天地與我並生萬物與我同體此經包羅天地囊括三才无一處不實故曰總眞文昌者文者理也如木之有其象交錯古者蒼頡制字依類象形昌者盛也大也言天地之文理盛大也如伏羲則河圖之文以畫八卦立三極之道此經所以推窮三才中之文理性命皆自二炁五行中出故文昌星乃土炁所化坤土之卦辭曰黄裳元吉文在其中也艮土之卦辭曰生萬物者莫盛乎艮成萬物者莫極乎艮故周子所謂陽變陰合遂生五行度人經云五文開廓普植神靈而南上文華光彩焕爛故十四章云南昌發瓊華乃南極長生朱陵上帝南昌受鍊眞人所治見有上帝所賜注生眞君八角玉印所謂南斗注生不言文昌而言南昌盖丹天世界文明之地梵炁所化是爲南昌上宫今南嶽衡山朱陵洞天上應奎軫始因奎壁垂芒帝命主持斯文壁位居亥專主圖書奎位居戌專主文章盖奎宿有文彩壁宿能藏書昔嬴火之後於屋壁得古文故壁之於文與有功焉是以文昌宫有東壁圖書府太微垣中有南斗第五星文昌煉䰟眞君又有太上九炁文昌宫文昌上相次相上將等星又有文昌圖流運以生化文物是故天地之間生成變化之道莫大於此故曰開明三景是爲天根无文不光无文不明无文不立无文不成无文不度无文不生等語實基於此易曰物相雜故曰文是以文昌一經雜紐不貫亦如易繫云變動不居周流六虚上下無常惟變所適又曰參伍以變錯綜其數通其變遂成天地之文亦此義也故文昌之在世者乃教化之本源大洞者大者雖天地之大不可加也洞者通也萬物通有此理即太極之謂太極既判天地人三才各極其位所謂物物具一太極故總而言之是曰大洞即邵子所演箕子所陳皇極之道同義經籙法皆有三洞而大洞最高仙經者經者由也萬物公由之正路也儒詩書易禮語孟春秋皆經也修道之謂教故曰仙經元始因人之所禀賦各具是理故修明品節以爲教化之本使鬼神并人各返本源就所禀受處修進以爲學道求仙之捷徑也人能原始要終反求諸其身則天地萬物皆備於我矣文昌準易題曰无極總眞文昌大洞者似爲倒持有所不合當依无極文昌總眞大洞无極者即太極中陰陽動靜也文昌者五行也總眞者乾道成男坤道成女也大洞者化生萬物也經曰萬炁生萬神是也故曰太極圖是一部周易无極圖乃一部文昌大洞已於圖中明之雖然乆則難變恐貽衆疑姑仍舊貫且此經與易无異易以乾坤爲門經以大地爲主門用也主體也仰則觀乎天文俯則察乎地理理亦文也天文者六十甲子日月星辰布列三十二天也地文者六十四卦配於三十六壘也人文者凝集三十六宫三百六十骨節中神炁也即度人經三十二天外彌羅天清微天禹餘天大赤天是也三十六地者九壘土皇每壘分四土皇共三十六土皇總治方輿衍而伸之則乾之策二百一十有六坤之策百四十有四二篇之策共三百六十以應周天太陽行度之數也小而陽爻因之凡陽爻皆三十六以應四九金數也今大洞首章四言者二十二句計八十八言另安於上以應无極外五言正經三十六章計六百二十句每句當易卦一爻六十四卦計三百八十四句應之以乾坤坎離四卦計二十四爻古人處之四正非也盖乾坤爲大父母而生六子坎離乃萬物之父母生生之根也當置太極之中其六卦以三百六十爻句布於十二月上應周天火候餘二百三十六句將二百句分布四正以應四象太易太初太始太素每方五十句合得八句卦每卦六爻計四十八爻外取二句以分卦之奇耦陰陽而四象備矣復取三十六句納於中宫以應太極得卦六所謂金入土釜丹鼎圓成經計四千九十六言即易變四千九十六卦也以此解釋則知文昌乃一部周易也易有聖人之道四經有聖人之道五窮天地之原者尚无極保性命之正者尚總眞究陰陽之理者尚文昌神變化之妙者尚大洞咀辭味之奥者尚仙經乾坤毁則无以見易陰陽隔則无以見文昌經亦易簡之道也君子所居之安者經之叙也所樂而詠者章之辭也顧不妙哉其餘觸類以長之將以俟於方來琪載拜祖師太玄道父牛孳先生發問啓請并集經祖師九天開化元皇帝君重修玄契并叙經祖師文昌皇人玄聖道君主文昌圖并掌經文昌大洞經以太玄道父爲祖者乃天上集經之師也以元皇帝君次之者乃此經初出流傳人間之祖也文昌皇人次之者乃斡運生炁主持文物輔佐皇猷之祖也按帝君内外傳并化書及經叙帝君於周武王乙巳歲生於吴會即今平江是也受三眞人文昌大洞經後以看誦之勤屢獲感應受金像法籙行持救濟有效遂證大洞妙行聖果故作叙并玄契以開化天下四海未嘗无之然以累經兵火或絶而不嗣者有之矣今行于蜀而蜀人深信者以帝君在蜀爲太神自唐至今累朝崇重對王建廟所以帝君專以此行化救人其間亦多有因此得道者要之此經自周武王時流傳人間至今已二千有餘年矣故其字或少有舛失亦无足恠尚幸累世至人證訂有次誦者亦不必疑彼惑此但至誠精一行得一句亦可以爲上仙或謂與上清大洞不同琪曰今三山皆有經籙法亦各不一況此乃玉清文昌大洞明達之士皆歸一道識淺者固有異文昌勝會文昌會上有通悟禪師波淪禪師蜀中諸禪師皆觀音菩薩化身並與嗣禄道場號曰心珠會仍以帝君爲主每歲各師生辰諸山釋子大作勝會廣化香火慶贊稱賀官貟士庶欽仰者比比焉故凡二教經儀多釋道混融互用又有寶光天尊圓通道場敷座揺帝鍾彈梵語咒九朝行道亦有水陸科等其間未喻者或謂語意不純非不純也大抵道之一字唯理是適理之所在其道大同奚分於二教唯其弗能推致窮極則生異見是以疑惑不能堅确此心此心尚不能堅確安能求道理於純一哉矧大帝世稱碩儒刻意墳典於晋太康中舉家歸風洞登仙累朝崇重以爲斯文宗主先遇太上賜丹獲證道果後遇釋迦授記又證大乘故於三氏門中維持正教今皇元累降璽書褒崇易靈應廟爲右文開化之祠祠者國家之祠祀也與諸神廟號不同又加封輔元開化文昌司禄宏仁帝君諸神中膺帝號者極鮮琪蜀産也蜀祠不在言宣自訪海嶽每至必訪靈迹在在有之吴山又最尤是知香火之盛如此其保安家國利濟幽顯其功用豈可量哉又知文昌宫官屬總總井井今將文昌家慶聖諱并誕辰開具奉文昌香火者宜知之大帝累世諱善勳忠嗣孝仲如意勳浚已上不忌古名惡子後去中下二字唯諱亞字𩃎夫書詞䟽者切宜避之二月初三日誕左司獨孤氏七月十五日生乃許旌陽後身因斬卭州蜃功累朝封八字王今掌文昌左班領官屬一千二百人封廣佑嘉應昌澤孚惠王右司李斌八月十五日生以破苻堅功累朝加封八字王號今掌文昌右班領官屬一千二百人封英惠忠烈翼濟正佑王紫微垣文昌將相星君太微垣文昌三公内座星君少微垣文昌處士博士星君文昌上宫周文憲王大成至聖文宣王太清九炁文昌君太清紫盖宫夫子君東井清明君清明了决吏九奇宫五經孔炁君文昌内侍六仙白鶴蓬萊長壽桂花菊花桂香外殿如意四將左右前後四金城文昌北府左右二丞相左右二太史蘇黄二眞人御史吕眞人長史張眞人天簡註授司侯眞人隨機應感姚眞人逗機赴感秦眞人混一元皇君北府統帥武經公左金吾使吴將軍右金吾使狄將軍掌如意劉將軍主管兵籍七聖將軍木馬烽火快利巡獵鵰虎等將軍鸞府省臺一百二十員大將三十司諸靈官監眞宅監雷抒監邊疆將軍文昌府左右通引判官採訪遊奕使鳳凰山應夢土地眞官具位臣姓某謹炷心香虔伸供養三清三境大羅高眞三寶上聖金闕昊天至尊玉皇上帝大洞祖師太玄道父牛孳先生玄天上帝祖師九天開化主宰元皇上帝祖師玄一眞人鬱羅翹玄二眞人眞定光玄三眞人光妙音祖師東華大神方諸青童君扶桑山暘谷神王祖師太素三元君祖師青城山九天丈人儲福定命眞君廬山九天採訪使者應元保運眞君祖師太極眞人安度明徐來勒霍山王元甫鎬京杜沖祖師申泰之祖師西城總眞王君王遠字方平小有天王太素清虛眞人王褒字子登祖師南山司命夫人紫虛元君魏華存女𠜍徐練師周武穆公主周惠抃眞人祖師三天左相保和眞人王昌運大洞嗣師王道淵潤州太守唐若山眞人祖師全眞達道眞人張如珍葆光襲慶眞人張曇要祖師楊大明祖師銀青光禄大夫崇玄館大學士廣成先生劉元靖祖師鄧欲之祖師冲和見素眞人施存祖師楊太初聶紹元高雲舉劉根眞人祖師天師眞人薛季昌薛幽棲瓊瑶眞人寶峯衛寶元字桂之祖師黄廬子廬山王三一南嶽彭蔡二眞人謝脩通聶師道眞人祖師龔長慶向子文田虛應俞靈聵陳與明蕭靈護蕭惟億陳先生眞人龍虎山茅山閤皂山歷代祖師眞人歷代傳經傳籙傳道祖師眞人恭望眞慈俯降經筵證明修誦入意有兹願悃控吿上眞伏願垂光印知修詠臣某下情无任戰慄之至再拜以聞平坐存想法謹出臣某頭面身中五臟六腑眞炁生炁神人一合凝集臣某身中屯駐所居金房玉室毋請散亂急急如律令髮神蒼華太元君腦神精根泥丸君眼神明耀英玄君鼻神玉瓏靈堅君耳神空閑游天君舌神通命正倫君齒神鍔鋒羅千君面部之神自相守攝䰟還𩲸永无傾急急如律令心神丹元守靈君肺神皓華虚靈君肝神龍煙含明君膽神龍曜英明君腎神玄明育嬰君脾神常在䰟亭君重樓一十二眞人五臟六腑身體精皆在心内詠天經晝夜存之自長生急急如律令九靈太妙白玉龜臺金眞萬炁祖母元君心中一眞天精液君宇飛生上英回風混合上眞聖母中候元君名啓珠胃脘二眞堅玉君字凝羽珠雌一帝眞九光聖母精血三眞元王君字黄寧子玄斗中大女儔立蘭肝中四眞清明君字明輪童子斗中眞仙少女郁墨子脾中五眞養兊君宇太昌子斗中太一神君字頻運珠肺中六眞上元素玉君字梁南中童大洞帝一太素尊靈父寧母精腎中七眞玄陽君字眞光東方青帝彫梁際膽中八眞合景君字北臺玄精南方赤帝長來覺泥丸九眞帝昌上皇宇先靈元西方白帝彰安幸上玄元父君叔火王字左回明北方黑帝保成昌上玄元母君高同生字右回光中央黄帝含神光紫素左元君翳鬱仞字安來上帝皇太一重冥空字幽寥无白素左元君啓明蕭仞字金門上九帝尊神日明精字衆常生黄素中元君圓華黄仞宇太張上上玄九帝尊神君諱明眞正一左仙仲成子帝賓宇西華三素老君罕張上字神生道正一右仙曲文一光堅字琳和玄一老子林虚夫宇靈時道左目童子飛靈字陽光太微小童干景精字會文子右目童子晨嬰字陰精玉帝君逢陵梵字履昌靈胎中元眞精䰟字元君无英公子玄元叔字合符子胎中白炁君務玄子字育上生白元洞陽君鬱靈標字玄夷絶結中青炁君案延昌字合和嬰白元君朱晶字