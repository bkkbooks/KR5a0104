front:
  text: 玉清无極總眞文昌大洞仙經卷之十藏五
  hash: sha256:17cccc612631c33e405c27b98efb2040ff9e821dc5886903d6415ef31a3cceaa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_SJB_009-020693b, image: sjb/02/020693b.png}
body:
  text: 東蜀蓬萊山中陽子衛琪註元始天玉曰文昌大洞玉章第三十二表震巽二卦其音屬木乙亥丙子大有謙東華發始暉高晨映上清判府東華方諸宫亦救苦天尊所舍蓋崇仁重生之地有九龍符命拔度幽魂發始暉者初生一陽爻如日之昇高晨一云青童君名晨日也日之升高必映上清眞境言人眞氣會於心府而出自肝臟方始傳送午時至絳宫洞焕圓珠靄光彩洞耀焕燦於蒼胡寶珠之中煙靄鬱勃是皆取喻於心珠之炁神光圓明洞照八室空其五藴靄然粹然之寶朗朗紫暉明朗明也日光生紫暉而朗朗然明又肝神龍煙含明君此木應肝也蓋震巽皆屬東方之木上應歲星下主肝部七晨回帝席太陽神名七晨回者上朝天帝之几席蓋帝出乎震齊乎巽也少陽爲震升於巽屬乾乃六陽純全之位故曰帝席五老飛玉軿上聖出入必令五老啓途羣仙翼轅眞仙及修行人亦皆如是乃人之五炁所化度人經五帝侍衛三界稽首同太一景中玉太一在頭上爲景中之王見前注景中人又曰景中王人當貴重頭爲一身之首領故以此人神爲王者呼之是也司命攝萬靈飛玉符軿攝召萬靈皆乘巽風故招神攝風司命在心總制萬神心爲雷之主雷經云心火不發鄧君不鳴肝神不怒辛帥不靈意神不超使者不行蓋肝屬震巽乙木而以心火發之此擊摶之象也故能收攝萬靈聽命又震爲雷在人爲音聲巽爲風在人爲呼吸炁故以八卦表身泛然雲波間水會東南巽地言此時眞炁薫蒸津液灌溉而吾元神湧升也二卦在先天相對取象曰雷風相薄故能鼓舞萬化寂盻泥丸城隨風巽君子以申命行事毅然作色中天下而立攝召三官五嶽泥丸城闕在最高峯頂寂者無聲盻者顧視之七轉召三官七轉招眞符命以召三官在人則三田之神也進退利武人之貞非威武不能政不順非風雷不足以警動萬物北君稽首行北方爲首啓行其五方隨時而升元神自腎臍中超去歷遍五臟而上登泥丸其三關五臟之眞並隨侍而行上升五嶽應命到五嶽隨應召命而至五炁皆相感化而朝也雷霆掌生殺之權賞善罰惡之司故雷動風飛萬神畢集豈容少延拔死書長生三官五嶽皆削落死籍書上生之字二象倒取得益卦辭曰君子見善則遷有過則改其斯之謂歟在人力行之爾三舉震靈符上天有震靈符主召生炁制伏魔精撓萬物者莫疾乎風鼔萬物者莫疾乎雷故雷主生殺之權如雷水解百果草木能甲拆是主生也雷動風馳剪除禍亂是主殺也故此章上下句云拔死書長生玄解大魔精示生殺之柄也前太始太極章震靈凡三見焉並見前註詳解玄解大魔精巽户爲神霄府乃風雷所出之地能妙解六天大魔不令惱亂學仙之人震來虩虩震驚百里皆當恐懼修省七祖生福堂九玄七祖皆生天上大福堂中逍遥此天人之福也福盡不自下生異類之中修文昌大洞乃上乘法門到三清界玄華保黄寧以玄華保養黄寧童於脾胃之間使永无失墜此長生乆視之道也二象合成恒卦辭曰聖人乆於其道而天下化益辭天施地生與時偕行凡修大洞不拘時候但隨所寓一念不動天地之炁發生始於復終於坤一升一降爲一周天以一年之炁候攢於一刻之間身中天地造化右件玉章天篆九十字上鎮太極平育賈奕天下統第八壘福德君玄契曰七祖九玄上生天堂億曾萬祖玄華齊生内保黃寧種族俱升皆注仙品列籍南昌萬世代族墓山塚訟考謫鬼帳隨大洞仙經一時和平地根惡根削除落滅興道爲一長生自然元始天玉曰文昌大洞玉章第三十三表坎離二卦既濟之道太清仙境玄炁所化太帝九老京潤萬物者莫潤乎水所以品類之衆莫不皆賴以生水由地中行江河淮漢朝宗于海皆有攸司故扶桑大帝東方九炁天君共治水府乃爲水府總會之所然其論水之源生自北方天一生之地六成之起於坎位故此章以坎卦表之易曰水洊習坎君子以常德行習教事校仙登扶桑檢校仙籍應得道者上東海扶桑山言人精炁生腎而傳於肝以至心府故下云神綱精炁在人身如水流行天地間七轉召天帝天帝即玉帝也以元始之命召之在腦中宫泥丸也考校三界眞仙并世人功過莫不皆由三官五嶽呈奏玉帝司命乘神綱以表離卦在人爲心以主心之神乘其神綱而上朝也心爲神宅故有綱領離乃麗明之象故心神好明察理事五嶽啓靈户嶽者即面部是也靈户者眼耳口鼻是也開其靈則能制魔閉之不靈隨魔轉也五嶽皆啓敞靈扃以聽帝命傳制大魔王奉傳玉帝之命以制遏大魔臍中皆北陰之府陰邪所勝之地故傳命以制遏毋使妄動撓亂魔者眼耳鼻舌身意也河海皆受事今夫水一勺之多黿鼉蛟龍魚鼈生焉貨財殖焉河海之主魚龍之屬也受事聽扶桑之命自天一生水於坎位以至成天立地生賢生聖皆由是焉河伯海神水族神仙皆禀受其本來合任之職事如陶弘景爲都水少監郭璞爲水監仙伯又四溟夫人多管水中女仙人與水族混爲神仙兹以琪所歷江河淮海水府龍宫西自蜀江南自衡潭西南自沅靖三水皆會洞庭下流漢江會大别至廬山東南自吉贛會彭蠡下流至儀眞見淮黃二河自北而南會鎮江下流崑崙山東入于海又自鎮江歷常蘇秀入太湖三百六十頃至吴山會浙江又東南自福信江會浙又自維揚泝流經淮過吕梁入濟又自太山會于濟又自濟泝流至臨清入滹沱東北會小直谷入于海又自直谷泝流入京沿程看瞿塘洞庭彭蠡太湖龍宫壯麗又見馬當山采石金山三水府豈得不受事於海立示應會方潢潦无根可立而待江漢朝宗于海亦各有時丹經天應星地應潮天上金生地下水生蓋每月弦望晦朔海水隨爲消長每日一潮自東海發軔捲如雪山過海口泝洄經浙止淮西采石東南止嚴陵灘東北止小直谷日夜應會不爽亦如人身中每一日一夜血炁一朝於囟門遇其潮時即默然靜坐凝定神恩但聞血炁自踵至頂奔走凑理蔌蔌之聲如羣蟻相縁五臟六腑轉動聲響内外相應見于四體達乎聽官乆之又徐徐散去闃寂无聲此亦修行之大端也聖人運化豈可託之空言善譬巧喻俾人易曉近取諸身遠取諸物若未能遠觀海潮但近聽血榮炁衛一萬三千五百息之潮豈非示人應會方乎保符泥丸内樽酒簋二用缶亦可與獻於王公薦之宗廟況所保符契皆在乎泥丸之宫以待桃康乎陰符陽火皆聚於上元宫守神曰桃康激而揚之可使過顙水生於腎而搬運有道則泝流於泥丸桃康乃腎中之神專一運陽精於腦後以輔元陽以成金丹回名易死籍既得生生之根則回改名姓於死籍之中无過可書也死籍者黑簿也人有過咎災厄并死亡事皆得具載其中記仙叔火王上卷第三章云高同生叔火王今此止云叔火王蓋雄一之經也叔火王道父也專掌列仙之籍凡得道者系焉拔絶三塗籍坎辭曰係用徽纏寘于叢棘蓋囚執之所思過之地如周文之羑里太甲之桐宫也今絶三塗易死籍豈非此義乎去禍生上英心中一眞津液君字飛生上英主血液易曰坎不盈秪既平無咎姑且去禍而未大也削去灾禍之根生上英華七玄登朱宫朱宫正在離卦上七玄九祖進登朱陵火府鍊化自然蓋水火二炁交媾水火鍊度葛仙翁玉陽宫皆以祭鍊得道我身會明陽兆身朝會光明太陽道境易先天曰水火不相射此經以水火交而成道斗經水火乃道之眞體非此不能成生化上友方盈子月中桃康君方盈字運梁上則友愛之乃眷戀留連之意上下二神互换流運神炁滋茂生根毓養太和以立四大下携理維藏胞中天帝精魂名理維藏字法運珠守小腸水海以分别水源清濁順導發泄之功如禹功之大在人宜善導精血左攝明車君胞中黄炁君諱祖明車字神无極守肝正斗明輪同人非萬炁萬神流注運用則百骸五體四肢皮肉只是一塊頑物右輔歸盛昌胞中白炁君在右諱玄歸子字盛昌守人肺上二神乃胞胎之中神靈共守五臟之上前章云白炁育尚生同此義混一玉景炁一云玉京必誤蓋左右陰陽二炁混合如玉之景炁妙合而凝以成兆之形此炁呵之可以煮茗含之可以乾汞化兆吉以昌欲變化我之炁質俾吉俾昌蓋得此道者也雖愚必明雖柔必强君子順之吉小人背之凶非由外爍我固有之矣反嬰元命童反我衰老之元命靈神爲嬰兒之童亦曰元命眞人修習大洞之道鍊萬炁萬神還歸一眞如嬰兒之形復化爲玄炁檀熾鈞吉祥不孔笛吹无生引没絃琴操太平歌先生年來窮到骨何事欣欣樂天和除非只是知音聽不是知音莫與彈天一元根仙天一貴人出入丑未而爲水之元根所以江海爲百谷王以受水實由天一生水根源起於此坎卦之義因兹著焉自在光明輪大吉小吉爲日月所居之位北斗擎羊陀羅主事之所故北斗位處坎宫名同月曜輪轉光明亦青肝明輪之說同明輪爲日月爲水池火沼凡鍊度先鍊己心爲離火腎爲坎水務要既濟其法常令此心虚无纖塵不入一念不動二炁相合化爲水火在前亡魂自腎左出歸池沼鍊化右件玉章天篆一百三十字出於大赤天下統第九壘洞淵无色剛維地土皇君玄契曰至此无上乘門兆身祖族皆證眞仙可以弘慈回度人天證太清太極仙王眞人此四章乃三清玉帝四天无卦象亦猶乾坤坎離四卦无支干乾坤大父母退居幽靜坎離爲萬物之父母故貴重三清退居无爲玉帝主事俱當貴重皆在无色之境故不拘於卦象之内人能修習文昌大洞妙行亦當超出三界直造三清玉帝之天不爲五運八卦之所拘束五運即五行支干是也八卦亦乃五行所化乾兊屬金震巽屬木坤艮屬土坎屬水離屬火修行人脱殻離機也元始天王曰文昌大洞玉章第三十四表坤艮二卦同音屬土上清眞境元炁所化玉清萬華宫萬華宫乃玉清元始所居皆金玉珍寶以爲莊嚴如華嚴之富貴无異前云看華嚴不如一艮卦今萬華宫者知其所止也君子思不出其位又君子素其位而行无入而不自得也以喻人安分守常在至善之地无偏執不妄求守天理之正富貴乃自然之理人皆可享萬華宫富貴高仙藏帝經坤有該載生化之理易曰坤以藏之高仙者天眞藏經籍之所三十六部萬八千篇佛經五千四十八卷一藏自古帝王之制天下皆有所藏圖書如神農之連山軒轅之歸藏大禹亦曰連山商湯亦曰歸藏歷代寶之以爲神器上天亦有圖書乃天帝所藏以統御萬天宰制萬品主圖九天表艮止於此爲文昌盡善盡美之道君子敬以直内義以方外含之以從王事此人臣之道也高仙上聖主管圖籙於九天之上斡運化機生育萬物也九天有東璧圖書府奎宿主文章居戌璧宿主圖書居亥天帝命文昌皇人玄聖道君孔丘主宰文昌生炁圖流運眞炁生化萬物輔佐皇猷帝命登封太極上眞九疑主宰東海廣桑山眞君闡猷大帝興儒盛世天尊人或難之曰是非孔子之道大聖人豈可流於異教哉殊不知在天爲列星在地爲河嶽幽則爲鬼神明則復爲人此特昭昭然爾況大聖人垂世立教爲萬世帝王之師受累代封崇享天下祀典在天地人中豈无果位耶今附於此以俟明者證知洞觀无中生至哉坤元萬物資生人與物之生從无而有得坤之全炁故曰坤厚載物德合无疆洞觀非可以眼觀當以心目内注自无中生有非无爲无湛然常寂不可向外馳求妄以爲有如善財所見盡在普賢身中此道乃虚无自然无可捉摸但宜回光自照故曰洞觀无中生七轉召萬頁與七轉召一官同義萬眞即萬神天有萬眞人有萬神以天之眞混人之神以天之炁合人之炁自然成道豈不貴重五嶽一來庭坤輿艮山五嶽爲最一撮之土載華嶽振河海一卷之石草木生寳藏興況五嶽在乎掌握矣金丹謂之攢簇五行三官招衆魔三官即三關號令一施則萬天拱聽志帥所在炁爲奔走三關廓通則三華聚頂三才中非三五無以宰制萬化司録校所呈三官五嶽呈人禍福帝命司命司禄重復較勘方定其休咎昔聶紹元好讀書攻莊老一夕夢入一城宫府嚴肅中有朱衣按几謂曰此司禄之所也可自開籍看平生事云云後受大洞畢籙修混合返還之道一日晨浴有四鶴集于屋村民見火超奔之紹元已化非司禄較所呈乎拔籍重泉曲泉曲十二河源乃水府之分曹也掌人間生死功過事柳元傳水府屬陰女仙治事在人即十二經絡是十二河源記名書上清此句下又按茅山玉經有云七祖解牢結穢血悉沈零反胎朱火室更受洞中生伯史衛神軀令我保黃寧六句續前句爲一名曰三素老君章其文義重叠今依川本較正續後十五句隨前十句二十五句依舊作一章更不專擅紊亂添答以疑人心但依此行去亦證上仙玄洲絶三津坤至柔而動有剛至靜而德方故方輿之内玄洲赤城府在東海之外三島神山玄洲十洲之一也三津弱水三萬里各有三關津人靡克至今修金丹者絶此津涯不歷關隘一步便到家古云剖破藩籬即大家修文昌大洞之道不歷三界諸天二十五有頓超無漏之鄉方爲了當羽景太无庭上乘羽葆景輿登升太无之庭遠在无色界之上傳曰德輶如毛毛猶有倫上天之載无聲无臭羽景有形太无无色回霄飛垂漠回還於九霄之上諸眞車輦甚衆碾消雲路所以飛揚沙漠垂下昔禹時有鳥自丹州來吐五色氤氲之炁名曰憑霄雀能羣飛銜青砂珠輕細風吹塵起名曰珠塵如沙漠飛下人得而服之身輕不死其此之謂歟明了之人不動脚根一念纔起直造圓頂也一云飛重漢字頗相類委化混萬精含弘光大品物咸亨此坤之德人能收斂涵泳與時偕行與萬物同體無一物不遂生成委身混融於萬物之精五雲鬱絶空五方五靈五色雲炁靄鬱於絶空之中五臟之炁薫蒸於心腑凝結成圓明之珠彩霞暉映即五色鬱勃洞焕太空七霞落圓明七霞七覺一本云一靈落圓明一靈亦虚靈心圓明乃心之神此言七色雲霞光奪日月度人經璇璣玉衡一時停輪此數句言高仙與司命司録三官五嶽同會之時車輿鸞鳳之衆光景如此蓋言人能凝聚萬炁命元靈之神乘之自下田至泥丸萬炁凝萬神集亦是落圓明也朗朗幽寥子臍下嬰兒朗朗顯現二卦合德謙卦彖辭盡之也天道虧盈地道變盈鬼神害盈謙尊而光君子之終也言人晦迹隱光安守本分不期著而著也蓋得謙光之義君子隱居求志行義達道自然名聞上下蓋以幽寥隱然无形无聲之物而朗朗顯明者所謂溍雖伏矣亦孔之昭之謂梵昌濟黄寧梵昌心神黃寧脾神言以心血濟養脾胃也五行生克在人運炁以合之各有其道謂如心病運腎水以濟之五臟皆倣此蓋二卦反對得剥辭曰君子尚消息盈虚是也黃寧中宫也黄中通理正位居體美在其中暢於四肢發於事業人之動容周旋合道中禮者盛德之至也五老揮絳華五老乃天地始祖人之五老亦同一炁蓋五神聚於絳宫揮把丹華也燒香散花皆身中神識絳華丹華一也散香携玉靈五老遍散五香以薫蒸五臟靈明之神上卷玉壽靈亦胃神欲見此神當一心注想如猫捕鼠眼睛不瞬即得凝集金質濯帝川此即玉眸錬質黃華蕩形以凡胎濁骨今變爲玉靈金質前云骨肉金玉實俾此金姿玉質灌濯於帝一之川緑煙靄流瓊青緑之煙鬱鬱勃勃如瓊玉之欲流前云五雲鬱絶空皆眞仙陞降祥煙瑞彩藹然粹然洞焕空無之境光景殊勝上清玉皇師上清宫乃玉皇之師蓋靈寳爲玉帝之尊師也玉清上清太清乃爲三寳三清之下玉皇爲尊玉皇即昊天玉皇上帝乃萬天至尊位亞三清天公經三清退居无爲玉皇治事玉宸大道君玉宸道君靈寳天尊所居之宫曰上清七寳紫微宫在太清之上玉清之下是爲中元宫三清即儒書所謂三皇也與心絳宫神虚靜先生云瞥起是病不續是藥不怕念起即怕遲覺又古德云若人靜坐一須臾勝造浮圖七寳塔寳塔終乆化爲塵一念不生成正覺蓋此心一念不生立躋聖地故曰飛證太玄尊心者主乎一身而其體虚靈足以管天下萬事萬物之理理雖散在萬事萬物之上其用之微妙不外人之一心前賢有詩云道通天地有形外思入風雲變態中是也靈寳與心神爲一心乃天心非肉心也神乃歷劫不壞之神非祭祀之神也詩曰人心若與天心合顛倒陰陽只片時故曰玉宸與心神飛證太玄蓋天心不出於大公至正无分毫所私人心若能體而則之行无私曲一是皆以至正處己則果證大洞太玄无疑矣飛證太玄尊飛昇證果太玄眞尊之位此下茅山大洞又云神拔三塗積仙胎纏兆形多有此二句蓋太玄三眞人乃極尊之位天地之外曰虚无乃元始所居號虚无自然以其无心故虚空盡故无虚而能容无則能化故曰藏帝經人能虚无則神明自來來則靈而乆故取坤艮喻其能容且乆右件玉章天篆一百三十字出於禹餘天下統第九壘昌德君玄契曰至此登上清眞王太一眞人元始天王曰文昌大洞玉章第三十五以表坎離二卦交媾之道玉清聖境始炁所化三頁生太無三眞者南方三炁天君生於空洞太无之始下云南昌即文昌也今衡山上應軫宿下鎮離宫有朱陵洞天乃三十六洞天之第三也人生從此鍊化方許成人又在人即精血三眞元王君便是或曰三眞即前太玄三眞又曰太无乃太元字多誤此乃太无中太素君大洞玉章玉户映晨霞大人繼明照于四方夜初盡而曰繼照正大明出於東方之時也南方位處離宫名同日曜玉户者烏馭所出也晨日也暉映晨日之霞亦早朝之謂也南嶽山朱雀頂有日觀亭天色清明早朝登此亭觀日輪之出海一出一没一進一退有欲昇而不能昇然後一躍而上此處備悉太素洞元靈日月麗乎天容光必照然於南方丹天洞陽之館凡有得道由此鍊形方許飛昇帝庭上卷云太素三華炁三華炁亦南方三炁太素乃三素母蓋主持鍊度之事元靈名也亦名罕張蓋衡山有福地名曰洞元靈光天等壇皆上仙得道之所文昌鍊化皆在此處故此洞章多言及之丹林森朱柯百穀草木麗乎土以其南方赤色故生長皆丹林朱柯黃庭經丹青緑條翠靈柯醫書南山多靈芝瑞草餌之皆神仙回神九重府還神於九重之府蓋朱陵火府九陽梵炁結成今南嶽山勢亦九向九背以應陽數此言修習之徴心府現出光景南昌發瓊華燥萬物者莫熯乎火故以南方火德增助太陽以麗品彙俾各遂其生南昌受鍊司乃鍊度之所得道者无不經名洞陽宫有流火池黄華水皆發生瓊瑶英華度人經修誦是經皆即受度飛昇南宫同此言人心府神宅如此之盛南昌即文昌也元始以符圖眞文鍊之洞陽之宫故曰文昌中有不死之神長生之君司命司禄延壽益筭眞君度人經南宫南昌皆與此同即今南嶽衡山是也元炁上連熒星太陽炎老君所治其中主夏炁長養萬物天下萬神常以立夏日升此赤石玉闕謁炎老君受天玄符各還四方以行夏令赤帝玉司君諱景度如知其神存念九年致長生之藥丹霞飛雲下迎兆身而升玉清雖然如是而南嶽相去數千里豈得人人親往以觀之哉但人身亦有一衡嶽知此則文昌錬化之司不遠矣道不遠人在身中在人參訪造詣眞實不可臆說强爲百關納津液世界皆以水爲潤澤之物故能生育萬物者水也以此表坎卦爲至當之議人有一百八十靈關三百六十骨節一千二百形影一萬二千精光三萬六千根源本始八萬四千毛竅關鍵中咸生津液之潤人无津液則枯槁云亡天地得水而覆載萬物得水而生成其實一也停玄三秀阿藏隱玄根於三秀之卷阿南嶽名太虚小有之天古詩云小有洞中三秀草即靈芝是也山有五芝餌其上者得仙兆身騰玉清己身已證上仙故能飛騰遊宴玉清聖境朝見元始上帝先賢多有骨肉同飛者然此肉身皆蜕藏名山惟神可去七祖離幽扃幽扃水府泉曲河源也身未得道七祖未免沉墮幽扃既已成仙當先度本宗祖禰出離幽扃也即地水二司幽都長保不終劫永保无盡之劫塵大洞一經乃最上乘大非下格小仙所可擬議修鍊至此永無退轉豈可與天人之果同日語哉萬世承仙家玉經云世世不絶長爲人君千萬劫中永遠承繼上仙之家天下名山皆有異姓繼承仙位唯張天師嗣今已四十代位爲聖統尊繼天立極位爲聖統之尊於人中此大人之事也正如大洞帝尊總統萬神最爲極貴之尊位仙人至此世亦罕有玉清大洞仙稱號曰玉清大洞神最爲尊榮此坎離交媾而眞體完全之時也有大洞尊大洞神其實一也即自己本命元辰是上火下水有交媾之道人徒知火炎上水潤下而不知抑心火升腎水爲生生之理火大燥水大濫則死在靜寧一心屏絶萬慮則化紫金光見於目爲徵非按摩存想右件玉章天篆七十字出於清微天下統第九壘昌德君玄契曰至此登玉清聖王天一聖君元始天王曰文昌大洞玉章第三十六表兊艮二卦悦而止也彌羅天境梵炁所化西元九靈炁此章表卦先兊而後艮對取也兊正西之卦故九靈太妙白玉龜臺金眞梵炁祖母元君即西王母主管女仙居閬苑極高之地九靈眞炁所成也已經億萬斯年誦此經者祝延后妃嬪主遐筭齊王母之壽婉儀同拂石之年金丹流雲宫大丹以金爲母流雲宫入泥丸宫也流雲宫亦王母之居昔申泰芝字廣祥其先洛陽人因守官湖外世居長沙一夕於視融峰頂遇眞人傳金丹火龍之術鍊之有年功行俱備而能乘虚游神隱顯不測唐明皇夢請爲國師後飛昇爲眞仙此金丹之驗因此於前立金丹大藥圖上極旋曜杪杪者末也盡也崑崙閬風王母所主故高與天齊高上窮極璇璣七曜之顛此句下按茅山玉經有暉景太霞中運回九天輪靜沉八流剛室有胎仙母等四句不在蜀本中姑略之以俟後之君子或補添亦可矣大率經籙法各從其所傳宗派不必拘滯同異量較多寡以取奇特携矜太帝房矜大微名諱干景精又諱三矜交又曰矜子矜天衣也提天衣而登太帝房此乃太微大帝亦九魂名即中央黃庭玄一靈時生玄一老子林虚夫字靈時道通導玄炁俾之靈通變化結經曰初曰通炁即太玄之炁也貴使鼻息玄炁凝定也三老素罕張三素老君名罕張上卷二章云三素生泥丸老君罕張上同義黄庭經云三老同坐各有朋亦與朝廷三老同義左把五符籍言三素老君左則執五靈五老符圖版籍神咒誥命叱咤不祥而開黃道上眞遊宴並神仙得道者皆以五老啓塗右携萬神宗兊悦也順乎天而應乎人先民犯難民忘其勞死此人極之道人之得道左提右挈萬神並歸掌握之中一任驅役同登龍琳闕易曰六位時成時乘六龍以御天也大洞經至此謂之六度圓成相與兆同登龍鳳琳琅之宫闕謂之選仙舉進士稽首玉清房上元泥丸宫修行至此金丹已成當脱胎换鼎神化自然稽首而朝謁王清元始於洞房之中請受仙職充仙官等上證聖中尊證品大洞天一帝尊聖中最貴極品地位永无淪墜矣此三境至尊之前金闕侍臣之位難同三界有漏之因所可擬符化玄炁玉艮止也止於至善極盡之地傳曰上天之載无聲无臭人能修習至此抖擻迨盡歸之无極符者陰符也以陽火錬化陰符爲玄炁位證玉清初以精炁毓神遂成嬰兒又以嬰兒鍊成陽符又以符化爲玄炁此所謂昇入无形與道合眞也釋氏云凡所有相皆是虚妄又云不可以具足色身見如來又云若以色見我以音聲求我是人行邪道不能見如來如來我也若以聲色隱障則不能自見本來眞佛大率此經以知命見性爲了當在人堅守右件玉章天篆六十字出於彌羅天下統第九壘昌德君玄契曰至此道備位登聖尊形化爲雲符符散爲玄炁炁聚爲眞形炁藏爲眞炁觀之則爲玉符聽之則爲玉音不可思議功德洪深視之不可見聽之不可聞摶之不可得玄玄至道宗大洞仙經至此大通結經玉宸道君言我師元始天玉授我此大洞仙經其旨玄奥靈寶天尊說我師元始天王授我此大洞仙經其旨玄奥靈寶尤言玄奥人豈易知若非内外雙修凝靜自然洞觀無礙則何以探賾索隱鈎深致遠此經乃天眞隱諱與人神同修頁妙門修道之妙行觀門先自持戒而後習定戒定既立則習炁以收神明息炁凝聚則神明自來神明來則慧光發生以爲了當初定通息圓覺經云无礙清淨慧皆以襌定生人若不靜定安能慧光發照又法華經云在於閑處收攝其心安住不動如須彌山又曰定水澄清心珠自現古人云探珠宜靜浪動水取應難故曰襌定儒曰靜而後能定蓋心靜方定而後能慮此三氏理歸一胎息法少飲食不言語心中默數注在鼻觀太和一千心若一念纔動則不謂之太和不和反生他證直要一念不動方謂之和仍數其炁至一千數足爲一通一千通爲圓滿大和中觀變眞自己於内觀中能變化我眞昇天入地往來無窮也觀中觀者内觀也功行既滿乃能内顧五臟外集萬神可以變化離相消塵與此身别无關涉他自他我自我所謂離種種邊也釋氏云若人以七寳滿三千大千世界以用布施不如持此經乃至四句偈而此福德勝前福德按金剛經四句偈有二前云若以色身見我云云後云一切有爲法如夢幻泡影如露亦如電應作如是觀老子云大象无形又曰大道无形孔子曰神无方易无體寂然不動感而遂通精詳三教聖人垂世立教至于窮極其實一也此經者此心也若以此心窮究四句偈則此身皆屬幻妄假合有爲之法皆是虚設耳若能於此趁逐得見本源須要兩頭放下與之剛崖血戰一場一日命根瞥然斷了方是到家的漢所謂離相消塵古人云森羅萬象體不掛一絲頭誠哉是言也元合五千收拾太和圓滿五千其數雖多從一而超所謂磨磚作鏡利杵成針至此方見工夫圓滿具足不缺絲毫曰工夫不到不成丹坐在立亡坐則有立則无復歸乎杳冥恍惚之間无聲無臭无思无爲何有聲音笑貌爲哉道經云坐脱立亡同如普化和尚摇鈴上天大定全眞若自心炁大定永不出入則无饑渴寒暑之所撓兵甲不能傷毒蟲不能螫水不能溺火不能燒視不見聽不聞近不見前隨不見後方謂坐在立亡大定全眞也雖天地鬼神莫能窺測至今世間多有古德坐襌不欲出定者如蜀中縉雲滴水江南普庵四祖皆在世目擊道存此乃大定全眞也妙行通靈妙行者上卷十仙十門中卷十洞十根下卷十華觀門八卦六位妙果皆曰大洞妙行通靈者妙行純熟不已自然通達靈妙初曰通炁始學胎息令息炁出入各知其數目若數炁閉至一千二百息亦謂之大胎息也古葛稚川之大胎息法即圓覺經分别念數次曰通神二則我元神輿萬神交會眞炁相合則神變莫測矣非所以通外神乃邪鬼變化爲妖爲魔必敗道德不可交通切忌隨他去終曰通靈程子伊川釋中庸前知曰如蜀山人董五經之徒亦能前知此特小事爾至極處則一點靈明湛若氷鑑天地造化吉凶悔吝无不見其中善與不善必先知之皆中庸至誠之道佛書所謂解脱知見儒書云物格知至是也美在其中而暢於四肢發於事業皆是自己神炁通靈非自外至者十通成眞予前夢牛觸蓋亦自己本命元辰也溈山云安在溈山二十年只看得一箇水牯牛若落路入草去便牽出若犯人苗稼便鞭撻如今看得露炯炯地趕亦不去予亦守欄三十餘年方始見牛其勞不易自初定通息至十通成眞豈容少間一處通逐處皆通神鬼有五通佛具六通天仙具十通道備登宸超脱飛昇功滿道備證登紫宸脱去凡骨眞神飛昇古人雖云拔宅飛昇骨肉同飛然此凡濁胎質非可入見帝前須是藏之名山或投海外惟此一眞飛神御炁方得過度三界上朝玉京釋云不可具足色身見如來者亦此義爾如玄帝藏金骨於武當山之類過度三界往來三清三清在三界之上渺渺大羅之天雖高在上可以往來修大洞者渾不經由三界也證品大洞天一帝尊大洞帝尊在諸天之上當兆所證所登之位天一即太玄此乃上眞上仙之可證六度十通萬行圓成六度萬行六位十通圓滿告成无虧无欠須是一關一津逐一打破透過方見眞如千和萬合自然成眞度人經九和十合而迴風混合之道專以和爲貴若能千和萬合自然成眞仙之道但前三品凡云眞者誠實无妄之謂也人能反身而誠樂莫大焉蓋人之所賦皆全德之天眞而至年長爲物欲之障所以琢喪本源逝水滔滔而不知返故元始天王玉宸道君太玄道父三師父子啓迪良因設爲答問以救度之而此經乃三寶玄奥義理幽隱難可尋詳琪因就章句之次輒以膚見略簉筆舌誠不自揣以平生所學得之於心傳口受之間者盡以附之於此其文雖曲直不一性命互顯然其大綱不過安天理守本分六字而已或曰泄漏秘語其罪莫大琪曰寧甘伏受欲使圓蓋之下方輿之内凡見聞者咸依文昌大洞仙經修證上以贊聖人之萬壽繼天推堯舜軒黃下以福黎庶於八荒易地皆禹稷顔子人人共德物物同仁琪之願也又奚畏焉臣琪頓首再拜謹書玄契曰大洞仙經元始天王爲玉宸道君演玄披元極始通梵自天及人俾獲成仙眞要文也學士誦之悟入登仙鬼神誦之悟入登眞凡夫誦之悟入長生幽魂聞之魂魄更生永度死厄上生天堂枯朽老病聞之延津嬰孺神童聞之聰明上士得之飛騰玉清位爲聖尊與道合眞玉清无極總眞文昌大洞仙經卷之十
