front:
  text: 玉清无極總眞文昌大洞仙經卷之四冬四
  hash: sha256:8ea001ece07cb25f279523c6866c3ea547b5bebe8fae0130418a1db9154cd016
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_SJB_004-020628b, image: sjb/02/020628b.png}
body:
  text: 東蜀蓬萊山中陽子衛琪註元始天王曰文昌大洞玉章第四四月生䰟四還二返癸未甲申賁剥元炁生旻炁其色玄爲北方五陽水炁凝成天境號寂然兜術天劫號開皇此天精䰟太陽之炁主洞房宫帝眞𩲸命元碭尸㝠演由之炁生七𩲸太眞統九炁太眞太玄一也即玄元始二炁生九炁一云太玄九炁上下卷九章云太眞九光輪光即炁也統九炁以生萬神也洞景寄神通洞陽之館爲眞仙煉䰟之所絳宫光景爲神明寄跡之舍通者出入無常孔子操則存舍則亡岀入无時莫知其鄉玉帝乘朱霄玉帝君乘朱霄之輿以統御萬靈朱霄一名丹霄一名絳霄此名上田泥丸有玉帝宫總制人身之萬神萬炁之主緑霞焕金墉墉者築土壘甓以爲小城又曰堂中北墻也言玉帝入城威儀青緑霞帔焕爛金城中卷五章云披朱巾緑霞同義上館雲珠内自兩腎上夾脊透雙關入泥丸之時惟一光明之珠雲珠者五雲之珠五雲者五臟所化之炁也雲珠則玄珠宫也仰接无刃峰玉京山之頂上玄虚无有尖刃此言人頭直上亦接玄虚无刃空洞寥廓之景西北崑崙山有金城玉樓人頭是也靈關太漠下靈關三關即上中下三田冥漠无眹虚曠幽玄之下盖上无復色下无復淵之謂也雙腎間皆謂北陰酆都幽陰境靄沫竟冲空眞炁薫蒸上冲空洞之中言人至大至剛之炁充塞天地之外无窮无極之所靄沬者皆祥煙慶雲之屬冲者和也冥化混離坎人所不見則曰幽冥故坎水離火二炁交會故曰晦冥變化者混合水火之道也丹經云取將坎位中心實點向離宫腹裏陰故知水火乃道之眞體也伏羲先天水火乃文王後天日月也其名異而實同仙輩云此竅非凡竅乾坤混合成名爲神炁穴内有坎離精卦名但提要而已蓋坎離爲萬物之母也其他卦觸類而長之无不全備誦之者六位已升體變純陽鍊化紫金升入金門六位者六爻也坤變乾至第六爲純陽全體坎離乃文昌之要玄玄叔火王上元玄父隱名叔火王字左回明玄父者道父也或云叔火生考之下卷十四章作叔火王今從王字出上清玉經瑋寂高同生上元玄母隱名高同生字右回光玄母者道母也瑋寂牝門也或云高同王旣上句爲王字此當作生字守玄牝門無極保谷童結中二神精䰟君名谷童無極無盡也保養也又曰黄寧童居於脾中宫戌巳上掌水穀尅化之神披黄裳立黄庭中圓塗无凝滯一云无滯礙然不如凝滯尤妙圓塗者乃眞中之一竅无凝滯者三宫升降上下往來不息之謂道塗通則圓明綺合有九重眞炁交合如綺羅之文其勢錯綜混合光景九重之厚眞仙朝帝但見金光勃勃不見粹容人修眞鬼神唯見紅光南拔七祖根拔一云披亦可南七火也披拂也拂取七祖根塵必令清淨則九䰟遂生九玄七祖皆在身中自己清淨彼自化生西解累劫凶西方屬陰以肺𩲸主之魄專引人情欲以墮凶釁非大洞解之縱經千萬劫塵无由解脱以此拘制七𩲸總領肺炁體矯萬精波矯强貌身體强壯精炁潤澤也矯强哉矯之矯萬精波乃北方之眞水化爲眞陽之炁腎中起上至泥丸宫滴下心神王攝十方十方飛天神王風生炁也一云神生誤矣生神經神王之職非小而玉經令五老取俯仰於神王即玉輔上宰之職大歸返胎轅既已返胎更生大歸其所游之轅轍即无飛爽浮游轅車名取其運轉眞炁不息之義歸者返本還源胎者聖胎也三合乘天龍三變列位三合成音形神已備乘龍而登天龍字有五天龍龍山龍臺龍光龍琳皆同一義天龍乃天帝所乘之龍右件玉章天篆計一百字上鎮玄胎平育天下統第一壘元德君玄契曰誦之四遍根塵漸隳業網自解劫還不隨萬炁齊臨得自在門元始天王曰文昌大洞玉章第五五月生五臓五還三返乙酉丙戌復无妄旻炁生景炁其色黄乃中央一陽上炁凝成天境號波羅尼密不驕樂天劫號上皇此天精䰟上陽之炁主絳宫常眞臟腑命元五仙中靈之炁生五臟太微天帝宫太極中有太微太微中有二十四眞人專主降神布炁生育之事人有中墮而不育者盖由太微之炁不接故難養八浮入雲營八識飛爽浮游來入五雲之營五雲五臟也皆有金房玉室故曰營經云流響雲營言炁運於五臟成一部音樂也神宗理靈襟中央丈人名神宗即心主也言神明宗主條理靈臺胸襟也五神以心神爲主而四神次第降生以生五臟布五神龍山秀玉京龍木也在左爲肝神曰无英公子又曰龍陽物也變化莫測言人之頭成形陽氣秀盛而顔色悦懌仰接无刃峯同金房鬱明霞金房爲肺臟有神曰白元尊神金華西方太華元老所主金炁化成擁鬱明亮之雲霞言肺炁甚威薫蒸葱鬱之景九户朗高瓊心有七孔以應七星下有玄牝二竅以應輔弼故爲九户之瓊瑶明朗而高又曰頭有七竅下部水火二竅通九竅黄庭涉北元中央脾宫黄庭云脾部之宫屬戊己故曰黄庭涉北元者以其上通心竅有黄庭内景外景經上下四方至此得中元父左回明三素三眞上元玄父君字左回明守玄牝元父凡三見第八章云元父結胎仙中卷第十章曰元父左回明見前註朱晶啓明師朱晶本名司命之神守心右白元洞陽帝君名朱晶開啓日月三素之光明師一曰白素君一曰陽精皆有兩呼幽寥登上清太一名幽寥人之腎水上升與心火凝合以上田爲玉清中田爲上清下田爲太清又曰帝皇太一重冥空字幽寥四玄秉元禁四靈青龍白虎朱雀玄武秉執元行之禁令四天門王禁斷天門魔鬼毋敢輒入道家齋醮清旦則有命魔法以却不祥迎眞降聖人之五臟具四靈守之三合四玄五帝六明七覺八景九光十眞皆取十月聖胎堅固脱爐换鼎之道盖以肝爲青龍肺爲白虎心爲朱雀腎爲玄武長保五帝城心肝脾肺腎爲五帝城廓五帝青帝曰彫梁際赤帝曰長來覺白帝曰彰安幸黑帝曰保成昌黄帝曰含光細右件玉章天篆計六十字上鎮元明文舉天下統第二壘剛色地土皇君玄契曰誦之五遍永絶死炁浸茂生根萬炁齊生得長生門元始天王曰文昌大洞玉章第六六月生六腑六還四返丁亥戊子大畜頤景炁生遁炁其色碧凝成東北天境號洞元化應聲天此天精䰟元陽之炁主中丹田宫帝眞靈府命元高眞冲融之炁生六腑紫精太无中紫精天在太无空洞之中无色天界三清所都之境在人則腦門是也亦曰天谷萬神聚會之所太無者無色无象三元上景衢三元者混沌太无元赤混太无元冥寂玄通元三炁在上景之衢言人之炁自上中下田循環无窮復歸於泥丸宫秀朗大寳輝大寳玉帝位也清秀光明言人之玄珠烜赫即蒼胡頡黍米珠皆謂之大寳天眞貴重有光明輝映故曰大寳昭昭扇帝敷一云眇眇遠大也昭昭顯著也扇動也言玉帝登大寳而清光威燄扇動其中亦如煉内丹光燄迸射於中宫也伯史啓三素命門黄庭元王君名伯史原即三一神也上一赤子中一元皇下一元王又名始精字元陽一名嬰兒胎啓三素君帝臨登玉虚主宰之謂帝人身非萬炁无以育萬神然萬神之中心爲帝王心之所向萬神聽命登玉虚者上泥丸宫腦門是也慶炁育五雲五色慶雲祥煙捧擁玉帝東三南二同成五北一西方四共之戊己五爲本生數三家相見結嬰兒五雲一曰五靈司命神明初司命乃宰制心宫之神名理明初心宫乃神明之宅初者肇形也心腑是也虚靈知覺人壽天皆應修心故曰司命十華妙行仙十方光華妙行圓滿證登神仙十華即青華丹華素華玄華黄華瓊華金華緑華碧華瑶華共爲十華所修妙行制魔生六明六明者六根也在人則先生五臟後生六腑臟腑流通爲六明之府六腑者膽胃膀胱大腸小腸臍通作六府是也右件玉章天篆計五十字上鎮上明七曜摩夷天下統第二壘皇德君玄契曰誦之六遍六天大魔永斷鬼鋒六根清靜廣明發生萬炁齊光即得度世進登仙門元始天王曰文昌大洞玉章第七七月開心七竅七還五返己丑大過坎坎離无支干玄炁生融炁其色黑凝成西北天境號靈化梵輔天此天精魂正陽之炁主元穀宫帝眞元府命元高仙洞笈之炁開心七竅眞陽帝賔老禮天子袒而割牲跪以進匕待三老之禮所謂養老乞言今眞陽爲玉帝賔老又正一左仙名諱賔老又名仲成子受事會玉皇每聚會於玉虚以受玉帝之事如眞陽之朝泥丸也謂之默朝上帝法用紫河車自尾閭搬運入腦十二年成仙滅魔除穢尸魔王伏慝滅馘妖魔除其穢雜尸血之炁陽炁既生陰炁自滅理之然也魔者諸天帝王皆是試驗人心有無堅固百司詣絳宫人丹田宫謂之絳宫即心府也百關之神常詣此宫以聽命令盖心爲萬神之主萬神朝其所主萬事萬物之理在焉逸宅丹玄内安逸之宅在丹田之内丹田上一寸爲玄丹宫在頭上見元神聚凝萬炁上歸逸宅玄丹之宫煉習陽神出入之門五炁結十方五方之炁即東方九炁南方三炁西方七炁北方五炁中央一炁亦如五臟之炁流通遍滿身體内外无所不至也七轉司命至七返九還丹道成矣司命至者長生乆視之道備矣司命即心神也又曰七轉召司命七轉者七陽金炁遇火成丹三回召仙公三合成音所以召仙公亦神仙中公侯伯子男五等之爵也有太極仙公之類今仙公者即東華木宫主司肝臟太山主鬼者太山主者管領鬼神公事即東嶽聖帝是也太即泰也山在兖州爲五嶽之宗故曰岱宗屬東方木乃爲生化之地急校三官中校録天地水三元三官宫府中所有生死罪福急者不疾而速也三元宫府百二十曹每年正七十三會全考校不差十德初成基十德中央之土數主脾胃穀炁以生津液蓋十德爲成全之福基雞有五德人有十德物類咸有一德人之明德天之所賦人物之所禀受无虧無欠而情欲所蔽所以昏昧故元始欲令人修飾此道以爲全德之根此謂知本在明明德也十德具在下卷第八章玄契中載兹不重贅同飛七覺元悟則圓覺不悟則凡夫七覺者心也心之神上通眼鼻舌七竅故七竅開聰七星朗明與兆同升七元斗中七覺者識神也一則生而知之二則知而能見三則見而能從四則從而能習五則習而能堅六則堅而能成七則成而不居此謂之七覺也人能行之進登妙行得成飛仙右件玉章天篆計六十字上鎮虚無越衡天下統第二壘皇德君玄契曰誦之七遍七元斗辰皇妃下降爲兆削落死籍移注南宫萬炁齊超得飛仙門元始天王曰文昌大洞玉章第八八月八景生神八還六返庚寅離咸融炁生炎炁其色丹凝成東南天境號高虚清明天此天精魂通陽之炁主極陰宫帝眞華府命元眞靈化凝之炁生三部八景太素三華炁三華三部也每部八節又曰三華即神炁精也三素元母雌一之神於子時聚下元午時中元酉時上元三宫升降晨登廣靈堂廣靈堂心府也以鷄鳴之初登朝絳宫盖陽炁初生也三素元母亦劾奏罪福之神呈世人罪狀故侵晨誦經却之玉京表玄籍玉京山諸仙版籍所在人之修道常以子時一陽初動靜坐澄心以朝萬炁以避人神奏牘天上之罪福於玉帝前守命核道康桃康君守臍之命門王叔和以右腎爲命門人之生死皆在腎腎絶則命脉絶一本核作孩誤又桃核合延生華芒回風散萬魔當其子時陰陽混合以成帝一之道故能除散萬魔陽生而陰息矣君子道長小人道消之時也乃回風混合之道金符召廣鄉以金符召於廣漠之鄉極陰之境使䰟爽咸得受生一本云度卿可疑廣鄉者北陰酆都也腎部屬水金能生水也輔衛地户内呵護輔弼於地户盖存下田以受生炁書曰顧諟天之明命是也地户乃下部命門當愛惜輔衛之不以色慾敗之保此長生王在天則有玉清眞王長生大帝專主生化之權在人則存心保守我長生不死之王即浩劫不壞元神爲聖胎根本轉入十仙門妙行觀門仙有十種門者無礙門定觀門衆妙門希夷門自在門長生門進仙門飛仙門飛神門登眞門之類是也八景齊洞陽八景八門皆身中所具之門户爲神炁之所出入又曰三部八景齊入洞陽之宫朱陵火府玉眸煉質黄華蕩形右件玉章天篆計五十字上鎮太極濛翳天下統第二壘皇德君玄契曰誦之八遍八景神生八威神王疆護修眞四方八天注舉仙名斬絶地户永斷惡根萬炁齊明得飛神門元始天王曰文昌大洞玉章第九九月九竅開通九還七返辛卯壬辰恒遁炎炁生演炁其色白凝成西南天境號無想無結無愛天此天精魂萌陽之炁主下丹田宫帝眞嶽府命元自然玄照之炁闌通九竅紫精毓華林紫精字凡四見皆天名至有訛舛今并解註上卷一章高上宴紫清下卷一章逸緑登紫清皆元始所都之天上卷六章紫精太无中盖紫精天乃三元之炁凝而成天有道君主之名曰三元紫精君此卷九章紫精毓華林乃上清境紫精天有毓華林葉如竹華如鏡實如李天人得而食之長年不老而登上仙古詩紫精天上毓華林絳實朱柯竹葉深咀嚼繁英人不老下觀烏兔换光陰然非下界所能見也在人則腎水黑心火赤二炁交媾化爲純陽紫金精華成林華茂果實自己眞人餐之亦可致長生之道如生神章耀玉葩黄華野森瓊林之柯於命門文昌經亦曰丹林森朱柯皆同此意以喻人之所養也長眠太无外眠者一定不動之謂如人睡而不去太无者虚寂中也如布袋和尚陳希夷一睡數月塵積遍體盖眞息定也玉房生寶雲玉房一云眉間乃臟腑關節之竅也自然生五色雲炁蓋生炁則生神也經有金房玉室紫户玉闕一時生神同義九扇胞胎内九轉九還丹道成矣受胎九月九炁合成人道完矣此一節謂八月已滿進臨九月炁滿神具聖胎完全待時而動帝賔奉玉符帝君奉吾符非也第六章有眞陽帝賔老盖帝賔乃陽神主祛陰邪奉玉符而行事如國之三老奉上命而正議也三光回紫蓋天上三光日月星人之三光兩目與心日月失度星辰留伏天地災變目有所惑心有所感身體傾危回紫蓋者以其目不視惡色耳不聽惡聲收視反聽則神全而炁凝紫盖无所不覆故人以兩目爲九竅之華盖光明也日月星能照天地雙目與心能顧一身不令外物之所蔽蒼玉斌來生珷玞者石如玉也所以亂玉者今變而爲眞玉矣節中黑炁君名斌來生專主内明人之德蒼或作倉非盖青蒼之玉謂有文縷生也玉以比德茍不至德至道不凝焉内有所藴光彩發泄於外如玉之在山草木无不冲秀珠之在淵江河无不澄湛寶之在懷面部光澤身體康健耳衛此長夜會長夜會在絳宫是爲靈府血所生之處覺則長明不覺則長夜衛者匡救其惡也不能愛惜者冥冥長夜何時旦也五靈度符籍五靈者即青靈丹靈皓靈玄靈黄靈也度者授也五老授我長生之符籍矣茅山玉經无以下六句盖止於此而已九統合九光九統之法以會帝九光之符以集神此乃回風混合之道數遇九則陽已盛此陽純而不已也大洞經自一炁生二炁三炁生九炁九陽爲極之數極則變故變爲三十六所以此經三十六章有雌一帝眞九光聖母專主生育之事或曰元經必誤統紀也上古九皇時有九紀出古典三玄出太清三玄即三三九玄也出太清者下田也外應北都羅酆内應雙腎言祖禰超出此界之外則神升九天永爲眞人矣紫陽發萬生紫陽玉匱乃注生之府所以發越萬世生根而萬神皆備人无貴賤一是出於紫陽發生此生生之理永不息矣玄精育九靈玄精育乃九䰟名天以北爲玄人以心爲玄九靈即心之九竅九玄受生即因九䰟得育方結胞胎故濯質太陽元父結胎仙元父見前註元父心之官則思亦意也胎仙者有炁而无息也下卷云紫華領胎仙黄庭云琴心三叠舞胎仙同義右件玉章天篆計七十字上鎮赤明和陽天下統第三壘石脂色地土皇君玄契曰誦之九遍九統帝會九光神集混合百神與天齊年八會游集朝應九天萬炁齊仙得登眞門元始天王曰文昌大洞玉章第十十月堅固形神脱胎神化癸巳甲午大壯晋梵清景炁其色青黄白凝成中央天境號波黎答和天此天中陽之炁主中元黄庭宫帝眞冲和之炁降神布炁堅固形質生於人道青靈扇八極東方始老乃發生之地故扇動八極世界八極乃四正四維是也八卦乾坎艮震巽離坤兊八門開休生傷杜景死驚皷輪三華城三華神炁精也城者三華所居之地青靈之炁皷動發生意也輪舌神名言人皷動舌根攪取華池津液灌溉三田披此胞胎結披一云拔生神章云斬伐胞樹滯此意亦同披拂也解也解其胞胎結習之根也生神章經云胎結解根即此義爾七祖受福生九玄七祖受此福惠而得生天受用快樂若能精進修持不輟升无色天登不退轉地竟陟上眞大羅三境侍臣之位宿對滅五道生神章云對盡大運通之對除其宿昔之仇對消滅五道凶惡之事五道者地獄餓鬼畜生脩羅禽蟲等難得出離常守帝一營茅山於此分作兩章雌一雄一帝一謂之三一之道今惟守帝一營寨蓋尊大洞帝一也藏教有雌一經雄一經公子執五符左无英公子玄元叔字合符乘東方九陽生炁執把五靈之符發育萬物招集肝臟中九䰟神流布天下人道生矣太一居紫房太一在頭即紫户也人身中皆有金樓玉室紫户瓊宫紫户者泥丸之别室也太一君居之掌管列仙得道之籍三合地户下三炁合德三合成音以生炁合於下元宫地户下是死户也乾爲天門巽爲地户即下田是也已於輔衛地户下註拔命玉帝宫以人合生之命脉拔出躋之於玉帝宫在頭上腦中是也玉京山有玉帝宫上元所主天仙所居修道作善人方到此少女郁墨子斗中眞仙在人心中主掌壽天貧富亦雌一之神也乃仙女之屬先天之眞炁能助天地而育萬物體大道贊萬化衛兆七炁窗衛兆乃道人自稱曰小兆臣某甲也七炁窗者七竅心也比喻牎牖取其明朗即八窗玲瓏之謂是皆善譬巧喻也拘制盟血液九元眞男名拘制守左耳下通於心心主生血并液拘制而盟誓之使之不得爲血炁所勝邪炁相乘咸歸正大爾盈滿五臟充人能精煉至眞不爲色慾所損則津血炁液盈滿五臟六腑三百六十骨節之間充積强壯顔貌悦懌壽等松椿十眞登紫房一云黄房非也紫房在腦中十眞乃十華眞人自下而上升於紫房即腦中明堂宫是也見下卷太玄九炁上玄契帝子化金仙皇一之䰟上歸字帝子金者以庚辛白虎煉成還丹餌之則變化炁質爲金玉故後章云骨肉金玉實此之謂也白玉飛符招白玉玉京飛符見招至人得此脱胎换鼎飛化自然生神章云慶此嬰兒蜕此十月胎完而生人之道神仙脱胎也引升龍臺天相引上升龍臺之天龍臺即龍變梵度天言變化不測之謂也如軒轅黄帝千口白日駕龍車而登天晋代許旌陽輩是皆乘龍駕雲上朝玉清具在方册昭昭可考乃自己陰陽二炁所化成雲成龍乘駕而去非由外來也玄契所謂變化自然但教十月聖胎完全便可脱胎神化命宗煉金丹十月功圓爲了當性宗務參機忽然於一言之下大徹大悟便是了當至於鈍根三二十年不得悟道者二者有頓漸之分志於道者不可不兼有也或謂道不足學其不知三教本歸一揆亦必極其至善之地方止道曰有物混成先天地生視不得見聽不得聞釋曰圓覺眞如與生俱生若以色見我以音聲求我儒曰天生蒸民有物有則非禮勿視非禮勿聽此三教聖人之體也道曰眞常應物常應常靜釋曰圓陀陀光爍爍活潑潑赤洒洒儒曰充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神此三教聖人之用也釋无我无人儒毋固毋我是皆至當歸一之語何滯而不通何遠而不致欲求最上乘者當留意于此不可執殺賺人性命也右件玉章天篆計九十字上鎮玄明恭華天下統第三壘帝德君玄契曰誦之十遍于形中元命結帝一眞人九和十合體自洞眞能召制十方御元回靈萬炁成眞合德冥慧玄玄无邊變化自然至此修行名曰玄關亦曰玄會六度十回功滿道備位登仙公初心十信次興十善次發十華次成十德漸進十仙遂化十眞六位已陞妙行大全形神炁煉號曰眞人十信十善十華十德十仙十眞謂之六位入衆妙門玉清无極總眞文昌大洞仙經玉清无極總眞文昌大洞仙經卷之五冬五東蜀蓬萊山中陽子衛琪註道言爾時此卷以六根并性命精血津液手足等修證妙行若六根清净不墮酆都六洞所謂六洞者紂絶陰天泰殺諒事宗天明晨耐犯武城天恬照罪炁天宗靈七非天敢司連宛屢天性命清净不墮五嶽地獄精血清淨不墮水府地獄手足清净不墮九幽一十八獄津液清淨能生无英白元太一司命桃康等五神共得十通妙行文昌大洞經行於蜀者乆矣而蜀本尚有訛舛盖自來无人考驗諸實而板行之字經三寫烏焉成馬且如經首道言爾時四字乃玉宸道君所叙當時天王說經如此起發因縁亦猶佛經如是我聞論語子曰之類是也故不可缺略當添置之琪寧受專擅之責成全經旨凡經皆有叙分正宗分流通分舊本无此四宇是无叙分當以道言已下爲叙分三十六章爲正宗分結經爲流通分且此經行於蜀何也盖元皇帝君始生於吴會即姑蘇是也獲受此經而證果爲蜀神仍將此經開化人天元皇再生於丁未帝命爲南斗陽官乃注生之司也於是祈嗣者多禱焉始知文昌即南昌也詮德鈞物長養之職按史記景德末樂學士爲西京留臺御史忽夢一人具冠服稱帝命來召樂遂往俄見宫闕壯麗因問使者曰此帝所也既陞見帝謂曰汝主求嗣吾爲擇之少頃選一人至帝曰中原求嗣汝往勿辭其人頓首求免者三帝曰往哉傍拱立者曰此南昌赤脚仙李守微也明年果生仁宗是知文昌爲嗣禄之司者明矣此經每句主一事人能行得一句亦可作上仙况全帙持誦豈无報應乎夫今世有爲黄冠至老死不知有文昌大洞經之名者有見經中不言善惡報應之說而束之高閣者有心雖好誦而不知義理者且善惡報應未嘗不言謂如拔出五苦毒超形過始青若无罪安到五苦若无福安到始青如此等類不少其他諸經皆曰誦持是經是經者其意果安在哉蓋是經者指此心而爲言也若人不能謹持此心欺謾恣縱放僻邪侈干犯非理生則致於惡疾狴牢死則委之溝壑蠅蚋天地鬼神奚暇置之阿鼻无間以逐逐於考掠哉佛書云假使經百劫所作業不忘因縁會遇時果報還自受傳曰禍福无門惟人自召豈非善惡報應哉今將經驗比附於此庶幾覽者起敬信心逐一修習以期登十仙門若根器淺薄亦得明了前境作尸解之道尸解有五水解者投水火解者自焚金解受刃木解倚樹化土解鑽山入石玄女有修五解法可脫大難避陰追遁他所投胎奪舍元始天王眉放青毫大哉聖人之道洋洋乎發育萬物峻極于天觀三教祖師垂世立教未嘗偏執而人强自分别曰釋氏主性道家主命儒家主理殊不知三者一而已釋迦說法眉放白毫元始說法眉放青毫兩聖人示現相好豈異致耶蓋白毫西方金炁雖是表性命在其中青毫東方陽炁雖是表命性在其中性命之道相因以成人中庸不云天命之謂性率性之謂道上天賦與我者命也我禀受而生者性也凡言性則命在其中言命則性在其中故此中卷七章云性命宗本堅性命果何物也以性言之則曰仁義禮智而四端五典萬物萬事之理无不統於其間以命言之則曰元亨利貞四時五行庶類萬化莫不由是而出此天理之灼然而人以私欲蔽之而不能克復本源之清淨故聖人因人所禀賦而修明品節垂世立教俾人盡至誠之道則本來面目復見于前所謂惟天下之至誠爲能盡其性至於參天地贊化育如示諸掌或曰子註道經而引佛經儒書得无過乎琪曰三教聖人本以匡救人惡欲人皆歸善道而已故曰天下无二道聖人无兩心如人入城必由其門至於長府則一也門户雖異所致不殊若人各極其志何往不可耶琪是以將典誥㑹同而釋之奚罪焉頂旋紫炁萬華寶盖浮羅覆形紫炁者陰陽二炁合成爲紫以此示命元也紫炁之中化成萬華寶盖覆廕法身人之頭上亦有華盖而自不見也經云紫雲覆黄老是爲三寶君正謂此矣人能修道則鬼神莫能窺其際唯見紅光勃勃射目玉光金霞紆絢晃曜如玉之光輝金之霞彩紆絢晃曜爍射天人之眼目如十七帝光是也皆自身中岀玉宸道君太玄道父稽首顒竚願聽洞章洞經題下有太玄道父牛孳先生集至此方見玉宸道君太玄道父玉宸乃靈寶太玄人或以爲太上余亦疑之正釋此向夢故家廳事前群牛又一牯見觸余以杖禦之中其左目牛足着吾臉予咬得一趾驚寤一日偶見實録云太上八十二化身爲玄武號太玄又仙降曰牛者玄武之精方憶禮記牛曰一元太武因知太玄牛孳乃玄帝也前夢无虚玄帝生於黄帝時上天開皇初劫紫雲元年歲甲午三月三日眞武經云甲辰誤至十五歲童子學道修行四十二年飛升於紫雲五十七歲庚寅九月九日也拜太玄元帥永鎮北方至上天龍漢二劫殷紂無道魔鬼流行傷害生靈毒炁上衝元始命之收捕有功令復坎位拜鎮天玄武大將軍後於上天眞化三年即嘉祐二年也三清委玉帝考功三官四聖位當亞於天帝下翰林修撰玉册拜太玄爲玄天上帝因知此經在拜太玄時重岀本一百二十卷太玄集此三十六章亦三十六部尊經之祖以便修習亦猶大度人經上品妙首無異顒竚者仰望也誠敬而已矣願聽者俯聽也整齊嚴肅主一无適惟恐禮貌之不恭俯仰之失節所謂齊莊中正足以有臨也道父之心推己及人所謂夫子之道忠恕而已矣豈不忻忻然有喜色而嘯詠哉此下以六根并六洞宫順取庶不紊亂大旨元始天王怡然嘯詠曰文昌大洞玉章第十一乙未丙申眼根洞觀道眼始通明夷家人叙經乃玉宸道君所叙經之因由縁起謂之叙分正經元始天王所宣珠光之音謂之正宗分結經亦道君結括一經之旨謂之流通分皇上超无景眼之於色爲業甚大眼見心欲心動神疲是以五臟之神皆從眼漏爲第一根眼竅通心心乃神宅眼既見心必動也皇者大也上者高也言道之大而高超出乎无色之界无色无光謂之无景經中景字三卷共二十八字八景運常寧八景齊洞陽八景照泥丸太清八景觀四句同義洞明光景中太一景中王携此景中人炁出華景中常保景化内一義太極元景王太素拂眇景赤景翳逸寥洞景寄神通太極玄景童羽景太无庭金闕上景炁混一玉景炁晨中黄景炁同類皇上超无景太虚空无景一類乘景晨中暉駕景登絶霄一類帝一上景朗朗生帝景二元上景衢一類八眞合景君千景併生矜一類三天焕九景義别字雖同而義各異有以車輿冠服講者有以旌珮節幢論者有以光景炁色辯者有以神眞名字說者諸經傳中有景晨明霞之冠之服之節之輿不知其爲物何如也而以琪意度之便如今時官貴有七寳冠帽束帶鞍轡之類是也玉皇經九霞流景飛雲玉輿同今无景者无色也人能收視内觀自到虚无自然境界輪轉九曜停一云九曜生必誤如日月停景璇璣不行之謂也人之一炁在乎鴻濛混沌之始而不能存育以眼根所漏今則既知而修即超出无色之界故璇璣玉衡一時停輪以俟兆之所證也在天則運轉機軸以九炁化育天地萬物惟北斗七元日夜循環所謂璇璣玉衡以齊七政在心則有七元運用與天之九元同此不息之機也是故爲人終日乾乾自强其志以應天機也曜者眼神明曜眼光一定則九竅俱息矣詩云子懷明德不大聲以色同義迴風混帝心帝心即道心也人心惟危道心惟微惟精惟一允執厥中蓋心之爲物湛淨虚明如鑑之空衡之平所以爲一身之主包萬理應萬事雖鬼神有不能窺其際者一動一息莫不繫於其間所以大學之道在正其心也老子曰五色令人目盲人以物慾障其心目不能見天地之化故聖人立教收視反聽黜聰明離聖智爲急務若能存其心養其性則天地萬物森然見前孟子曰養心莫善於寡欲人能寡欲則得顔子坐忘之心齋故聖人洗心退藏於密欲道成也此章以眼根修證蓋眼有數說佛經載肉眼天眼慧眼法眼佛眼盖肉眼者凡夫也世人云俗眼是也佛眼即道眼也以常人之情以俗眼觀天地眞人以道眼觀天地道眼何在必曰一心也内而五臟六腑以膚體隔絶外而有五運六炁以天地隔絶若俗眼觀之皆不得見也若以道眼觀之則徹視表裏九天之外塵芥之微无不洞燭也回風混合者天地之炁相交以成帝一眞道三昧帝心也人亦如之以津爲龍以炁爲虎運轉之道在此二物易曰雲從龍風從虎聖人作而萬物睹理相近也後九章云帝心大玄通昔俞靈璝河間人受習大洞回風混合之道一行二十年坐見天下事然自晦不爲異貌常若三十許衣弊自若人或問遠年近日事對如目擊人敬之且曰偶然耳非所知也口不絶誦太洞經或絶粒而飲酒後忽登仙是得回風帝心焉人以雙目回光返照則眞炁隨而聚於元宫謂之回風混合八景運常寧一云八炁非也以心爲天以腎爲地心腎相去八寸四分天地相去八萬四千里神風橐籥故天地安鎮人以眞炁運動故身體長寧人之三部八景自尾閭至百會三節爲一關三八二十四節以應二十四炁上部八景腦神覺元子字道都髮神玄文華字道衡皮膚神通衆仲字道連目神虚監生字道重項髓神靈謨蓋字道周膂神益歷輔字道柱鼻神冲龍玉宇道微舌神始梁峙字道岐中部八景喉神百流放宇道通肺神素靈生宇道平心神焕陽昌宇道明肝神開君童宇道青膽神龍德拘字道放左腎神春元眞字道卿右腎神象地無字道生脾神寶元全字道騫下部八景胃神同朱育字道辰窮腸中神兆騰康字道還大小腸神蓬送留宇道厨胴中神受亨勃字道靈胸膈中神廣瑛宅字道仲兩脅神辟假馬字道成左陰右陽中神扶留起字道圭右陰左陽中神苞表明字道生在人常以紫河車搬運眞精之炁上升泥丸也常乆也寧安也使身體常安也或曰八景八門即遁甲所運也昔施存事黄盧子得三皇内文乃八門遁甲能行遁變化景之法役御虎豹晋永康元年四月七日乘豹登天號沖和見素眞人乃八景明驗廣霞參神天天神一萬八千人神一萬八千共三萬六千同理陰陽造化者也詩云神之格思按青城丈人說髮爲青城君頭爲三台君兩眉爲紫極君兩目爲玄爽君左耳爲聰明君右耳爲决明君鼻爲天妙户君口爲牙門君唇爲玉尸君齒爲二十八極元士君咽爲校尉君喉爲九卿君肝爲絳宫君肺爲華蓋君膽爲長命君心爲丹田君脉爲紫帛君胃爲太倉君脾爲黄庭君左腎爲玄妙君右腎爲玄元君大腸爲食母君小腸爲導引君腹爲太道君三焦爲玄老君左足爲雷電君右足爲雲炁君凡三十六生炁君皆應於一身通身相體同滋識用易云陰陽不測之謂神知變化之道者其知神之所爲乎又曰神無方陰符云人知其神而神不知不神而所以神也盖神之爲物惟意所主故廣大之雲霞參謁神天亦名谷神不死盖泥丸爲百神聚會之所人身之神相聚會合於此其聚也不疾而速不行而至也然神用藏於視聽若不從眼耳之漏則方可凝集也故度人經云下鎮人身泥丸絳宫中理五炁混合百神是也人身與天地无異同此神炁五帝散日精今夫天斯昭昭之多日月星辰繫焉盖神天之上有日月如人之頭有眼目五帝見上卷長保五帝城注並同此卷第三章云日中開五暉正與此句同義蓋五帝者青帝護䰟白帝侍𩲸赤帝養炁黑帝通血黄帝中主乃五行之炁天有五星地有五嶽人有五臟上下相應但人恣一情之慾如喜怒哀樂動之於中發之於外則本方之鬼神十目十手之指視是其所以祥禍福莫不相應而至所謂禍福无門惟人自召日精月華若人服之能令面色光澤身體强壯所以上卷云慶炁育五雲五炁結十方五靈度符籍盈滿五臟充五老輔玉根此卷云血凝五華平日中開五暉五臟植玉根俯仰邀五靈五神回孩嬰舐煉五牙珠拔出五苦毒兆有五符籍魄伏五道密五符閉地結五符編紫房五籍標圓庭逡巡五老翁下卷云五辰號發紐嚥沫生五芽斂神保五籍混合五日房五道秀金華五老變孩蒙太張上五符五臟暎清夷五魔伐六陰五炁理中頡五道焕三天五老飛玉軿五嶽應命到五嶽啓靈户五嶽一來庭五雲鬱絶空五老揮絳華左把五符籍如此等類皆五行之炁流通於三才中爲尅化生育之本散日精者布陽和之炁參贊造化發育萬物也人常以日精之炁條理五臟保合太和所謂乾道變化各正性命也五臟和則五典備不爲五神所劾五嶽所按五星所照五帝所奏則五籍改注豈有五運五道五苦之拘束哉君子所不可及者惟人之所不見乎液逸玄中膜逸字七處逸宅壽逸逸紫空逸緑逸上清逸寥安也樂也天地以水運轉循環无窮故不朽壞人以津液流灌五臟是以不死若津液一乾神无所滋形必壞滅玄中膜是北方之水幽在一層之内人身中腎水亦在脂膜之内津液血炁常使充滿灌溉滋潤則身體强壯顔貌光澤血凝五華平紫緑緋華非正色皆爲外物雖目擊華嚴富貴天堂快樂亦不足戀於心五華者青華丹華素華玄華黄華言内自有華色人以血炁滋養五臟則玄珠自生黄庭云灌溉五華植靈根五華既凝化爲四靈備守中央豫章道士蕭惟億宇勉之雲遊至江州廬山祥符觀喜幽勝而樓焉日誦大洞經忽瞑目見四靈備衛遂大驚悟由是神采頓異出言非常忽自能詩年九十餘而白髮反黑歩履如飛淳熙中辭衆坐化有徐欽鄰師事惟億後亦坐逝去體寶圓珠暎大洞仙經之號曰蒼胡頡寶而上中二卷不見至下卷方顯言之寶與珠一也即身中一粒金丹是也謂之摩尼寶珠又曰黍米珠玄珠明窗塵還丹神丹玉壼丹紫金丹金液還丹刀圭大藥聖胎嬰兒千名萬號不一而足大非外料金石草木之比盖以自已神水華池金晶玉液朱砂水銀眞鉛眞汞龍肝鳳髓姹女嬰兒修合煅煉之所成也故上卷云秀朗太寳輝上館雲珠内中卷云䑛煉五芽珠寄頻携運珠下卷云領玄蒼胡珠友寳赤炁王蒼胡頡光華日中一運珠洞焕圓珠藹皆此義也儒書所謂天地未判形如雞子寳之一字豈苟得貴能應用无窮隨心所欲无往不備至如世間亦有如意寳人之所求悉如其心魏王有珠前後照十二乘隨侯之珠卞和之璞爲世所珍況天上人間天堂佛國龍宫海藏豈无至眞至貴之寳今元始寳珠有二度人經云元始於大浮黎土虚空之中懸一寶珠大如黍米元始先登眞仙後從皆入珠口不知所在由此言之珠雖小而容衆甚多何哉釋氏所謂芥子納須彌微塵之中亦有刹土蝸角之上能戰蠻觸朱子所謂其大无外其小无内善財樓閣皆見彌勒无量珍寶以爲莊嚴及其一悟正覺向來富貴皆在普賢身上毫竅之中維摩丈室能容三萬二千獅子座玉皇經云十方天宫皆有上帝應化法身說法既畢俱復一體何小大之不一分合之有異耶所謂散之彌滿六虚斂之則不盈一掬前輩謂看一部華嚴經不如看周易一箇艮卦誠如是也盖人收斂眞元寂然不動則天地萬物森羅在前老子云致虚極守靜篤萬物並作微塵可以包乾象一眞可以應萬方六合之大不足以容其身一芥之微尤可以騁其游耳此寳珠一曰蒼胡頡一曰圓覺一曰如意輪又曰圓如金彈色同朱橘皆諸聖强名托象无非化導未悟魚兔既獲當捨筌蹄而不用流耀瑩兆形道不遠人常引伐柯之誚人能弘道當存責己之規有諸己而後求諸人有諸内則必形諸外所以發輝流彩瑩徹一身所謂見於面盎於背潜雖伏矣亦孔之昭也夫微之顯誠之不可掩如此人能以道自重潔己避地晦迹韜光不求人知而人自知不欲人見而人自見可謂盛德號爲壽逸阜壽逸阜日精之名人身中精神光彩自然享壽釋云若有人我衆生壽者即非菩薩大率壽非人間之壽也人生百歲七十者稀何名爲壽若以此等見識安知本來亘古歷劫不壞之壽相哉此壽相充塞天地量等乾坤與萬物均齊與衆生同體露堂堂赤洒洒豈有限數拘束哉亦曰澄源亭欲升高必自下欲登阜必自原亦左右二眼之分澄源亭月帝之名源澄而流清也亭古文如樓臺諸仙所安集也俱滅三惡機三惡者貪嗔癡是也人能斷此則不墮三惡道得見三寶天君機者動之微吉凶悔吝繫乎此也所以君子見機而作不俟終日也三惡道地獄餓鬼畜生此三者極陰之地難復人身也故修煉純陽以滅其機軸經云請滅三惡斬絶地根同君子戒愼乎其所不睹自然滅惡機也啓籍登大明大明者明四目也一云太明非也坎水永隔於離明正照之境故聖人南面而正天下玉帝所居通明大殿故人登仙開示仙籍注名然後朝謁玉帝也後云捧籍登大明此則喻人以明明德爲上自己德性明白不爲色慾所蔽即爲大明之人爲賢聖爲眞仙皆欲不昧靈性爲自任令我保仙眞有天地然後有萬物盈天地之間者惟萬物萬物之中最靈者莫若人而不能修省其身以致墮三惡道以大洞仙經修煉至此方且滅其機而登大明保仙眞矣一云使子保仙眞上之諭下云使子下之告上云令我兩皆不妨大義保我自己之眞炁爲仙須要自保人不能保我也仙綬披緑青玉帝賜青紫之綬使兆披服以朝謁謂之選仙舉進士亦如人間登第先授青衫下章云披朱中緑霞同皆仙衣也解禍㝠途中既已登仙籍則禍沈九地之下㝠㝠之途矣人間得官則封妻廕子榮庇族屬爲一時之榮人能冲虚豈不貴重哉超福晨上靈諸法官能斷决疑異雖無所養死爲陰鬼取爲陰官四十九年一轉人皆如之若能内外交養福慧雙修即證仙道以自己之眞靈受福於景晨之上快樂逍遥矣凡晨一十一字天晨金霄遊太陽化三晨晨中黄景炁高晨暎上清乘景晨中暉七晨回帝席玉户暎晨霞超福晨上靈併羽月中晨晨登廣靈堂晨登天老室不可以一槩論當隨經義解釋人不能閲藏教而據他人所傳之本而擅自更改經典者愚懼其㝠責莫逃豈可不戒之慎之焉度世登玉鄉過度劫塵登入玉鄉玉比温和也太陽道境无炎寒之苦四時如春炁之和故曰玉鄉大羅无日月故无晝夜寒暑累祖返胎嬰累世之祖禰玄曾反胎更生皆變嬰兒之形謂之大洞帝尊示現人或以爲不載禍福既无罪何用救拔爲此經拔度者一十六處可見念念在乎玄曾祖禰升度方許己度天王之用心至矣哉今纘類于此南拔七祖根七祖積尸結七祖絶滯塞七祖返胎仙七祖斷玄滯七祖散積滯七祖生福堂解結生七祖七玄登朱宫七玄離幽扃散禍寧九玄九玄解重結西解累劫凶累祖返胎嬰累祖落寃名此等即度人經五苦八難七祖升遷䰟度朱陵也又曰爲上世亡䰟斷地逮役人欲求仙道當令身心清淨清淨者无染无著不增不减自己清淨可作功德感動天地超拔祖先廣度群有然後自度已身則无愧矣洞觀无礙空洞者通也即十通妙行也以俗眼爲觀平聲以心目内觀去聲上視九天下視九地中卷十章謂之十洞此大洞之標題也洞觀无礙空洞微无障玄洞空清淨玄洞虚清淨和洞靈清淨行洞眞清淨身洞玄清淨光洞源清淨光洞明清淨光洞清冥智慧謂之十大洞妙行妙果圓滿始通生因明易曰懸象著明莫大乎日月日往月來則寒暑生人无日月則道理不見天无日月則冥冥長夜故明字以日月二字合成道眼始通无所不見雖纖塵如秋毫之末无所逃遁經云聖日聖月照耀金庭又曰聖人以日月合其明大人者内明而外暗常人内暗而外明故隨事物轉移驪珠湛方瞳聖人方瞳舜有重瞳言人道眼始通如驪龍頷下之珠明瑩透徹若了達之士通身手眼觸著磕著何啻千手大悲内外洞照清表裏洞燭清淨无障是天與其鑑也人能修大洞之道仰觀九天之上俯察九地之下萬事萬物之理秋毫无所隱漏大洞金丹須採鉛汞古云潭底日紅陰恠滅鉛爲陽炁山頭月白藥苗新汞爲陽精以陽歸陽則雙目如金星能通乎晝夜之道日用左目夜用右目以代日月之明也右件玉章天篆一百二十字上鎮曜明宗飄天下統第三壘帝德君玄契曰眞人得洞觀清淨道眼始通无障无礙内外洞明照見一切能斬酆都山紂絶陰天宫惡根地根魔籍鬼帳常以天花飛香供養元始天王元始天王即我歷劫不壞元神非由外有散花飛香進登人仙中卷十仙即胞胎䰟𩲸靈元華嶽藏府元命是也自一月生胞次第生長已至轉入十仙門已於中卷意根妙行全十眞下注法人必難省今於修眞書中取十仙以益之人仙者壽至百歲已上黄歷見人之世數如老子九百歲彭祖八百歲之類是也元始天王曰文昌大洞玉章第十二耳根洞徹聖耳梵通丁酉戊戌睽塞玉晨九天司耳根者但聞音聲感動靈明隨聲旋轉爲善爲惡頃刻有異毫釐之差千里之謬所以舜好問好察禹聞善言盗跖喜聞爲惡紂樂聞音聲皆耳之聽昔有僧坐襌有鴉噪其上或問曰聞乎僧曰不聞曰何故不聞曰聞中不聞以此觀之聞亦未嘗不聞但不留之於心玉宸靈寶在九天之上九天有三自一炁生三炁是爲三寶三炁生九炁是爲九天乃生神之天謂鬱單无量天之類是又有八梵九天始青天太青天始丹天大丹天始素天太素天始玄天太玄天大梵天亦謂之九天又曰高上神霄南極長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓君丈人九天採訪眞君是爲神霄九宸掌生殺之權發號施令雷動風馳故萬物莫不由此而成始而成終也所以玉宸道君主之在人中脘太上大道君道君者有道之君也昔靈寶降生爲西那國王天下太平百姓稱之曰有道道者蹈也誰能出不由户何莫由斯道也皆明德新民之事自家及國以至天下皆能上行下效老子曰修之身其德乃眞至天下之普中庸曰道不遠人人之爲道而遠人不可以爲道修齊治平天下之大事豈不由修身正心誠意然後可以平治天下乎然有道之士務在濟世利人桀紂无道百姓罹禍周文啇湯拯民於水火之中爲解倒懸之苦後世歌之爲有道之君常保景化内玉經天子王侯得奉之者致國太平故富國安民强兵戰勝外无寇盗之撓永保社稷持誦是經專爲國王帝主君臣父子安鎮國土保天長存喻人精炁充滿身體强壯无有邪炁所侵自保壽康故保持光景造化之内毋使失墜毋令外邪亂其至道敗其靈根盗其至寳可保景化九回鏡中清九和十合如鏡之清明洞見事物玉皇經云敗其靈根盗其至寳盖不能得保守景化也以致鑑不空而衡不平矣昔陳與明得明鏡之道修鍊十八年以晋太康元年三月初一日飛升又太康中新野先生鄉人張如珍遇神人降於室傳明鏡洞鑑之道曰夫燭物理者天也鑑物形者道也天之道以清鏡之道以明審而无差形定於此物應于彼故川嶽之狀鬼神之情无所逃而隱也天以清而容萬有水以澄而鑑衆形若夫天清鏡明澄心靜神而得内外洞徹則至道成矣倘外役於物而内勞於神心神昏濁不能澄清則去道遠矣此法吾受之於長桑公子長桑公子受之於太清天帝子若修之能洞達玄通遐照八極夫洞眞法中有四規之道依四時而行亦與此同體古人所謂虚其室白自生定其心道自成信矣哉如珍修之九年徹見千里無一物可隱以梁天鑑十三年十一月十八日飛升號全眞達道眞人此乃九回鏡中清之旨趣焉此經一句主一事若人行得一句即與道合眞而爲至人也又有李士寧軒轅鏡之說具在别傳解帶玉暎室玉暎室乃上清玉宸宫在人中脘神室既解結滯則如玉之輝映詩云相在爾室尚不愧乎屋漏恐懼乎其所不聞乘素入四明素空也耳之於聲也乘空素而達四聰肺部童子素明字无英明者日月交合而成字始制文字者其知造化乎携提日中王日中司命接生君字道靈携提者不暫捨也凡言日者十句混合五日房三日暎玄敷日中一運珠日爲三矜交五帝散日精日中司命童日中開五暉混化啓明日飛霞散天日海日自東生之類日中眞靈乃太陽之精在人則坎中之陽兩腎間一點明瑩者日中王也以子時建生併羽月中晨兩耳分陰陽故有日中王月中晨如祖天師鬱儀結璘之眞訣皆主宰日月之神也携提併羽者欲常提省接連不昏聵也昔陳先生與楊太初遇眞人聶紹元傳二景高奔之法後得道飛升古詩曰聖人奪得造化意手摶日月安爐裏微微騰倒天地精攢簇陰陽走神鬼又曰若人間我修行法遥指天邊日月輪又曰日月交合時便是生身處本來面目眞勸君勤照顧經云聖曰聖月照耀金庭日月合璧乃月晦夜交合也内丹於此下乎修合太一召天魔上卷略釋之太一乃水精元之炁所化天地之先一數生水以成象人生之前一炁之精感化而成形非水无以立天地非精炁无以立人身老子曰天得一以清地得一以寧神得一以靈萬物得一以生所以太一爲萬神之宗主故能執符以召制六天大魔大洞經中凡言太一者有十如上卷太一務命根太一居紫房中卷太一召天魔携提太一眞下卷太一上元炁太一儔丘蘭太一楊威明上携女太一羽節命太一太一景中王等是太一之神於五神中併而爲一是故五臟皆有太一亦猶天地之間無處无水也在大道中謂之太一天尊諸天謂之太一帝君九天之中謂之碧玉宫太一大天帝專主水事斗中謂之太一五福諸地謂之太一尊神雌一女眞謂之太一元君在人謂之太一之神隨處莫不皆有太一居人腦中人有罪福小則太一簡閲奏帝大則三尸奏事重則三官鼓筆所以太一乃人神之領袖也得一則萬事畢孔子曰吾道一以貫之人得一而生既已生矣復能守一則此道大明及至成全一亦何在識者宜盡心焉僧問萬法歸一一歸何處丹經云既至成時一也无盖欲人无所執著欲求魚兔須藉筌蹄魚兔既獲筌蹄可捨又云過河須用筏到岸不須船釋應无所住而生其心帝君較萬精帝君一名七靈一名逢凌梵常守人兩眉之上執符把籙攝召六天大魔金書云太一執符帝君品命即此二眞也抜遏死積炁小救苦經云祥煙塞死户盖魔王檢較鬼精遏塞死户保舉仙人也生神章云元君遏死户是也以此爲生生之命根越度仙黄庭黄庭中央仙庭四方八面朝此在人脾胃主管穀府有神曰黄寧童消散尅化以滋養四靈故越此庭則立三關已帝立三關上三關天地水亦天地人上關泥丸中關絳宫下關炁海亦曰三要在易爲三極之道黄庭云三關之中精炁神是也八風舞神兵莊子曰汝聞天籟而未聞地籟汝聞地籟而未聞入則八風八方神炁也四正四維皆起思風和暢則千眞萬聖懽慶鼓舞人身之炁暢快則萬神怡然炁一不和脉一不調則人神悲泣人神悲泣則將離去身體神離炁絶人將死滅可不慎歟即上開八門飛天法輪運轉精炁也左抱福醴液福醴香美之酒亦曰瓊漿玉液盖一身之炁液灌溉本源本根者腎也腎炁上通於耳兩腎居下而腎之門户在上所以下實則上聽聰福醴亦謂之水銀神水木液黑龜精赤鳳髓金液金華玉池金精鉛汞皆丹料之異名也惜精以養炁惜炁以養神惜神以養虚大洞之道備矣右提慶元瓶慶元瓶者謂之玉池華池偃月爐懸胎鼎玄門牝户黄庭眞土金鼎皆丹房之器皿也二者缺一不可故丹道成矣洞微无障玄洞聽隱微无有障礙盖洞微者乃聖耳通之妙果妙行此即六通之一也人能修習可洞聞九天之外九地之下梵通生虛明虚明者心也自誠明謂之性心者性之宅得誠明之性自然視思明聽思聰梵通是聖耳无所不聞无音聲可逃也貫顙聞十方顙額也上窮圓頂下盡方輿无不洞達也十方四正四維上下共十方盖自己梵通虚明普徹上下四方无不洞聞豁落一切聲一切大小音聲豁落響徹不逃聰聽盖同聲相應无往而不聞也如聾聵者疾雷震山而弗知豈可容易回其本性哉人能六根六塵悉皆清靜即能運六神通得大自在耳根在腎多以色慾撼摇精炁耗散早致聾聵須仗大洞招眞致靈返回神明宣通開導復全本體方證洞微妙行右件玉章天篆一百字上鎮竺落皇笳天下統第三壘帝德君玄契曰眞人得洞微清淨聖耳梵通无礙无障内外虚明聞一切音聲能斬酆都山泰殺諒事宗天宫惡根地根魔籍鬼帳常以丹果供養元始天王結帶生核進登鬼仙鬼仙者人死而英靈不昧焄蒿悽愴昭明能禍福於人如今天下州縣城隍土地關羽張飛之類是玉清无極總眞文昌大洞仙經卷之五
