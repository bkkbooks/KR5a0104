front:
  text: 玉清无極總眞文昌大洞仙經卷之九藏二
  hash: sha256:2953406e57c8600a8b38ca67cce370c9afe53a65f7164bf74952cd86d58eba00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0104_HFL_008-001a, image: hfl/0053/0053-082.png}
body:
  text: 東蜀蓬萊山中陽子衛琪註元始天王曰文昌大洞玉章第二十六地六成水六合妙行甲子坤屯乾坤無支干斗中四眞人散花玉清臺北斗位處坎宫坎爲水四眞即前所謂四象前曰上清今曰玉清又一層之高在人爲腦宫四眞在太極主四眞註燒香散花旋繞歩虚此眞仙之樂身中香花眞氣所發不可泥象執著以爲有物玉清臺即人之上丹泥丸宫是也帝卿中玄生泥丸上元帝卿諱中玄生領括衆仙也一云帝鄉仲玄立皆誤矣一云三一帝卿肇勒精字中玄生二號即一神眞一回衆眞來中玄生起初一來時衆眞畢集也意之所之炁爲之奔走非敢後也蓋志者炁之帥也聽其役使一眞聚則萬眞聚香風扇三寳香風拂拂飄扇三寳之上以爲供養也三寳即兆身中之三寳若能精修存鍊五炁薰蒸則有香風外泄亦由此玄契中云常以天香天花供養元始之類同也天童經云金飯玉漿向求皆至皆自己身中所有切勿外求三寳即三田中神香風即眞炁薫蒸扇乃勤摇之物皆法於自然五臟映清夷上文皆說天上事此一句却說身中事蓋近取諸身遠取諸物此言天上有清夷宫人當以五臟之炁映之釋氏書云五分名香以爲供養又誓堅此念以報佛恩書云黍稷非馨明德惟馨皆同此義常見人以燒香插花造作百味珍羞以爲供養己謂作福德爾殊不知一誠未盡天地不享及獲暴殄之過冒瀆之愆何如精鍊自己五分眞香供養身中三寳則自然五臟暉映清爽平夷豈有鬼神之害又且福德最多人何苦而孜孜向外馳求蒼胡頡光華有是炁而然後有聲聲有上下之相應和故爲音律靈風鼓動運轉遂成樂只這一點靈光洞然无礙暉映八表在人乃一粒金丹積成於内言語音聲發之於外故六炁分明六陰魔伏度人經黍米珠釋迦摩尼寳其寳一也大丹曰龍虎大藥須以眞鉛眞汞和合而成方有光華焕燦檀熾鈞吉祥和炁致祥元始所出之音聲謂之檀熾鈞玉皇經云鈞天妙樂秦穆公到天門聞鈞天廣樂唐明皇到月宫聞霓裳羽衣曲皆天樂也如世間軒轅之咸池堯之大章舜之九韶禹之大夏湯之大濩皆治世之音也樂聲所至吉祥所集和之至也妻子好合如鼓瑟琴兄弟既翕和樂且耽況天上之樂豈不致瑞所謂樂和則神和神和則天地和天地和則五穀豐熟國民安泰豈鄭衛之徒可得致之哉人之五臟安和則語音清響聞者皆是清淨法音太中六炁清太中五太之外又有五大以足十數即河圖之數是一本六炁分蓋太中則五運六炁清而不駁此接前樂和之意六炁者亦應地六成水之義六炁在天地間生殺萬物醫書甚詳亦由人之所感召寒暑風雨晦㝠謂之六炁或逆其炁則致疾疫甚至死亡修此大洞太中之妙行却之曲水襄天河前云一曲水天聞蓋天河注於東井而循環於天地之間古人云水出崑崙之下注出尾閭復上謂之天河此天地之河也人之河自尾閭泝流而上崑崙與天地同焉黄河九曲人腸九盤象之吕仙云曲江上月華瑩淨有箇烏飛此與一曲水天聞同在前太初章下可以互看其旨六度功圓成六度萬行之功已圓全成就以六應水也六度六陰六合皆成數也人之進修圓滿三千功八百行亦可以爲上仙五魔伐六陰五魔者青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗郁黄天魔王横天擔力是中結元始王四正四維皆爲太陽道境方顯有元始如人却盡陰炁鍊成純陽方見大洞帝尊示現生神章高結元始王同一義高觀六合庭既結元始在中仰可以觀見六合之内亦猶人神可以内顧臟腑張天師修行千日能内顧五臟外集萬神等類是太中妙行以炁爲主有天地之氣與父母之炁混而生人在胎中臍帶與母相連母呼亦呼母吸亦吸既生剪去臍帶各自呼吸炁藏于炁海謂之命元修命者修此也右件玉章天篆七十字上鎮淵通元洞天下統第七壘里德君玄契曰太中六合妙行觀門念善行善无礙无障至善不踰住善保安定善崇基全成十善十華通榮命同智合曲水襄流六度功圓一千功成自初至六三千六百滿證太勳由是九天爲子生眞人五帝爲子伐六陰旋斗歷箕而度天關八景㝠合而肇玄玄元始天王曰文昌大洞玉章第二十七天七成火七覺妙行乙丑丙寅蒙需辰中黄景炁辰日也日中有黄色景光之炁言初生之日也喻金丹子時黄庭陽炁初動則作用也此鉛遇癸生須急採之時三秀登霄庭三躍而方登霄漢以圓軸而輥上重霄其難矣哉三秀乃天中山名仙人呼靈芝爲三秀草乘黄景炁游太霄之庭滄臺飛羽輪東海蓬萊有山曰滄浪有臺亦名滄浪得道神仙乘黄景炁駕羽車飛登此臺入三秀山歸霄庭宫而領職任事也迎延道已成得道眞仙元辰眞人佩帶迎延之符乘飈輪飛羽車爲逍遥之仙此乃修習文昌大洞經之所致非小仙之格也司命奉帝書主心之神奉承帝旨告下十方以保全生根爲念金書司命定筭人之壽夭皆由存心能善用其心則可以稱壽者相號曰玄度卿中央司命丈人理明初號玄度卿專一守心絳宫也人壽本百歲以有善惡多少故有神明司其予奪少有八九十者保生太霞宫保生護命於太霞之宫即絳宫也此章專應火數人爲離明之象屬火光彩輝霞故曰太霞宫保生生之根列賓館上清羅列賓客之館於上清宫亦絳宫也蓋萬炁萬神所聚之處古人云一竅通則百竅皆通一神集則百神皆集命門合精延命門右腎其神桃康字合精延七叠見之一云左曰父寧在右曰母精延亦曰大洞帝一尊神君之名皆兩存之守我身黄寧桃康常仰望黄寧以承炁蓋脾胃所得之水穀散之於五臟六腑也前黄寧以有註乃精血三眞之玉諱亦可互見左携元素君无英之别字見前註乃火沼之主即紫素左元君翳鬱仞字安來上乃主保肝護魂上應木德歲星下主東嶽泰山右攝朱鬱靈白元調陽君名朱晶字鬱靈標乃水池之主見上卷朱晶啓明師注又字玄夷絶中通人之肺炁下鎮西嶽華山太和度七覺七火之成數故引意相合七覺者天之北斗七元也人之七孔心也太和眞炁通入所以有知覺發生文章焕燦故下文言眞文宣人但能致中和於一身吾身之天地位萬物育則身外之天地亦位萬物育終日圓覺而未嘗圓覺凡夫也仙云何不食炁太和精武當謂之太和山釋氏七覺支則曰念覺擇法覺精進覺喜覺猗覺定覺捨覺此亦謂之七覺大抵只是人之先天先地靈明不昧之精神是也虚靈知覺一而已矣圭峰裴相所說甚詳點火生眞文二點爲火地二生火天七成之結爲南丹朱陵火府眞文即前所謂五方雲篆冶之流火之庭洞陽炁赤故號赤書紫華領胎仙即經玉眸鍊質黄華蕩形紫華眞人引領胎仙證登仙果但經南昌鍊度方可生天生世仙凡一换也此言十華仙元命眞中神即胎仙也又曰元命眞人傳曰五十而知天命然則天者不得聞道矣元命者元受天之明命眞中有神長生大君即浩劫長存之神先天地而獨存歷劫運而不壞圓明虚靜妙有眞空此其體也不疾而速不行而至千變萬化應事接物此其用也唯以和氣養之是爲七覺妙行右件玉章天篆八十字上鎮太文翰寵妙成天下統第七壘里德君玄契曰太和七覺妙行十華觀門紫華天一精通太无丹華地二炁通凝玄青華天三神通萬生素華地四梵通十方黄華天五始通太清瓊華地六始通冥陰金華天七始通太玄緑華地八元通上清碧華天九元通玉虚瑶華地十玄通玉清混洞太无十華接空地居天中千行始登點火赤混惠合冲眞聞合見合合德變形是曰玄中太皇眞中有神元始天王曰文昌大洞玉章第二十八地八成木八景妙行丁卯戊辰訟師金闕上景炁金闕乃三清所御之殿一云金闕必誤梵清景三炁乃清微天之妙炁也此經欲召元神岳眞三官先以景炁爲主十方暉紫煙言景炁遍滿十方暉映成紫色煙雲黄庭云紫煙上下三素雲蓋人之妙炁凝集而出於眼目即水火之正色三合太一尊太一按太史公書云在紫微帝座見上卷太一務命根注三合者玄元始三炁合德也即前所謂梵清景三炁同義帝招太元神太元神乃北方精魂名字玉帝常以招眞符召之問考較三官五岳所管人世罪福之事即人之歷劫不壞之元神七轉召嶽眞五嶽有五眞人五眞君五聖帝其下分司列曹管領生死簿籍七轉者攝召時以符摇拽宛轉至七數七爲生數玉符吿三宫太一尊神以玉符告下天地水三官人之元神凝聚五炁循歷三官聚頂朝元也人修習大洞之道當去三官之籍抜籍三塗下令三官五岳將罪人名籍削落於三塗五苦之下赦除之三塗五苦共爲八難人能離脱八難方可有受生之兆受生高上辰人能修習文昌大洞之道脱離五行八卦煉煅身中鉛汞爲丹功行滿時其眞神自然超過三界受生於高上辰極太帝八靈王太帝乃精魂名陽堂字八靈也王稱尊也生神云太帝號陽堂字曰八靈君亦曰八識神八靈八景木之成數一化回慶雲自此一變化之間回取慶雲以開生門丹經夾脊雙關至頂門修行徑路此爲根金丹火候在人參訪不可臆度桃康守六合中卷入精六合房註桃君乃腎神名蓋宜懲忿窒慾惜精愛炁以爲一身之主性命之根色念動時存思桃康在臍勒精衛泥丸勒精蓋有自然之理若以房中之術是炊沙作飯縱蒸千劫只名熱沙不名爲飯黄庭云腦神精根泥丸根先師云此精非婬慾之精乃混元至精玉皇口中涎在人尋師問道究其玄妙饒君聰慧過顔閔不遇師傳莫强猜三一帝卿肇勒精當存此神運眞炁入腦中泥丸六合太清八景觀妙行觀門皆去聲内觀三部八景也太清下田是也生天經云即引太和眞炁注想丹田三部八景則在心目一注耳十德眞文宣聖人仰觀俯察而畫八卦以通神明之德元始演大洞眞文以凝集眞神作成人之德其揆一也德者人之所禀賦性中之所有發之爲四端藴之爲五常所謂明德俊德性爲道之體德乃道之用故曰性之德也合乎内外之道也人有純全之德則无過不及之差乃天理至公至當保子神中神度人經云眞中有神此令兆愛惜此身如保赤子回光返照心目内觀靜定乆之自然見眞中之神與之和合爲一體元命生自然前二章云元命生太初蓋人元命眞人始生之初自然而然非人力强爲之也此乃地八成木於東方以表命元也人之受命于天自當保守固窮毋爲泛濫以危天命則可孔子聖人飯蔬食飲水顔子賢人陋巷簞瓢蓋安天命所謂樂知天命故不憂聖賢尚且如是人而胡不爲乎右件玉章天篆八十字上鎮太素秀樂禁上天下統第七壘里德君玄契曰太清八景妙行十德貫形用德合體進德坦平成德廣大智德内清慧德發光明德圓華靈德普應玄德大方大德自然普德濟攝三千行滿眞文下敷滿願成眞理合化合德合道合保子萬神洞耀八冥由是中理五炁混合百神元始天王曰文昌大洞玉章第二十九天九成金九光妙行己巳庚午比小畜太虚空无景太虚太空了無一物無光景色象寂兮寥兮人我兼忘又肺神名皓華虚成以應金方蓋彭室帝君在太虚之中霞中有彭室綵霞之中恍惚若有眞神之宅人身有三彭之室即三尸神也常以庚申甲子本命之日上天奏人功過一云靈中九雲合重扉九雲一本九靈蓋九陽妙炁擁閉其門言九竅閉塞纎塵不入亦如君子退藏於密括囊無咎齋戒以神明其德帝君靜幽密太一帝君居處安靜幽密之地蓋在人頭上無所關撓紊亂則靜老子曰致虚極守靜篤萬物並作全在靜定工夫八眞合景君膽中八眞合景君與肺神通暢金木間隔到此混合而金丹始成此神諱北臺玄精當存想青衣天尊像守膽中間上携女太一提携太一仙女入泥丸宫亦謂之太一元君雌一神也見前注膽眞與太一交會於人之百會穴又謂之衆妙門雌雄混玉房雌一雄一帝一謂之三一守之有法在人參訪蓋雌雄者陰陽也混玉房洞房中交媾也老子曰知其雄守其雌人或詫神仙安得有此殊不知天父地母日陽月陰交媾以生萬物易以兊女艮男相配爲咸感也辭曰天地感而萬物化生是以立人之道有五經曰夫婦有别又曰天下之達道五夫婦一也若夫正婦貞所謂家齊也家人之辭曰男女正天地之大義傳曰夫婦之愚不肖可以與知能行蓋男女居室人之大倫孤陰獨陽豈得成人道哉但止於至善則可君子之道造端乎夫婦及其至也察乎天地易首乾坤而重咸恒詩首關睢而戒淫泆書記釐降禮謹大昏神仙未嘗无之劉阮之天台柳元之海島皆遇仙女昔有隱者貸藥爲生聞樂工嫁女有姿色索五百千隱者出七百貫得女歸後數年事畢父母憶女往詣焉山中樓觀甚麗女夫迎拜留數日一飯不復飢臨别以黄金五錠贈歸後錢盡復往不可見唯空山爾豈非神仙中夫婦乎丹經云休妻謾遣陰陽隔絶粒徒教腸胃空祖天師葛仙翁許旌陽何嘗逐妻屏子然後成仙金丹之道須命黄婆媒妁歡合青衣女子素練郎君夫唱婦隨陽唱陰和十月聖胎圓成嬰兒姹女突出現形方顯雌雄混玉房之明驗矣亦非世俗之所謂夫婦也九遍還返七乃天符火候也十一月冬至行復卦爲一還十二月臨卦爲二還正月泰卦爲三還一返二月大壯卦當沐浴三月夬卦四還二返四月乾卦五還三返五月姤卦六還四返六月遯卦七還五返七月否卦八還六返八月觀卦當沐浴九月剥卦九還七返陰符陽火進退抽添欲七十二候周天足數至十月行坤卦則脱胎神化矣一陽生於子二陽生於丑三陽生於寅故三陽爲三還則陽已盛故火生於寅爲一返至九月火已墓故七返足十月火絶而燼矣崔公曰一年内十二時意所到皆可爲又曰勸君不用尋冬至身中自有一陽生以此言之周天符火不容無而不可執著也至人傳藥不傳火當求明師矣分形散六合大洞經至此以得陽神出入分形散彩游宴六合之外乃天地之外當演習去此幻殻初出殻去一里復回勿令亂泥丸易分别出入一自衆妙之門以分别去來古人云若人通得泥丸穴何必區區煉大還去而復來候出入純熟即投胎奪舍太眞九光輪九乃金之成數上皇太眞即我之元陽正炁生發九色光象之輪以聚集萬神即九光之符九光以應天九成金十佺丿文結佺者古仙名偓佺堯時服松實而眼方得道丿只如度人經云十轉回靈一般即五方五臟縱横錯綜之眞文故玄契曰含潄乃五臟之液也丿字文昌大洞之本文不宜改易如靈寶經亶婁阿薈如圓覺經奢摩他三摩鉢提襌那之類如可改則譯經者必爲漢語當從古文保子元炁通保護兆身中玄元始三炁變通而不塞人之血榮炁衛務要流通和暢則安樂不染沉痾若凝滯則别生他證不保五炁理中頡金木水火土五行之炁結爲蒼胡頡理道也中者大本也合而言之德性命也發出乎外情也發而中節和也和者達道也達道達德一以貫之故時措之宜也五炁理中頡文在中矣頡直項也又曰頡頏言涵養至大至剛之炁浩然充塞天地釋云金剛又曰舍利子皆同此意變化飛上清可以變化无窮陰陽不測者也以陰炁爲玉女化陽炁爲仙童彩雲龍鳳皆自己身中出可以乘駕飛入上清眞境三千行超越三千功八百行務欲圓滿超越或有陰騭大功一起救拔數千人性命者亦可使當圓滿大勳立躋三境侍衛之臣人多以富貴聲色耗損精炁一旦身體性命委而去之雖妻子至親亦掩鼻而睥睨曩時洞房花燭恩愛何在唯獨隨業輪轉而已又安望項負九光輪證太眞之妙行右件玉章天篆八十字上鎮太虚无上常融天下統第八壘大風澤地土皇君玄契曰太眞九光妙行十佺捨觀雙修仙化胞仙胎仙魂仙魄仙臟腑中仙靈仙元仙華仙嶽仙元命神仙梵炁始炁元炁玄炁道炁中理眞人變眞化神三千行成丿文含潄貴炁自然十轉回靈萬炁齊仙十佺者太眞妙行天一地二天三地四天五地六天七地八天九地十是也丿文乃天地十佺之文章也即人之五臟六腑精華玉液故曰含漱貴炁元始天王曰文昌大洞玉章第三十地十成土十明妙行辛未壬申履泰太玄九炁上太玄太元太始三炁在九炁之上後結句云太玄啓十明妙行登十眞又曰太玄都九炁丈人所主之祥煙生炁也煙回太暉間三炁合德九炁齊并合成雲煙回轉於太虚之間太暉者宫殿名也他本有作太虚者必誤此乃玄炁出於九炁上神光秀空峰神光寶光即靈光也蓋無形可捉發秀暉彩於長空杳冥恍惚之表在人則精神光彩發秀於雙目空峰者頭面也五道焕三天五道即五老焕明於三天之上言朝謁上帝冠冕燦爛也大丹三花聚頂五炁朝元也无上三天即人身中三田宫駕景登絶霄乘景輿而上升重絶霄漢言人紫河車搬運崑崙之頂前云乘景晨中暉蓋同義絶霄者上无所維下无所基乘風蕩滯神仙人身輕又所服者六銖衣所駕者飛輪羽車皆可乘御風炁而行蕩滯神者三界之中剛風浩炁五帝大魔統領諸天魔鬼把截要路若能大功圓滿上帝鑒觀魔王保迎流金火鈴五老啓途方得上升亦如修行人眞炁强壯慧力貫通則夾脊雙關天柱玉城自然開通終无滯神日中一運珠終宫中一丹元君名神運珠中宫常運轉如日之寶珠一云中有運珠理一云運一日中珠不通西王母握固法存心中有日如崇寧錢大運轉如火之熱下至湧泉上至泥丸經由三宫千日可以出神日中司命接生君中央丈人司命君與神運珠皆守心之神心中萬神此其大略也理心入清閑以正理此心念使之清净安閑不爲物撓圓覺經由澄諸念覺識煩動遺教經制之一處无事不辦一處者澄清心念前說天此說心蓋此心天心也内修而外應不一其内无以制其外不齊其外无以養其中内外交養動靜感應此大洞之本㫖道經只滅動心不滅照心亦同混合三五宫金水同源一五火木同鄉三五中宫戊己三五四象五行交媾於中宫也昔女冠徐鍊師張惠明遇南嶽右英夫人傳道行三五混合之法咸得尸解神仙人能行三五混合之道自得脱離三塗五苦升入三五天宫得天堂快樂自在動經拂石之年自此不貪快樂進修眞造上境累變億萬年動經億千萬年永無失墜修天人之福如箭射虚空力盡還自墜如修大洞金丹之道直登究竟地位豈有輪轉耶伐絶胞樹土此句當重說蓋以胞胎爲一大事非此无以生化此言土配合不謬一黄演之炁結爲胞根附于脾皆屬土成數永斷尸血根九玄七祖咸被道炁解釋前世積滯之冤結胞樹血根皆有深根固蒂之喻得此大洞寶章之功咸得伐絶永斷七祖散積滯人之上世有因相争結爲咒於靈壇社廟致連逮子孫塜訟徵呼積滯幽扃不得解散今聞大洞玉章即脱反華生幽玄反回善芽增生長育於北方幽玄之圃乃天一所生之地三才之始也如人歸根於下元是也炁海乃一身之所主萬炁生萬神人之炁以萬計孟子謂浩然之炁充塞天地也若不能貴固根本耽戀酒色炁漸隨散至中晩之年不及數千所以神疲力倦若知而存養則萬神復爲之生矣仙傳載廬山太平宫三一王先生夢神人告曰上帝令汝住金華洞天賜丹一粒還汝精神復汝元炁翌曰遂化故知人之得道神炁不備不成仙矣傳曰身體髮膚受之父母不敢毁傷孝之始也父母全而生之子全而歸之可也人多以酒色財炁損傷身體幽㝠之中不逃譴責何望神仙齊仙成仙王見賢思齊既與諸眞仙比肩而行成就仙道爲諸仙推戴故曰仙王仙亦有王者之服文昌仙職至此亦爲極貴太玄啓十明太玄開啓十明妙行以接度有縁太玄乃三炁之祖生育天地萬物至此爲足數合十明妙行乃得登十眞妙行登十眞十明妙行圓滿則證登太玄眞人之位十明十眞地十成土之數也明矣河圖至此爲足數六爻純陽爲乾屬金明則識認一切境物如幻一切事務如夢理法如眼翳空華有爲如鏡中像所以視聲色如寇讎視軒冕如糞土等生死如旦暮故應事接物鑑空衡平方證太玄妙行右件玉章天篆九十字上鎮太釋玉隆騰勝天下統第八壘福德君玄契曰太玄十明妙行十眞圓成精眞玄珠炁眞玄力神眞玄通性眞玄一元眞玄妙命眞玄光形眞玄全德眞玄洞道眞玄應全眞太玄十眞妙行梵行諸天横文固根萬行周圓六位已陞妙行大全形成炁精鍊化紫金長生无窮太玄眞人元始天王曰文昌大洞玉章第三十一表乾兊二卦其音同金癸酉甲戌否同人上清絶霞外上清在太清之上故云絶霞外人即絳宫是也此章表乾兊二卦乾象高高在上故絶霞外乾始能以美利利天下不言所利大矣哉大洞仙經普資萬有而不矜其功能他經則云持誦之者即得如何是矜其功也乾之體剛健純粹无有息時人之學道當乾乾不息綿綿若存永成八皇運九天八皇八卦也九天九宫也見前洛書數兹不再舉乾元用九天德不可爲首也元亨利貞乾之德也故曰運九天言自强不息也八皇老君運轉九天之上即八靈王也皇與王一也天地之大豈離陰柔陽剛二氣二氣運轉無窮豈離乎一元之會故天地之大萬理兼備其爲體一而已一元之運春夏秋冬弦望晦朔未嘗一息之謬易曰觀天之神道而四時不忒聖人以神道設教信哉在丹道謂之火候以應太陽一年一周天三百功滿可以吞服幽寥玄帝子注見上卷第二章帝皇太一重冥空字幽寥无又皇一之魂上歸字帝子二神共守下丹田存思法幽寥黑帝子赤携此景中人幽寥帝子二人能提挈此景中之人乃自己法身歷劫不壞之象得此提省常惺惺不昧无私欲之蔽无愛惡之侵晨登天老室子時夜半上升天老宫天老帝君七星神咒經載即人之肝臟咒日出東方赫赫大光此卯時眞炁傳送至肝之時夕宴金華庭晩夕遊宴於金華之庭人肺也以表兊卦一云金華便必悮酉時眞炁傳送至肺臟宴者飲金漿玉液餐交梨火棗羽節命太一以羽葆之旌節命召太一帝君見前注太一在頭執符以召内境萬炁萬神神隨炁行皆得聚凝而朝太一帝君錦旛召萬神神也者妙萬物而爲言也章中多有錦旛錦旂所以招眞致靈之具方以類聚物以羣分是以羽節錦旛各以其類堅我六仙府六府大腸爲尚書府小腸爲元陽府膽爲蘭臺府膀胱爲太和府胃爲太素府三焦爲無極府聖人時乘六龍以御天也天以六炁流通宰制品彙人以六腑和暢捍禦外邪故曰堅固兆身中五臟六腑之炁固則成六仙府散則爲六洞寃魔遞相殘賊皆因情慾所撓敗壞六洞六天伐滅胞胎根戕伐胞胎之根胤毋使滋蔓蓋此死根當盡去之死根伐絶然後得生根增長蕃衍盛茂即葱鬱成功德之林解結生七祖解釋七祖之結習令上生天堂享受快樂無爲也一云解結七祖生有此顛倒錯亂但令用心向善自然七祖生天散禍寧九玄消散九玄之禍令得安寧六陰剥盡九陽始成易夕惕若厲無咎當一得永得綿綿若存禍自散失深沉九地之下赤城丹臺女赤城一云日帝玄洲赤城蓬海螯宫在九霄之下謂之初霄丹臺紫府乃陽明之宫多女仙之瓊館楊太眞之銀闕按山海經東海蓬萊山扶桑山方丈山滄浪山四山最高極大下有三島十洲一曰玄洲二曰瀛洲三曰祖洲四曰聚窟洲五曰炎洲六曰麟洲七曰流洲八曰長洲九曰元洲十曰生洲此章下有玄洲絶三津上有滄臺飛羽輪校仙登扶桑皆在東海境上得道者莫不經由此處脱蜕幻骨拜職受服然後上升天境朝見三清至尊扶兆入金門乾居西北屬金爲天門故曰金門此兊之少女仙扶持我身同升入金門一云符召入金門必悮世主之門亦曰金門月母靈素蘭兊卦爲月月神乃太陰之精諱靈素蘭或寧素蘭必誤正法月咒作靈素蘭斗經云主司陰府宰御水源是也守閉死炁關月精常謹守下元閉塞死炁此四句皆雌一之經丹臺女陽神欲人上升寧素蘭陰神能爲人遏塞死户注流生炁死炁自今絶既塞死户則死炁斷絶孔子曰未知生焉知死蓋大洞之道知生知死亦如易繫云原始要終故知死生之說生津從兹延求生之津涯可望而度也釋曰無生忍既无生安有死若了无生須求解脱釋一切法縛直得萬縁清净了无可得萬神萬炁仙雲行雨施品物流形故曰萬炁生萬神萬炁仙即萬神歸之爲一體太極圖中化生萬物是也乃天地生生之根超脱位眞玉乾道變化各正性命故超脱過越生死之關則證品爲大洞眞王之位前章成仙王今次修習至此爲長生眞王位十頁妙行全十眞者誠實无妄之謂也誠者天之道思誠者人之道至誠不息不息則乆故得十眞妙行全備前章妙行全十眞太玄會明陽九天之上陰炁不侵九地之中陽光永隔故令我身中太玄之炁會於明陽之天後章我身會明陽同義者二焉无上大洞尊於此利見大人也自己大洞帝尊出現乃无極无上品之貴人與天同其匹休永无墮落此皆无色界上大羅天也一炁同龍光乾陽物也故以龍爲喻曰潜龍見龍飛龍等語皆是元始一炁化生若仁以行之修己身大洞則與元始同炁合德乾健也自强不息兊悦懌也喜慶難言修煉至此陰爻剥盡化凡質爲純陽紫金之體神抱炁炁抱神精神粹明炁脉調暢如夫婦之歡合如子母之留戀待時神化右件玉章天篆一百二十字上鎮龍變梵度天下統第八壘福德君玄契曰己身精炁全命錬化紫金六位已昇妙行大全長生无窮太玄眞人至此回光開度胎根七玄九祖並解寃結斷除債訟閉塞死户應同炁同根蘇懋生津延益萬神同超眞王和合萬炁妙行並全皆號太玄會明陽天我獨超出證大洞尊帝一龍光號无上玄通玉清无極總眞文昌大洞仙經卷之九
